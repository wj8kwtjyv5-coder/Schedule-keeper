const pad2 = n => String(n).padStart(2,"0");
const uid = () => crypto?.randomUUID?.() ?? Math.random().toString(36).slice(2)+Date.now().toString(36);
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; };
const isoDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const parseDate = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const startOfDay = d => new Date(d.getFullYear(),d.getMonth(),d.getDate());
const fmtTime = t => { if(!t)return""; const [h,m]=t.split(":").map(Number); return `${h%12||12}:${pad2(m)}${h>=12?"pm":"am"}`; };
const fmtDayShort = s => parseDate(s).toLocaleDateString("en-GB",{weekday:"short"});
const fmtDayLong = s => parseDate(s).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});

// ── Notifications ─────────────────────────────────────────────
const _notifTimers = [];
function _clearNotifTimers(){ _notifTimers.forEach(clearTimeout); _notifTimers.length=0; }

function _fireNotif(title, body, tag){
  const sw = navigator.serviceWorker?.controller;
  if(sw){ sw.postMessage({type:"SHOW_NOTIFICATION",title,body,tag,data:{}}); }
  else if(Notification.permission==="granted"){ new Notification(title,{body,icon:"/icons/icon-192.png",tag}); }
}

function scheduleTaskReminders(tasks){
  _clearNotifTimers();
  if(Notification.permission!=="granted") return;
  const now=Date.now(), todayStr=todayISO(), tomStr=isoDate(addDays(new Date(),1));
  tasks
    .filter(t=>!t.completed&&t.time&&t.category!=="work"&&(t.date===todayStr||t.date===tomStr))
    .forEach(t=>{
      const taskMs=new Date(`${t.date}T${t.time}:00`).getTime();
      const cat=CATS[t.category]||CATS.other;
      [60,15].forEach(mins=>{
        const delay=taskMs-mins*60_000-now;
        if(delay>0) _notifTimers.push(setTimeout(()=>{
          _fireNotif(
            `${cat.icon} ${t.title} — ${mins===60?"in 1 hour":"in 15 min"}`,
            `${fmtTime(t.time)}${t.notes?" · "+t.notes:""}`,
            `task-${t.id}-${mins}`
          );
        },delay));
      });
    });
}

function scheduleWellnessReminders(bedtime){
  if(Notification.permission!=="granted"||!bedtime) return;
  const now=Date.now(), [bh,bm]=bedtime.split(":").map(Number);
  [
    {mins:120, title:"Red light glasses", body:"2 hours to bed — put on red light glasses now"},
    {mins:30,  title:"Wind down",         body:"30 min to bed — start winding down"},

    const base=new Date(); base.setHours(bh,bm,0,0);
    const delay=base.getTime()-mins*60_000-now;
    if(delay>0) _notifTimers.push(setTimeout(()=>_fireNotif(title,body,`wellness-${mins}`),delay));
  });
}

function getWeekDates(from=new Date()){
  const d=startOfDay(from); const dow=(d.getDay()+6)%7; const mon=addDays(d,-dow);
  return Array.from({length:7},(_,i)=>isoDate(addDays(mon,i)));
}
// Returns array of last n ISO dates ending today (oldest first)
function getRecentDates(n=30){
  const today=parseDate(todayISO());
  return Array.from({length:n},(_,i)=>isoDate(addDays(today,i-n+1)));
}
// Returns Mon-aligned grid of date strings (null for padding cells) for a given year/month
function getMonthGrid(year,month){
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  const startDow=(first.getDay()+6)%7; // Mon=0
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=last.getDate();d++) cells.push(isoDate(new Date(year,month,d)));
  while(cells.length%7!==0) cells.push(null);
  return cells;
}
// Count completed non-work tasks on a date
function dayDoneCount(tasks,date){
  return tasks.filter(t=>t.date===date&&t.completed&&t.category!=="work").length;
}
// Returns 0-100 or null for a date
function dayCompletionPct(tasks,date){
  const all=tasks.filter(t=>t.date===date&&t.category!=="work");
  if(!all.length) return null;
  return Math.round(all.filter(t=>t.completed).length/all.length*100);
}
// Habit completion % for a habit over a set of dates
function habitPctForDates(habit,habitLogs,dates){
  const scheduled=dates.filter(d=>habit.days.includes(new Date(d+"T12:00:00").getDay()));
  if(!scheduled.length) return null;
  return Math.round(scheduled.filter(d=>habitLogs[`${habit.id}_${d}`]).length/scheduled.length*100);
}
// Generate improvement callouts for a given week
function getCallouts(tasks,habits,habitLogs,settings,weekDates){
  const out=[];
  Object.entries(settings.weekTargets||{}).forEach(([cat,target])=>{
    if(!target) return;
    const done=tasks.filter(t=>weekDates.includes(t.date)&&t.category===cat&&t.completed).length;
    const pct=Math.round(done/target*100);
    if(pct<80) out.push({type:"cat",cat,done,target,pct});
  });
  habits.forEach(h=>{
    const pct=habitPctForDates(h,habitLogs,weekDates);
    if(pct!==null&&pct<70) out.push({type:"habit",habit:h,pct});
  });
  return out.sort((a,b)=>a.pct-b.pct);
}
function detectCat(title=""){
  const t=title.toLowerCase();
  if(/\bgame\b|\bmatch\b|\bvs\b/.test(t))return"game";
  if(/\brun\b|\bjog\b|\bsprint\b|\bstride/.test(t))return"run";
  if(/football|soccer/.test(t))return"football";
  if(/\bbike\b|\bcycle|\bspin\b/.test(t))return"bike";
  if(/pilates/.test(t))return"pilates";
  if(/recovery|\brest\b|\bwalk\b|\bmobil/.test(t))return"recovery";
  if(/sauna|pool|steam/.test(t))return"sauna";
  if(/\bwork\b|office|meeting/.test(t))return"work";
  return"other";
}

function saveState(state){

    fetch(SYNC_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:j}).catch(()=>{});

}

// ── Health / Macro helpers ──────────────────────────────────────
function calcTDEE(profile){
  const{weight=75,height=178,age=26,sex="male"}=profile||{};
  const bmr=sex==="female"
    ?447.593+9.247*weight+3.098*height-4.330*age
    :88.362+13.397*weight+4.799*height-5.677*age;
  return Math.round(bmr*1.725);
}
function calcDailyMacros(profile,tasks,date){
  const tdee=calcTDEE(profile);
  const strain=calcStrain(tasks,date);
  const trainingBonus=Math.round(strain*40);
  const targetCal=tdee+trainingBonus-300;
  const weight=profile?.weight||75;
  const protein=Math.round(weight*2.0);
  const fat=Math.round(weight*0.9);
  const highIntensity=tasks.some(t=>t.date===date&&["football","game","run"].includes(t.category));
  const carbsBase=Math.round((targetCal-protein*4-fat*9)/4);
  const carbs=highIntensity?Math.round(carbsBase*1.15):carbsBase;
  return{
    cal:Math.max(1500,targetCal),
    protein:Math.max(100,protein),
    carbs:Math.max(50,carbs),
    fat:Math.max(30,fat),
    tdee,trainingBonus,isHighIntensity:highIntensity,
  };
}

// ── Binaural / sleep audio ──────────────────────────────────────
let _audioCtx=null,_audioNodes=[];
function stopAudio(){
  _audioNodes.forEach(n=>{try{n.stop();}catch{}});
  _audioNodes=[];
  if(_audioCtx){_audioCtx.close();_audioCtx=null;}
}
function playAlarm(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  [0,0.5,1.0].forEach(t=>{
    const osc=ctx.createOscillator(),g=ctx.createGain();
    osc.frequency.value=880;osc.type="sine";
    g.gain.setValueAtTime(0.4,ctx.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.4);
    osc.connect(g);g.connect(ctx.destination);
    osc.start(ctx.currentTime+t);osc.stop(ctx.currentTime+t+0.45);
  });
}
function startBinauralAudio(mode){
  stopAudio();
  _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ctx=_audioCtx,beatFreq=mode==="nap"?6:2,carrier=200;
  const oscL=ctx.createOscillator(),gainL=ctx.createGain();
  const oscR=ctx.createOscillator(),gainR=ctx.createGain();
  const merger=ctx.createChannelMerger(2);
  oscL.frequency.value=carrier;oscL.type="sine";gainL.gain.value=0.13;
  oscR.frequency.value=carrier+beatFreq;oscR.type="sine";gainR.gain.value=0.13;
  oscL.connect(gainL);gainL.connect(merger,0,0);
  oscR.connect(gainR);gainR.connect(merger,0,1);
  // Pink noise
  const bsz=ctx.sampleRate*10,nb=ctx.createBuffer(1,bsz,ctx.sampleRate),nd=nb.getChannelData(0);
  let b=[0,0,0,0,0,0,0];
  for(let i=0;i<bsz;i++){
    const w=Math.random()*2-1;
    b[0]=0.99886*b[0]+w*0.0555179;b[1]=0.99332*b[1]+w*0.0750759;
    b[2]=0.96900*b[2]+w*0.1538520;b[3]=0.86650*b[3]+w*0.3104856;
    b[4]=0.55000*b[4]+w*0.5329522;b[5]=-0.7616*b[5]-w*0.0168980;
    nd[i]=(b[0]+b[1]+b[2]+b[3]+b[4]+b[5]+b[6]+w*0.5362)/7;b[6]=w*0.115926;
  }
  const ns=ctx.createBufferSource(),ng=ctx.createGain();
  ns.buffer=nb;ns.loop=true;ng.gain.value=0.035;
  ns.connect(ng);
  const master=ctx.createGain();
  master.gain.setValueAtTime(0,ctx.currentTime);
  master.gain.linearRampToValueAtTime(1,ctx.currentTime+30);
  merger.connect(master);ng.connect(master);master.connect(ctx.destination);
  oscL.start();oscR.start();ns.start();
  _audioNodes=[oscL,oscR,ns];
}

CONTEXT: You receive today's date/time, upcoming tasks (with IDs), week stats, constraints, habits.

KEY SCENARIOS:
① "MATCH CANCELLED"/"game cancelled"/"game is off":
  a) Find game task → deleteTask it
  b) Find taper/prep tasks (reduced sessions, wind-downs) → deleteTask or restore
  c) Replace with quality training: morning → addTask "Run 40min + 4 sprint strides [match cancelled]" cat:run
     evening → addTask "Football technique + fitness 50min [match cancelled]" cat:football + addTask "Pilates 20min" cat:pilates
  Reply: "Got it — match cancelled. Replaced with quality training. Nothing wasted."

② "GAME [day/time]":
  a) addTask match cat:game on correct date
  b) Day before: updateTask to reduce intensity (remove sprint refs)
  c) Day before: addTask "Early wind-down 9pm" at 20:30 cat:other
  d) Game day: addTask "Fuel + hydration check" at 12:00 cat:other
  e) Day after: addTask "Active recovery: walk + mobility 30min" at 06:10 cat:recovery

③ "TIRED/SORE/HEAVY LEGS":
  a) Replace today's hard sessions with "Easy walk + mobility 30min" cat:recovery
  b) Reduce tomorrow if high load

④ General: honour work hours, prefer 5–7am, no hard sessions back-to-back.

OUTPUT STRICT JSON ONLY:
{"reply":"1–3 sentence warm reply","actions":[...]}

ACTIONS:
{"type":"addTask","task":{"title":"...","date":"YYYY-MM-DD","time":"HH:MM","category":"...","notes":"..."}}
{"type":"updateTask","taskId":"...","changes":{"title":"...","time":"...","category":"...","notes":"..."}}
{"type":"deleteTask","taskId":"..."}
{"type":"completeTask","taskId":"..."}`;

function localCoach(msg,ctx){
  const m=msg.toLowerCase(),tasks=ctx.tasks||[],today=ctx.today,actions=[];let reply="";
  if(/match.cancel|game.cancel|game.is.off|game.off|no.game/.test(m)){
    const g=tasks.find(t=>t.date===today&&["game","football"].includes(t.category)&&!t.completed);
    if(g){
      actions.push({type:"deleteTask",taskId:g.id});
      actions.push({type:"addTask",task:{id:uid(),date:today,time:g.time||"18:00",title:"Run 40min + 4 sprint strides [match cancelled]",category:"run",notes:"Quality session to replace match.",completed:false,createdAt:Date.now()}});
      reply=`Game removed. Added a quality run session instead.\n\nYou've got a good training window — use it.`;
    }else{reply="No game on today's schedule. Add a quality session manually.";}
  }else if(/tired|exhausted|sore|heavy legs|low energy|knackered|drain/.test(m)){
    reply="Listen to your body today.\n\n• Swap the main session for 20min easy walk + mobility\n• Keep the session but drop intensity — Zone 1 only\n• Sauna + full rest if you're genuinely run-down\n\nRecovery is part of the plan.";
  }else if(/game.tomorrow|match.tomorrow/.test(m)){
    const tm=msg.match(/(\d{1,2})[:.h](\d{2})?\s*(am|pm)?/i);
    let t2="17:00";
    if(tm){let h=parseInt(tm[1]),mn=tm[2]?parseInt(tm[2]):0;if(tm[3]?.toLowerCase()==="pm"&&h<12)h+=12;t2=`${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`;}
    const tmrw=isoDate(addDays(new Date(),1));
    actions.push({type:"addTask",task:{id:uid(),date:tmrw,time:t2,title:"Game",category:"game",notes:"Match day.",completed:false,createdAt:Date.now()}});
    reply=`Game added for tomorrow at ${fmtTime(t2)}. Go light in the morning — no intense session.`;
  }else if(/^add\s+/i.test(msg.trim())){
    const title=msg.replace(/^add\s+/i,"").trim();
    actions.push({type:"addTask",task:{id:uid(),date:today,time:"",title,category:detectCat(title),notes:"",completed:false,createdAt:Date.now()}});
    reply=`Added "${title}" to today.`;
  }else if(/^(delete|remove)\s+/i.test(msg.trim())){
    const title=msg.replace(/^(delete|remove)\s+/i,"").trim().toLowerCase();
    const t=tasks.find(t=>t.date===today&&t.title.toLowerCase().includes(title));
    if(t){actions.push({type:"deleteTask",taskId:t.id});reply=`Deleted "${t.title}".`;}
    else reply=`Couldn't find a task matching "${title}" today.`;
  }else if(/what.should|next session|what.do|plan/.test(m)){
    const up=tasks.filter(t=>t.date===today&&!t.completed&&t.category!=="work").sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));
    reply=up.length?`Next up today:\n\n${up.slice(0,3).map(t=>`• ${t.time?fmtTime(t.time)+" — ":""}${t.title}`).join("\n")}\n\nStay on schedule.`:"Nothing left today. Good work or rest day — make it count.";
  }else{
    reply="I'm in offline mode — no AI connection.\n\nI can handle:\n• Match cancelled\n• Game tomorrow at 7pm\n• Add [session]\n• Delete [session]\n• What should I do\n• Feeling tired";
  }
  return{reply:reply+"\n\n_[offline mode]_",actions};
}

async function callCoach(msg,ctx){
  try{
    const res=await fetch("/api/coach",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg,context:ctx})});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(typeof data.reply==="string")return data;
    throw new Error("bad response");
  }catch{
    return localCoach(msg,ctx);
  }
}

function Ring({pct=0,size=48,stroke=3,color=T.accent,glow=false}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,dash=(Math.min(100,pct)/100)*circ;
  const glowId=`glow-${Math.round(size)}-${color.replace(/[^a-z0-9]/gi,"")}`;
  return html`<svg width=${size} height=${size} style=${{transform:"rotate(-90deg)",flexShrink:0}}>
    ${glow?html`<defs>
      <filter id=${glowId} x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>`:""}
    <circle cx=${size/2} cy=${size/2} r=${r} stroke="rgba(255,255,255,0.05)" stroke-width=${stroke} fill="none"/>
    <circle cx=${size/2} cy=${size/2} r=${r} stroke=${color} stroke-width=${stroke} fill="none"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
      filter=${glow?`url(#${glowId})`:"none"}
      style="transition:stroke-dasharray 0.6s cubic-bezier(0.34,1.2,0.64,1)"/>
  </svg>`;
}

function SleepModePanel({onClose}){
  const[mode,setMode]=useState("nap");
  const[napMins,setNapMins]=useState(20);
  const[running,setRunning]=useState(false);
  const[secsLeft,setSecsLeft]=useState(0);
  const[alarmFired,setAlarmFired]=useState(false);
  const intervalRef=useRef(null);

  const stop=useCallback(()=>{
    stopAudio();
    clearInterval(intervalRef.current);
    setRunning(false);
  },[]);

  useEffect(()=>{ return()=>{ stopAudio(); clearInterval(intervalRef.current); }; },[]);

  useEffect(()=>{
    if(!running)return;
    if(secsLeft<=0){
      stopAudio(); playAlarm(); setRunning(false); setAlarmFired(true);
      clearInterval(intervalRef.current);
      return;
    }
    intervalRef.current=setInterval(()=>setSecsLeft(s=>{ if(s<=1){clearInterval(intervalRef.current);return 0;} return s-1;}),1000);
    return()=>clearInterval(intervalRef.current);
  },[running]);

  const start=()=>{
    startBinauralAudio(mode);
    setAlarmFired(false);
    if(mode==="nap"){setSecsLeft(napMins*60);}else{setSecsLeft(0);}
    setRunning(true);
  };

  const mins=Math.floor(secsLeft/60),secs=secsLeft%60;
  const beatHz=mode==="nap"?"6Hz Theta":"2Hz Delta";
  const modeLabel=mode==="nap"?"Nap":"Wind Down";

  return html`<div style=${{
    position:"fixed",inset:0,zIndex:70,

// ── Day Strip ─────────────────────────────────────────────────
function DayStrip({tasks,habits,habitLogs,selectedDay,onSelectDay}){
  const todayStr=todayISO();
  const dates=getRecentDates(30);
  const containerRef=useRef(null);
  useEffect(()=>{
    const el=containerRef.current?.querySelector("[data-today]");
    if(el) el.scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});
  },[]);
  return html`<div ref=${containerRef} style=${{
    display:"flex",gap:5,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none",
    WebkitMaskImage:"linear-gradient(to right,transparent,black 12px,black 88%,transparent)",
    marginBottom:16,
  }}>
    ${dates.map(date=>{
      const pct=dayCompletionPct(tasks,date);
      const isToday=date===todayStr,isFuture=date>todayStr,isSel=date===selectedDay;
      const barH=pct!=null?Math.max(4,Math.round(pct/100*28)):0;
      const habitsToday=habits.filter(h=>h.days.includes(new Date(date+"T12:00:00").getDay()));
      const habDone=habitsToday.filter(h=>habitLogs[`${h.id}_${date}`]).length;
      const habPct=habitsToday.length?Math.round(habDone/habitsToday.length*100):null;
      const barColor=pct>=80?T.green:pct>=50?T.accent:pct!=null?T.amber:T.border;
      return html`<button key=${date} data-today=${isToday||undefined} onClick=${()=>onSelectDay(date===selectedDay?null:date)} style=${{
        flexShrink:0,width:46,padding:"8px 4px 6px",borderRadius:12,cursor:"pointer",fontFamily:"inherit",
        border:`1px solid ${isSel?T.accentBorder:isToday?"rgba(139,92,246,0.22)":T.border}`,
        background:isSel?T.accentGlow:isToday?"rgba(139,92,246,0.07)":"rgba(255,255,255,0.02)",
        opacity:isFuture?0.3:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
      }}>
        <span style=${{fontSize:9,fontWeight:800,color:isSel||isToday?T.accent:T.muted,letterSpacing:0.5}}>${fmtDayShort(date)[0]}</span>
        <span style=${{fontSize:12,fontWeight:900,color:isSel||isToday?T.text:T.muted}}>${fmtDateNum(date)}</span>
        <div style=${{width:22,height:32,display:"flex",flexDirection:"column",justifyContent:"flex-end",alignItems:"center"}}>
          ${pct!=null?html`<div style=${{width:6,borderRadius:3,background:barColor,height:barH+"px",transition:"height 0.3s"}}></div>`:
            html`<div style=${{width:6,height:3,borderRadius:3,background:T.border}}></div>`}
        </div>
        ${habPct!=null?html`<div style=${{width:5,height:5,borderRadius:99,background:habPct>=70?T.green:T.border}}></div>`:""}
      </button>`;
    })}
  </div>`;
}

// ── Day Detail Panel ──────────────────────────────────────────
function DayDetailPanel({date,tasks,habits,habitLogs,healthLogs,notes,onToggleTask,onEditTask,onSaveNote}){
  const [noteText,setNoteText]=useState(notes[date]||"");
  const dayTasks=tasks.filter(t=>t.date===date&&t.category!=="work").sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));
  const dayHabits=habits.filter(h=>h.days.includes(new Date(date+"T12:00:00").getDay()));
  const log=healthLogs[date];
  const recovery=log?calcRecovery(log):null;
  return html`<div style=${{...S.card,marginBottom:14,borderColor:"rgba(139,92,246,0.18)"}}>
    <div style=${{fontSize:10,fontWeight:800,color:T.accent,letterSpacing:1.8,marginBottom:12}}>${fmtDayLong(date).toUpperCase()}</div>

    ${dayTasks.length===0?html`<div style=${{fontSize:12,color:T.muted,marginBottom:10}}>No sessions this day.</div>`:""}
    ${dayTasks.map(t=>html`<div key=${t.id} style=${{marginBottom:5}}><${TaskItem} task=${t} onToggle=${onToggleTask} onEdit=${onEditTask}/></div>`)}

    ${dayHabits.length>0?html`
      <div style=${{display:"flex",gap:5,flexWrap:"wrap",marginTop:8,marginBottom:8}}>
        ${dayHabits.map(h=>{
          const done=!!habitLogs[`${h.id}_${date}`];
          return html`<div key=${h.id} style=${{
            display:"flex",alignItems:"center",gap:5,padding:"4px 9px",borderRadius:99,
            background:done?T.greenGlow:"rgba(255,255,255,0.03)",
            border:`1px solid ${done?T.greenBorder:T.border}`,fontSize:11,color:done?T.green:T.muted,
          }}>
            <span>${h.emoji}</span><span style=${{fontWeight:700}}>${h.title}</span>
            ${done?html`<span style=${{fontSize:10}}>✓</span>`:""}
          </div>`;
        })}
      </div>`:""}

    ${log?html`
      <div style=${{display:"flex",gap:10,fontSize:11,color:T.muted,marginBottom:8,flexWrap:"wrap"}}>
        ${recovery!=null?html`<span style=${{color:recovery>=67?T.green:recovery>=34?T.amber:T.red}}>◉ ${recovery}% recovery</span>`:""}
        ${log.sleep?html`<span>Sleep ${Math.round(calcSleepMins(log.sleep.bedtime,log.sleep.wakeTime)/60*10)/10}h</span>`:""}
        ${log.energy?html`<span>Energy ${log.energy}/5</span>`:""}

    <textarea value=${noteText}
      onInput=${e=>setNoteText(e.target.value)}

// ── Weekly Review ─────────────────────────────────────────────
function WeeklyReview({tasks,habits,habitLogs,healthLogs,settings}){
  const weekDates=getWeekDates(),todayStr=todayISO();
  const cats=Object.entries(settings.weekTargets||{}).filter(([,t])=>t>0);
  const callouts=getCallouts(tasks,habits,habitLogs,settings,weekDates);
  // Avg recovery this week
  const recoveries=weekDates.map(d=>healthLogs[d]?calcRecovery(healthLogs[d]):null).filter(v=>v!=null);
  const avgRecovery=recoveries.length?Math.round(recoveries.reduce((a,b)=>a+b,0)/recoveries.length):null;
  // Habit consistency
  const allScheduled=habits.flatMap(h=>weekDates.filter(d=>h.days.includes(new Date(d+"T12:00:00").getDay())));
  const allDone=habits.flatMap(h=>weekDates.filter(d=>h.days.includes(new Date(d+"T12:00:00").getDay())&&habitLogs[`${h.id}_${d}`]));
  const habitScore=allScheduled.length?Math.round(allDone.length/allScheduled.length*100):null;

  return html`<div style=${{marginBottom:20}}>
    <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8,marginBottom:12}}>THIS WEEK</div>

    <!-- Category bars -->
    <div style=${{...S.card,marginBottom:10}}>
      ${cats.map(([cat,target])=>{
        const done=tasks.filter(t=>weekDates.includes(t.date)&&t.category===cat&&t.completed).length;
        const pct=Math.min(100,Math.round(done/target*100));
        const color=pct>=80?T.green:pct>=50?T.amber:T.red;
        const catColor=CATS[cat]?.color||T.muted;
        return html`<div key=${cat} style=${{marginBottom:14}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style=${{display:"flex",alignItems:"center",gap:8}}>
              <span style=${{fontSize:13,color:catColor,filter:`drop-shadow(0 0 4px ${catColor}66)`}}>${CATS[cat]?.icon||cat}</span>
              <span style=${{fontSize:12,fontWeight:800,color:T.textSoft,letterSpacing:-0.1}}>${CATS[cat]?.label||cat}</span>
            </div>
            <span style=${{fontSize:12,fontWeight:800,color,fontVariantNumeric:"tabular-nums"}}>${done}<span style=${{color:T.muted,fontWeight:600}}>/${target}</span></span>
          </div>
          <div style=${{height:4,borderRadius:99,background:"rgba(255,255,255,0.05)",overflow:"hidden"}}>
            <div style=${{
              height:"100%",borderRadius:99,width:pct+"%",transition:"width 0.6s cubic-bezier(0.34,1.2,0.64,1)",
              background:pct>=80
                ?`linear-gradient(90deg,${T.green},rgba(52,211,153,0.7))`
                :pct>=50
                ?`linear-gradient(90deg,${T.amber},rgba(251,191,36,0.7))`
                :`linear-gradient(90deg,${T.red},rgba(248,113,113,0.7))`,
              boxShadow:pct>0?`0 0 8px ${color}66`:"none",
            }}></div>
          </div>
        </div>`;
      })}
      <div style=${{display:"flex",gap:16,marginTop:4}}>
        ${habitScore!=null?html`<span style=${{fontSize:11,color:T.muted}}>Habits <span style=${{color:habitScore>=70?T.green:T.amber,fontWeight:700}}>${habitScore}%</span></span>`:""}
        ${avgRecovery!=null?html`<span style=${{fontSize:11,color:T.muted}}>Recovery <span style=${{color:avgRecovery>=67?T.green:avgRecovery>=34?T.amber:T.red,fontWeight:700}}>${avgRecovery}%</span></span>`:""}
      </div>
    </div>

    <!-- Callouts -->
    ${callouts.length>0?html`
      <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8,marginBottom:8}}>NEEDS IMPROVEMENT</div>
      ${callouts.map((c,i)=>html`<div key=${i} style=${{
        display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:12,marginBottom:6,
        background:"rgba(239,68,68,0.05)",border:"1px solid rgba(239,68,68,0.14)",
      }}>
        <span style=${{fontSize:13,color:c.type==="cat"?CATS[c.cat]?.color:T.amber}}>
          ${c.type==="cat"?CATS[c.cat]?.icon:c.habit.emoji}
        </span>
        <div style=${{flex:1}}>
          <div style=${{fontSize:12,fontWeight:700,color:T.text}}>
            ${c.type==="cat"?`${CATS[c.cat]?.label}: ${c.done}/${c.target} sessions`:c.habit.title}
          </div>
          <div style=${{fontSize:10,color:T.muted,marginTop:1}}>
            ${c.pct}% complete — ${c.type==="cat"?`add ${c.target-c.done} more this week`:"habit consistency low"}
          </div>
        </div>
        <span style=${{fontSize:11,fontWeight:800,color:T.red}}>${c.pct}%</span>
      </div>`)}
    `:""}
    ${callouts.length===0?html`
      <div style=${{...S.card,textAlign:"center",padding:"14px",color:T.green,fontSize:12,fontWeight:700}}>
        ◉ On track — all targets at 80%+
      </div>`:""}
  </div>`;
}

// ── Month Calendar ────────────────────────────────────────────
function MonthCalendar({tasks,habits,habitLogs,notes,month,onPrevMonth,onNextMonth}){
  const {year,m}=month;
  const cells=getMonthGrid(year,m);
  const todayStr=todayISO();
  const monthName=new Date(year,m,1).toLocaleDateString("en-GB",{month:"long",year:"numeric"}).toUpperCase();
  const DAY_H=["M","T","W","T","F","S","S"];
  // Monthly category totals
  const monthDates=cells.filter(Boolean);
  const catTotals={};
  tasks.filter(t=>monthDates.includes(t.date)&&t.completed&&t.category!=="work").forEach(t=>{
    catTotals[t.category]=(catTotals[t.category]||0)+1;
  });

  return html`<div style=${{marginBottom:20}}>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
      <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8}}>${monthName}</div>
      <div style=${{display:"flex",gap:6}}>
        <${IconBtn} onClick=${onPrevMonth} style=${{width:30,height:30,fontSize:14}}>‹<//>
        <${IconBtn} onClick=${onNextMonth} style=${{width:30,height:30,fontSize:14}}>›<//>
      </div>
    </div>

    <div style=${{...S.card,padding:"14px 10px"}}>
      <!-- Day headers -->
      <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        ${DAY_H.map((d,i)=>html`<div key=${i} style=${{textAlign:"center",fontSize:9,fontWeight:800,color:T.muted,padding:"2px 0",letterSpacing:0.5}}>${d}</div>`)}
      </div>
      <!-- Day cells -->
      <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        ${cells.map((date,i)=>{
          if(!date) return html`<div key=${i}></div>`;
          const cnt=dayDoneCount(tasks,date);
          const isToday=date===todayStr,isFuture=date>todayStr;
          const hasNote=!!(notes||{})[date];
          const bg=cnt>=3?"rgba(16,185,129,0.35)":cnt===2?"rgba(139,92,246,0.28)":cnt===1?"rgba(139,92,246,0.14)":"rgba(255,255,255,0.03)";
          const borderC=isToday?T.accentBorder:T.border;
          return html`<div key=${date} style=${{
            aspectRatio:"1",borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",
            justifyContent:"center",position:"relative",
            background:isFuture?"transparent":bg,
            border:`1px solid ${borderC}`,
            opacity:isFuture?0.2:1,
          }}>
            <span style=${{fontSize:10,fontWeight:isToday?900:600,color:isToday?T.accent:cnt>0?T.text:T.muted}}>${fmtDateNum(date)}</span>
            ${hasNote?html`<div style=${{width:3,height:3,borderRadius:99,background:T.accent,position:"absolute",bottom:3}}></div>`:""}
          </div>`;
        })}
      </div>
    </div>

    <!-- Monthly totals -->
    ${Object.keys(catTotals).length>0?html`
      <div style=${{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
        ${Object.entries(catTotals).sort(([,a],[,b])=>b-a).map(([cat,n])=>html`
          <div key=${cat} style=${{
            display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:99,
            background:CATS[cat]?`${CATS[cat].color}12`:"rgba(255,255,255,0.04)",
            border:`1px solid ${CATS[cat]?.border||T.border}`,
          }}>
            <span style=${{fontSize:11,color:CATS[cat]?.color||T.muted}}>${CATS[cat]?.icon||cat}</span>
            <span style=${{fontSize:11,fontWeight:700,color:T.text}}>${n}</span>
            <span style=${{fontSize:10,color:T.muted}}>${CATS[cat]?.label||cat}</span>
          </div>`)}
      </div>`:""}

    <!-- Habit adherence -->
    ${habits.length>0?html`
      <div style=${{marginTop:12}}>
        <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8,marginBottom:8}}>HABIT ADHERENCE</div>
        ${habits.map(h=>{
          const pct=habitPctForDates(h,habitLogs,monthDates);
          if(pct===null) return null;
          return html`<div key=${h.id} style=${{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style=${{fontSize:14}}>${h.emoji}</span>
            <span style=${{fontSize:12,fontWeight:700,color:T.text,flex:1}}>${h.title}</span>
            <div style=${{width:60,height:3,borderRadius:99,background:"rgba(255,255,255,0.06)"}}>
              <div style=${{height:"100%",borderRadius:99,background:pct>=70?T.green:T.amber,width:pct+"%"}}></div>
            </div>
            <span style=${{fontSize:11,fontWeight:700,color:pct>=70?T.green:T.amber,minWidth:32,textAlign:"right"}}>${pct}%</span>
          </div>`;
        })}
      </div>`:""}
  </div>`;
}

// ── Review View ───────────────────────────────────────────────
function ReviewView({tasks,habits,habitLogs,healthLogs,notes,settings,onUpsertNote,onToggleTask,onEditTask,onAddForDate}){
  const [selectedDay,setSelectedDay]=useState(null);
  const now=new Date();
  const [reviewMonth,setReviewMonth]=useState({year:now.getFullYear(),m:now.getMonth()});

  function prevMonth(){
    setReviewMonth(({year,m})=>m===0?{year:year-1,m:11}:{year,m:m-1});
  }
  function nextMonth(){
    setReviewMonth(({year,m})=>m===11?{year:year+1,m:0}:{year,m:m+1});
  }

  return html`<div style=${{padding:"14px 14px 110px",maxWidth:820,margin:"0 auto"}}>
    <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8,marginBottom:14}}>REVIEW</div>

    <!-- Day strip -->
    <${DayStrip} tasks=${tasks} habits=${habits} habitLogs=${habitLogs} selectedDay=${selectedDay} onSelectDay=${setSelectedDay}/>

    <!-- Day detail panel -->
    ${selectedDay?html`<${DayDetailPanel}
      date=${selectedDay} tasks=${tasks} habits=${habits} habitLogs=${habitLogs}
      healthLogs=${healthLogs} notes=${notes||{}}
      onToggleTask=${onToggleTask} onEditTask=${onEditTask}
      onSaveNote=${(date,text)=>onUpsertNote(date,text)}
    />`:""}

    <!-- Weekly review -->
    <${WeeklyReview} tasks=${tasks} habits=${habits} habitLogs=${habitLogs} healthLogs=${healthLogs} settings=${settings}/>

    <!-- Month calendar -->
    <${MonthCalendar} tasks=${tasks} habits=${habits} habitLogs=${habitLogs} notes=${notes||{}} month=${reviewMonth} onPrevMonth=${prevMonth} onNextMonth=${nextMonth}/>
  </div>`;
}

// ── Habits View ───────────────────────────────────────────────
function HabitsView({habits,habitLogs,onToggleHabit,onEditHabit,onAddHabit}){
  const weekDates=getWeekDates(),todayStr=todayISO();
  const DAY_LABELS=["M","T","W","T","F","S","S"];
  return html`<div style=${{padding:"14px 14px 100px",maxWidth:820,margin:"0 auto"}}>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8}}>HABITS</div>
      <${Btn} onClick=${onAddHabit} variant="primary" style=${{fontSize:12,padding:"7px 14px"}}>+ Add<//>
    </div>
    ${habits.length===0?html`
      <div style=${{...S.card,textAlign:"center",padding:32,color:T.muted}}>
        <div style=${{fontSize:18,marginBottom:8,color:T.accent}}>◈</div>
        <div style=${{fontWeight:700,fontSize:14}}>No habits yet</div>
      </div>`
    :habits.map(h=>{
      const weekDone=weekDates.filter(d=>!!habitLogs[`${h.id}_${d}`]).length;
      let streak=0;const ti=weekDates.indexOf(todayStr);
      for(let i=ti>=0?ti:weekDates.length-1;i>=0;i--){if(habitLogs[`${h.id}_${weekDates[i]}`])streak++;else break;}
      return html`<div key=${h.id} className="sk-card" style=${{...S.card,marginBottom:8}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
          <div style=${{display:"flex",alignItems:"center",gap:10}}>

// ── Coach Panel ───────────────────────────────────────────────
function CoachPanel({isOpen,onClose,tasks,habits,habitLogs,settings,onApplyActions}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Coach ready.\n\nTell me what's changed:\n— Match cancelled — I'll swap it for quality training\n— Game tomorrow at 7pm\n— Feeling tired today\n— What should I do next?"}]);
  const [input,setInput]=useState(""); const [busy,setBusy]=useState(false);
  const bodyRef=useRef(null); const inputRef=useRef(null);
  useEffect(()=>{ if(isOpen) setTimeout(()=>inputRef.current?.focus(),100); },[isOpen]);
  useEffect(()=>{ if(bodyRef.current) bodyRef.current.scrollTop=bodyRef.current.scrollHeight; },[msgs,busy]);

  const buildCtx=useCallback(()=>{
    const now=new Date(),todayStr=todayISO(),weekDates=getWeekDates();
    const upcoming=tasks.filter(t=>t.date>=todayStr).sort((a,b)=>(`${a.date}${a.time||""}`).localeCompare(`${b.date}${b.time||""}`)).slice(0,60).map(t=>({id:t.id,title:t.title,date:t.date,time:t.time||null,category:t.category,completed:t.completed,planKey:t.planKey||null,notes:t.notes||""}));
    const weekStats={};tasks.filter(t=>weekDates.includes(t.date)).forEach(t=>{if(!weekStats[t.category])weekStats[t.category]={done:0,total:0};weekStats[t.category].total++;if(t.completed)weekStats[t.category].done++;});
    return{today:todayStr,dayOfWeek:now.toLocaleDateString("en-GB",{weekday:"long"}),timeNow:`${pad2(now.getHours())}:${pad2(now.getMinutes())}`,weekStats,weekTargets:settings.weekTargets,constraints:settings.constraints,upcomingTasks:upcoming,todayHabits:habits.filter(h=>h.days.includes(now.getDay())).map(h=>({id:h.id,title:h.title,done:!!habitLogs[`${h.id}_${todayStr}`]}))};
  },[tasks,habits,habitLogs,settings]);

  const QUICK=[
    {l:"Match cancelled",p:"Match cancelled"},
    {l:"Game tomorrow",p:"I have a game tomorrow evening"},
    {l:"Tired today",p:"I feel tired and heavy legged today"},
    {l:"What's next?",p:"What should I do next?"},
    {l:"Week check",p:"How is my week going so far?"},
    {l:"Rest day",p:"Make today a rest day"},
    {l:"Add sprints",p:"Add a sprint session today at 6am"},
  ];
  const send=async(text)=>{
    const t=text.trim(); if(!t||busy) return;
    setMsgs(p=>[...p,{role:"user",content:t}]); setInput(""); setBusy(true);
    try{
      const r=await callCoach(t,buildCtx());
      setMsgs(p=>[...p,{role:"assistant",content:r.reply}]);
      if(r.actions?.length){ onApplyActions(r.actions); showToast(`${r.actions.length} update${r.actions.length>1?"s":""} applied`); }
    }catch{setMsgs(p=>[...p,{role:"assistant",content:"Connection unavailable — try again."}]);}
    finally{setBusy(false);}
  };

  if(!isOpen) return null;
  return html`<div style=${{position:"fixed",inset:0,zIndex:80,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(16px)",display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick=${onClose}>
    <div style=${{background:"rgba(7,9,13,0.97)",backdropFilter:"blur(32px)",borderRadius:"22px 22px 0 0",border:"1px solid rgba(255,255,255,0.08)",borderBottom:"none",display:"flex",flexDirection:"column",maxHeight:"90vh",paddingBottom:"env(safe-area-inset-bottom)",boxShadow:"0 -24px 80px rgba(0,0,0,0.7)",animation:"slideUp 0.28s cubic-bezier(0.22,1,0.36,1)"}} onClick=${e=>e.stopPropagation()}>
      <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 16px 12px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
        <div style=${{display:"flex",alignItems:"center",gap:11}}>
          <div style=${{width:38,height:38,borderRadius:12,
            background:"rgba(139,92,246,0.12)",border:"1px solid rgba(139,92,246,0.28)",
            display:"grid",placeItems:"center",fontSize:16,color:T.accent,fontWeight:900}}>▸</div>
          <div>
            <div style=${{fontWeight:800,fontSize:15,color:T.text,letterSpacing:-0.3}}>Coach</div>
            <div style=${{fontSize:10,fontWeight:700,color:busy?T.amber:T.green,display:"flex",alignItems:"center",gap:4,letterSpacing:0.5}}>
              ${busy?html`<span style=${{animation:"pulseGlow 1s infinite"}}>◌</span> thinking`:html`<span>◉</span> ready`}
            </div>
          </div>
        </div>
        <${IconBtn} onClick=${onClose} style=${{color:T.muted}}>×<//>
      </div>
      <div ref=${bodyRef} style=${{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:10,minHeight:180}}>
        ${msgs.map((m,i)=>html`<div key=${i} style=${{
          alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"88%",padding:"10px 13px",
          borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",
          background:m.role==="user"?"rgba(139,92,246,0.12)":"rgba(255,255,255,0.04)",
          border:`1px solid ${m.role==="user"?"rgba(139,92,246,0.28)":"rgba(255,255,255,0.07)"}`,
          color:T.text,fontSize:14,lineHeight:1.55,whiteSpace:"pre-wrap",
        }}>

const STRAIN_WEIGHTS={game:3.5,football:3.5,run:2.5,bike:2.0,pilates:1.5,sauna:0.7,recovery:0.5,work:0,other:0.5};

function calcSleepMins(bedtime,wakeTime){
  if(!bedtime||!wakeTime)return null;
  const[bh,bm]=bedtime.split(":").map(Number);
  const[wh,wm]=wakeTime.split(":").map(Number);
  let m=(wh*60+wm)-(bh*60+bm);
  if(m<0)m+=1440;
  return m;
}
function calcRecovery(log){
  if(!log)return null;
  let pts=0,total=0;
  if(log.sleep?.bedtime&&log.sleep?.wakeTime){
    const mins=calcSleepMins(log.sleep.bedtime,log.sleep.wakeTime);
    if(mins!=null){const hrs=mins/60;pts+=Math.min(40,hrs>=8?40:40*(hrs/8));}
    total+=40;
  }
  if(log.sleep?.quality){pts+=(log.sleep.quality-1)/4*20;total+=20;}
  if(log.hrv){pts+=Math.min(25,Math.max(0,(log.hrv-30)/50*25));total+=25;}
  if(log.restingHR){pts+=Math.min(15,Math.max(0,(80-log.restingHR)/40*15));total+=15;}
  if(total===0)return null;
  return Math.round(pts/total*100);
}
function calcStrain(tasks,date){
  return tasks.filter(t=>t.date===date&&t.completed).reduce((s,t)=>s+(STRAIN_WEIGHTS[t.category]??0.5),0);
}
function recoveryColor(s){if(s==null)return T.muted;if(s>=67)return T.green;if(s>=34)return"#fbbf24";return T.red;}
function strainColor(s){if(s<7)return T.green;if(s<14)return"#fbbf24";return T.red;}

const FOOD_DB=[
  {keys:["half a chicken","half chicken"],cal:420,protein:52,carbs:0,fat:22},
  {keys:["chicken breast","chicken"],cal:330,protein:62,carbs:0,fat:7},
  {keys:["salmon fillet","salmon"],cal:280,protein:40,carbs:0,fat:13},
  {keys:["sweet potatoes","sweet potato"],cal:180,protein:3,carbs:41,fat:0},
  {keys:["white rice","rice"],cal:200,protein:4,carbs:44,fat:0},
  {keys:["scrambled eggs","poached eggs","boiled eggs","fried eggs","3 eggs","2 eggs","eggs","egg"],cal:220,protein:18,carbs:2,fat:15},
  {keys:["oatmeal","porridge","oats"],cal:300,protein:10,carbs:54,fat:5},
  {keys:["protein shake","whey shake","protein powder"],cal:200,protein:30,carbs:8,fat:3},
  {keys:["steak"],cal:320,protein:28,carbs:0,fat:22},
  {keys:["pasta"],cal:380,protein:13,carbs:72,fat:2},
  {keys:["broccoli"],cal:55,protein:4,carbs:11,fat:1},
  {keys:["avocado"],cal:240,protein:3,carbs:13,fat:22},
  {keys:["greek yogurt","yogurt"],cal:130,protein:12,carbs:9,fat:5},
  {keys:["banana"],cal:105,protein:1,carbs:27,fat:0},
  {keys:["brown bread","white bread","bread"],cal:160,protein:5,carbs:30,fat:2},
];
function estimateMacros(text){
  if(!text)return null;
  const t=text.toLowerCase();
  const matches=FOOD_DB.filter(f=>f.keys.some(k=>t.includes(k)));
  if(!matches.length)return null;
  return matches.reduce((a,f)=>({cal:a.cal+f.cal,protein:a.protein+f.protein,carbs:a.carbs+f.carbs,fat:a.fat+f.fat}),{cal:0,protein:0,carbs:0,fat:0});
}

function NutritionView({foodLogs,macroTargets,onUpsertFoodLog,tasks,settings,onUpdateSettings}){

  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({name:"",cal:"",protein:"",carbs:"",fat:""});
  const [foodText,setFoodText]=useState("");
  const [imgData,setImgData]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [aiSource,setAiSource]=useState(false);
  const [manualMode,setManualMode]=useState(false);
  const fileRef=useRef(null);

  const meals=(foodLogs[date]?.meals)||[];
  const totals=meals.reduce((a,m)=>({
    cal:a.cal+(+m.cal||0),protein:a.protein+(+m.protein||0),
    carbs:a.carbs+(+m.carbs||0),fat:a.fat+(+m.fat||0),
  }),{cal:0,protein:0,carbs:0,fat:0});

  const rec=calcDailyMacros(settings?.profile,tasks||[],date);
  const tgt=macroTargets||{cal:2500,protein:160,carbs:220,fat:70};

  const macroFields=[
    {key:"cal",     label:"Calories", unit:"kcal", color:T.accent},
    {key:"protein", label:"Protein",  unit:"g",    color:T.green},
    {key:"carbs",   label:"Carbs",    unit:"g",    color:T.amber},
    {key:"fat",     label:"Fat",      unit:"g",    color:T.blue},
  ];

  const resetNutritionForm=()=>{
    setForm({name:"",cal:"",protein:"",carbs:"",fat:""});
    setFoodText("");setImgData(null);setAnalyzing(false);setAiSource(false);setManualMode(false);
    setShowForm(false);
  };

  const handleImagePick=e=>{
    const file=e.target.files?.[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const dataUrl=ev.target.result;
      const[header,b64]=dataUrl.split(",");
      const mime=(header.match(/:(.*?);/)||[])[1]||"image/jpeg";
      if(file.size>800000){
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement("canvas");
          const scale=Math.min(1,Math.sqrt(800000/file.size));
          canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
          canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
          const resized=canvas.toDataURL(mime,0.85);
          const[,rb64]=resized.split(",");
          setImgData({base64:rb64,mimeType:mime,preview:resized});
        };
        img.src=dataUrl;
      }else{
        setImgData({base64:b64,mimeType:mime,preview:dataUrl});
      }
    };
    reader.readAsDataURL(file);
  };

  const analyseFood=async()=>{
    if(!foodText.trim()&&!imgData)return;
    setAnalyzing(true);
    try{
      const body=imgData?{imageBase64:imgData.base64,mimeType:imgData.mimeType}:{foodText:foodText.trim()};
      const res=await fetch("/api/nutrition",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      if(data.error){
        const est=estimateMacros(foodText);
        if(est){setForm({name:foodText.trim(),cal:String(est.cal),protein:String(est.protein),carbs:String(est.carbs),fat:String(est.fat)});setAiSource(true);showToast("Offline estimate used");}
        else{showToast("AI unavailable — enter macros manually");setManualMode(true);}
        return;
      }
      setForm({name:data.name,cal:String(data.cal),protein:String(data.protein),carbs:String(data.carbs),fat:String(data.fat)});
      setAiSource(true);
    }catch{
      const est=estimateMacros(foodText);
      if(est){setForm({name:foodText.trim(),cal:String(est.cal),protein:String(est.protein),carbs:String(est.carbs),fat:String(est.fat)});setAiSource(true);showToast("Offline estimate used");}
      else{showToast("AI unavailable — enter macros manually");setManualMode(true);}
    }finally{setAnalyzing(false);}
  };

  const addMeal=()=>{
    const name=(form.name||foodText).trim(); if(!name) return;
    const newMeals=[...meals,{id:uid(),name,cal:+form.cal||0,protein:+form.protein||0,carbs:+form.carbs||0,fat:+form.fat||0}];
    onUpsertFoodLog(date,newMeals);
    resetNutritionForm();
  };

      }}>‹</button>
      <div style=${{fontSize:13,fontWeight:800,color:T.text,letterSpacing:-0.2}}>
        ${date===todayISO()?"Today — ":""}${parseDate(date).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}
      </div>
      <button onClick=${()=>{ const next=isoDate(addDays(parseDate(date),1)); if(next<=todayISO()) setDate(next); }} style=${{
        background:"none",border:"none",color:date>=todayISO()?T.border:T.muted,fontSize:18,cursor:"pointer",padding:"4px 8px",fontFamily:"inherit"
      }}>›</button>
    </div>

    <!-- Recommended macros banner -->
    ${settings?.profile?.weight?html`<div style=${{
      ...S.card,marginBottom:10,
      background:rec.isHighIntensity?"linear-gradient(135deg,rgba(245,158,11,0.08),rgba(245,158,11,0.04))":"linear-gradient(135deg,rgba(52,211,153,0.08),rgba(52,211,153,0.03))",
      border:`1px solid ${rec.isHighIntensity?"rgba(245,158,11,0.22)":T.greenBorder}`,

      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div>
          <div style=${{fontSize:11,fontWeight:900,color:rec.isHighIntensity?"#f59e0b":T.green,letterSpacing:0.5}}>${rec.isHighIntensity?"⚡ Hard training day":"◎ Rest / recovery day"}</div>
          <div style=${{fontSize:10,color:T.muted,marginTop:2}}>TDEE ${rec.tdee}${rec.trainingBonus>0?` + ${rec.trainingBonus} training`:""} − 300 deficit</div>

          background:rec.isHighIntensity?"rgba(245,158,11,0.13)":T.greenGlow,

      </div>
      <div style=${{display:"flex",gap:6}}>
        ${[{l:"Cal",v:rec.cal,u:"kcal",c:T.accent},{l:"P",v:rec.protein,u:"g",c:T.green},{l:"C",v:rec.carbs,u:"g",c:"#f59e0b"},{l:"F",v:rec.fat,u:"g",c:T.blue}].map(m=>html`

const PLAN_PRESETS=[
  {name:"5K Starter",    desc:"Build your base",    startMins:20,sessionsPerWeek:3,totalWeeks:6},
  {name:"5K Builder",    desc:"Push to 5K",          startMins:25,sessionsPerWeek:3,totalWeeks:8},
  {name:"10K Prep",      desc:"Double the distance", startMins:30,sessionsPerWeek:4,totalWeeks:10},
  {name:"Half Marathon", desc:"Long game",            startMins:35,sessionsPerWeek:4,totalWeeks:12},
  {name:"Custom",        desc:"Set your own params", startMins:25,sessionsPerWeek:3,totalWeeks:8},
];

// Session type labels and day offsets per session count
const SESSION_CONFIG={
  2:{days:[0,4],types:[["Easy","Long"],["Tempo","Long"]]},
  3:{days:[0,2,4],types:[["Easy","Easy","Long"],["Easy","Tempo","Long"]]},
  4:{days:[0,1,3,5],types:[["Easy","Tempo","Easy","Long"],["Easy","Tempo","Easy","Long"]]},
  5:{days:[0,1,3,4,6],types:[["Easy","Tempo","Easy","Easy","Long"],["Easy","Tempo","Easy","Tempo","Long"]]},
};

const SESSION_NOTES={
  Easy:"Zone 2 — conversational pace, comfortable effort.",
  Tempo:"Comfortably hard — sustain for the full run.",
  Long:"Slow and steady — 60-90s/km slower than easy pace.",
};

function generatePlanTasks(plan){
  const tasks=[];
  const cfg=SESSION_CONFIG[plan.sessionsPerWeek]||SESSION_CONFIG[3];
  const days=cfg.days;
  const typeMatrix=cfg.types;
  const start=parseDate(plan.startDate);
  // Align start to Monday of that week
  const startDow=(start.getDay()+6)%7;
  const monday=addDays(start,-startDow);

  for(let w=0;w<plan.totalWeeks;w++){
    const weekMins=plan.startMins+(w*plan.incrementMins);
    const types=typeMatrix[w%typeMatrix.length];
    days.forEach((dayOffset,si)=>{
      const date=isoDate(addDays(monday,w*7+dayOffset));
      const type=types[si];
      tasks.push({
        id:uid(),
        date,
        time:"06:00",
        title:`Run ${weekMins}min — ${type}`,
        category:"run",
        notes:SESSION_NOTES[type],
        completed:false,
        planKey:`plan_${plan.id}_w${w}_s${si}`,
        createdAt:Date.now(),
      });
    });
  }
  return tasks;
}

function getPlanCurrentWeek(plan){
  const start=parseDate(plan.startDate);
  const now=new Date();
  const diff=Math.floor((startOfDay(now)-startOfDay(start))/(1000*60*60*24*7));
  return Math.max(0,Math.min(diff,plan.totalWeeks-1));
}

            </div>`)}
            ${totalWeeks>4?html`<div style=${{borderRadius:8,padding:"4px 10px",fontSize:12,color:T.muted}}>… → Wk ${totalWeeks}: <span style=${{color:T.blue,fontWeight:900}}>${finalMins}min</span></div>`:""}

          <${Btn} onClick=${()=>setStep(0)} variant="ghost">← Back<//>
          <${Btn} onClick=${confirm} variant="primary" style=${{flex:1}}>Start Plan ▶<//>
        </div>
      </div>
    `:""}
  <//>`;
}

function PlansSection({trainingPlans,tasks,onUpsertPlan,onDeletePlan}){
  const[wizardOpen,setWizardOpen]=useState(false);
  const[expandedId,setExpandedId]=useState(null);
  const today=todayISO();

  return html`<div>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style=${{fontSize:11,fontWeight:900,color:T.muted,letterSpacing:1.4}}>RUNNING PLANS</div>
      <${Btn} onClick=${()=>setWizardOpen(true)} variant="primary" style=${{fontSize:12,padding:"6px 14px"}}>+ New Plan<//>
    </div>

    ${(trainingPlans||[]).length===0?html`
      <div className="sk-card" style=${{...S.card,textAlign:"center",padding:24,marginBottom:12,background:T.accentGlow,border:`1px dashed ${T.accentBorder}`}}>
        <div style=${{fontSize:20,marginBottom:8,color:T.accent,fontWeight:900}}>▷</div>
        <div style=${{fontWeight:800,fontSize:14,color:T.text}}>No active plan</div>
        <div style=${{fontSize:12,color:T.muted,marginTop:4}}>Start a progressive running plan — each week adds ${5}min</div>
      </div>
    `:""}

    ${(trainingPlans||[]).map(plan=>{
      const curWeek=getPlanCurrentWeek(plan);
      const pct=Math.round((curWeek+1)/plan.totalWeeks*100);
      const weekMins=plan.startMins+curWeek*plan.incrementMins;
      const isExpanded=expandedId===plan.id;
      const planTasks=tasks.filter(t=>(t.planKey||"").startsWith(`plan_${plan.id}`));
      const completedTasks=planTasks.filter(t=>t.completed).length;

      return html`<div key=${plan.id} className="sk-card" style=${{...S.card,marginBottom:12,border:`1px solid ${T.blueBorder}44`}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div style=${{flex:1}}>
            <div style=${{fontWeight:900,fontSize:15,color:T.text,letterSpacing:-0.2}}>${plan.name}</div>
            <div style=${{fontSize:12,color:T.muted,marginTop:2}}>Week ${curWeek+1} of ${plan.totalWeeks} · ${weekMins}min runs this week</div>
            <!-- Progress bar -->
            <div style=${{marginTop:10,height:4,borderRadius:99,background:`${T.blue}20`}}>
              <div style=${{height:"100%",borderRadius:99,background:`linear-gradient(90deg,${T.blue},#22d3ee)`,width:`${pct}%`,transition:"width 0.5s ease",boxShadow:`0 0 8px ${T.blue}55`}}></div>
            </div>
            <div style=${{marginTop:4,fontSize:11,color:T.muted,display:"flex",justifyContent:"space-between"}}>
              <span>${completedTasks} sessions done</span><span>${pct}% complete</span>
            </div>
          </div>
          <div style=${{flexShrink:0}}>
            <${Ring} pct=${pct} size=${44} stroke=${3.5} color=${T.blue} glow=${true}/>
          </div>
        </div>

        <div style=${{display:"flex",gap:8,marginTop:14}}>
          <button onClick=${()=>setExpandedId(isExpanded?null:plan.id)} style=${{flex:1,padding:"7px 12px",borderRadius:10,border:`1px solid ${T.border}`,background:T.surface,color:T.muted,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12}}>
            ${isExpanded?"▲ Hide weeks":"▼ View all weeks"}
          </button>
          <${Btn} onClick=${()=>{if(confirm(`End "${plan.name}"? This will remove all future plan sessions.`))onDeletePlan(plan.id);}} variant="danger" style=${{fontSize:12,padding:"7px 14px"}}>End plan<//>
        </div>

        ${isExpanded?html`
          <div style=${{marginTop:12,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:6}}>
            ${Array.from({length:plan.totalWeeks},(_,w)=>{
              const wMins=plan.startMins+w*plan.incrementMins;
              const isCur=w===curWeek;
              const isPast=w<curWeek;
              return html`<div key=${w} style=${{padding:"8px 10px",borderRadius:11,border:`1px solid ${isCur?T.blueBorder:T.border}`,background:isCur?T.blueGlow:isPast?"rgba(255,255,255,0.02)":T.surface}}>
                <div style=${{fontSize:10,fontWeight:800,color:isCur?T.blue:T.muted,letterSpacing:0.5}}>WK ${w+1}${isCur?" ●":isPast?" ✓":""}</div>
                <div style=${{fontSize:14,fontWeight:900,color:isCur?T.blue:isPast?T.muted:T.text,marginTop:2}}>${wMins}min</div>
                <div style=${{fontSize:10,color:T.muted,marginTop:1}}>${plan.sessionsPerWeek}× runs</div>
              </div>`;
            })}
          </div>
        `:""}
      </div>`;
    })}

    ${wizardOpen?html`<${PlanWizardModal}
      onSave=${plan=>{
        const newTasks=generatePlanTasks(plan);
        onUpsertPlan(plan,newTasks);
        showToast(`▶ ${plan.name} started! ${newTasks.length} sessions added.`);
      }}
      onClose=${()=>setWizardOpen(false)}
    />`:""}
  </div>`;
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState(null); const [ready,setReady]=useState(false);
  const [view,setView]=useState("today"); const [coachOpen,setCoachOpen]=useState(false);
  const [taskModal,setTaskModal]=useState(null); const [habitModal,setHabitModal]=useState(null);
  const [syncStatus,setSyncStatus]=useState(null);
  const toastReady=useCallback(fn=>{ _toast.fn=fn; },[]);

  useEffect(()=>{
    loadState().then(saved=>{
      if(saved){
        // Handle URL action params (for widget tap actions)
        const sp=new URLSearchParams(window.location.search);
        const action=sp.get("action");
        const taskId=sp.get("taskId");
        const habitId=sp.get("habitId");
        if(action==="completeNext"){
          const today=todayISO(); let marked=false;
          saved.tasks=(saved.tasks||[]).map(t=>{
            if(marked||t.date!==today||t.completed||t.category==="work")return t;
            marked=true; return{...t,completed:true,completedAt:Date.now()};
          });
          if(marked) setTimeout(()=>showToast("Task completed ✓"),400);
        }
        if(action==="complete"&&taskId){
          saved.tasks=(saved.tasks||[]).map(t=>t.id===taskId?{...t,completed:true,completedAt:Date.now()}:t);
          setTimeout(()=>showToast("Task completed ✓"),400);
        }
        if(action==="toggleHabit"&&habitId){
          const key=`${habitId}_${todayISO()}`;
          saved.habitLogs={...saved.habitLogs,[key]:!saved.habitLogs?.[key]};
          setTimeout(()=>showToast("Habit updated ✓"),400);
        }
        if(action) window.history.replaceState({},"",window.location.pathname);
        // Apple Health iOS Shortcut sync: ?hk=1&hrv=65&rhr=52&date=2026-03-14&sleep=22:00-06:30&sq=4
        if(sp.get("hk")==="1"){
          const hkDate=sp.get("date")||todayISO();
          const hkPatch={syncedAt:Date.now()};
          if(sp.get("hrv"))hkPatch.hrv=Number(sp.get("hrv"));
          if(sp.get("rhr"))hkPatch.restingHR=Number(sp.get("rhr"));
          if(sp.get("hr"))hkPatch.liveHR=Number(sp.get("hr"));
          if(sp.get("sleep")){
            const[bed,wake]=sp.get("sleep").split("-");
            hkPatch.sleep={bedtime:bed,wakeTime:wake,quality:Number(sp.get("sq")||3)};
          }
          saved.healthLogs={...saved.healthLogs,[hkDate]:{...saved.healthLogs?.[hkDate],...hkPatch}};
          window.history.replaceState({},"",window.location.pathname);
          setTimeout(()=>showToast("Apple Health synced"),500);
        }
        setState({tasks:[],habits:[],habitLogs:{},healthLogs:{},foodLogs:{},notes:{},goals:[],trainingPlans:[],settings:DEF_SETTINGS,...saved,foodLogs:saved.foodLogs||{},notes:saved.notes||{},settings:{...DEF_SETTINGS,...saved?.settings}});
      } else {
        setState({tasks:seedTasks(),habits:seedHabits(),habitLogs:{},healthLogs:{},foodLogs:{},notes:{},goals:[],trainingPlans:[],settings:{...DEF_SETTINGS}});
      }
      setReady(true);
      // Check sync
      fetch(SYNC_URL).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("offline"));
    });
  },[]);

  useEffect(()=>{ if(ready&&state) saveState(state); },[state,ready]);
  useEffect(()=>{
    if(!state) return;
    if(state.settings?.notifEnabled){
      scheduleTaskReminders(state.tasks||[]);
      scheduleWellnessReminders(state.settings?.constraints?.bed);
    } else {
      _clearNotifTimers();
    }
    return _clearNotifTimers;
  },[state?.tasks, state?.settings?.notifEnabled, state?.settings?.constraints?.bed]);

  const mut=useCallback(fn=>setState(p=>({...p,...fn(p)})),[]);
  const toggleTask=useCallback(id=>mut(s=>({tasks:s.tasks.map(t=>t.id===id?{...t,completed:!t.completed,completedAt:!t.completed?Date.now():null}:t)})),[mut]);
  const upsertTask=useCallback(task=>mut(s=>{const i=s.tasks.findIndex(t=>t.id===task.id);if(i>=0){const tasks=[...s.tasks];tasks[i]={...tasks[i],...task};return{tasks};}return{tasks:[...s.tasks,task]};}),[mut]);
  const deleteTask=useCallback(id=>mut(s=>({tasks:s.tasks.filter(t=>t.id!==id)})),[mut]);
  const toggleHabit=useCallback((hid,date)=>mut(s=>({habitLogs:{...s.habitLogs,[`${hid}_${date}`]:!s.habitLogs[`${hid}_${date}`]}})),[mut]);
  const upsertHabit=useCallback(h=>mut(s=>{const i=s.habits.findIndex(x=>x.id===h.id);if(i>=0){const habits=[...s.habits];habits[i]={...habits[i],...h};return{habits};}return{habits:[...s.habits,h]};}),[mut]);
  const deleteHabit=useCallback(id=>mut(s=>({habits:s.habits.filter(h=>h.id!==id)})),[mut]);
  const upsertHealthLog=useCallback((date,patch)=>mut(s=>({healthLogs:{...s.healthLogs,[date]:{...s.healthLogs[date],...patch}}})),[mut]);
  const upsertFoodLog=useCallback((date,meals)=>mut(s=>({foodLogs:{...s.foodLogs,[date]:{meals}}})),[mut]);
  const upsertNote=useCallback((date,text)=>mut(s=>({notes:{...s.notes,[date]:text}})),[mut]);
  const upsertPlan=useCallback((plan,newTasks)=>mut(s=>({trainingPlans:[...(s.trainingPlans||[]).filter(p=>p.id!==plan.id),plan],tasks:[...s.tasks,...(newTasks||[])]})),[mut]);
  const deletePlan=useCallback(planId=>mut(s=>({trainingPlans:(s.trainingPlans||[]).filter(p=>p.id!==planId),tasks:s.tasks.filter(t=>!(t.planKey||"").startsWith(`plan_${planId}`))})),[mut]);
  const applyActions=useCallback(actions=>mut(s=>{
    let tasks=[...s.tasks];
    for(const a of actions){
      if(a.type==="addTask"&&a.task) tasks.push({id:uid(),completed:false,planKey:"",createdAt:Date.now(),...a.task,category:a.task.category||detectCat(a.task.title||"")});
      else if(a.type==="updateTask"&&a.taskId) tasks=tasks.map(t=>t.id===a.taskId?{...t,...a.changes}:t);
      else if(a.type==="deleteTask"&&a.taskId) tasks=tasks.filter(t=>t.id!==a.taskId);
      else if(a.type==="completeTask"&&a.taskId) tasks=tasks.map(t=>t.id===a.taskId?{...t,completed:true,completedAt:Date.now()}:t);
    }
    return{tasks};
  }),[mut]);

  if(!ready||!state) return html`<div style=${{
    height:"100vh",display:"grid",placeItems:"center",
    background:"radial-gradient(ellipse 80% 70% at 30% 20%,rgba(139,92,246,0.12),transparent 60%),radial-gradient(ellipse 60% 60% at 80% 80%,rgba(52,211,153,0.08),transparent 60%),#05070f",
    color:T.muted}}>
    <div style=${{textAlign:"center",animation:"fadeUp 0.6s ease"}}>
      <div style=${{
        width:56,height:56,borderRadius:18,margin:"0 auto 16px",

        boxShadow:"0 0 32px rgba(167,139,250,0.2)",

        <span style=${{fontWeight:900,fontSize:16,color:T.accent}}>FD</span>
      </div>
      <div style=${{fontWeight:900,letterSpacing:-0.5,fontSize:17,color:T.text}}>Feliz Dias</div>
      <div style=${{fontSize:9,color:T.muted,marginTop:6,fontWeight:800,letterSpacing:2.2,textTransform:"uppercase"}}>Loading</div>
    </div>
  </div>`;

  const NAV=[{id:"today",icon:"◉",label:"Today"},{id:"week",icon:"◫",label:"Review"},{id:"habits",icon:"◈",label:"Habits"},{id:"health",icon:"♦",label:"Health"},{id:"settings",icon:"⊙",label:"More"}];
  const weekDates=getWeekDates();
  const wTotal=state.tasks.filter(t=>weekDates.includes(t.date)&&t.category!=="work").length;
  const wDone=state.tasks.filter(t=>weekDates.includes(t.date)&&t.completed&&t.category!=="work").length;

  return html`<div style=${{background:T.bg,minHeight:"100vh",color:T.text,fontFamily:"ui-rounded,ui-sans-serif,system-ui,-apple-system,sans-serif"}}>

        background:"radial-gradient(ellipse,rgba(139,92,246,0.13) 0%,rgba(109,40,217,0.06) 40%,transparent 68%)",
        animation:"opalShift 8s ease-in-out infinite"}}/>
      <!-- Mint-teal — middle right -->
      <div style=${{position:"absolute",top:"28%",right:"-14%",width:560,height:560,borderRadius:"50%",
        background:"radial-gradient(ellipse,rgba(52,211,153,0.09) 0%,rgba(16,185,129,0.04) 45%,transparent 68%)",
        animation:"opalShift 11s ease-in-out infinite 2s"}}/>
      <!-- Rose-champagne — bottom left -->
      <div style=${{position:"absolute",bottom:"-5%",left:"-5%",width:480,height:480,borderRadius:"50%",

      <!-- Sky-blue — center -->
      <div style=${{position:"absolute",top:"55%",left:"30%",width:440,height:440,borderRadius:"50%",

      <!-- Amber-gold — top right -->
      <div style=${{position:"absolute",top:"8%",right:"8%",width:320,height:320,borderRadius:"50%",

          flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
          padding:"8px 4px 7px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${view===v.id?"rgba(167,139,250,0.25)":"transparent"}`,
          background:view===v.id
            ?"linear-gradient(145deg,rgba(167,139,250,0.14),rgba(167,139,250,0.07))"
            :"transparent",
          color:view===v.id?T.accent:T.muted,
          boxShadow:view===v.id?"0 0 16px rgba(167,139,250,0.10)":"none",
          transition:"background 0.2s,border-color 0.2s,color 0.2s,box-shadow 0.2s",
        }}>
          <span style=${{
            fontSize:15,
            filter:view===v.id?`drop-shadow(0 0 6px ${T.accent}88)`:"none",
            transition:"filter 0.2s",
          }}>${v.icon}</span>
          <span style=${{fontSize:8,fontWeight:900,letterSpacing:0.8,textTransform:"uppercase"}}>${v.label}</span>
        </button>`)}
        <button onClick=${()=>setCoachOpen(true)} style=${{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
          padding:"8px 4px 7px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",
          border:"1px solid rgba(167,139,250,0.30)",
          background:"linear-gradient(145deg,rgba(167,139,250,0.18),rgba(109,40,217,0.10))",
          color:T.accent,
          boxShadow:"0 0 20px rgba(167,139,250,0.14),0 1px 0 rgba(255,255,255,0.06) inset",
        }}>
          <span style=${{fontSize:16,filter:`drop-shadow(0 0 6px ${T.accent})`}}>⚡</span>
          <span style=${{fontSize:8,fontWeight:900,letterSpacing:0.8,textTransform:"uppercase"}}>Coach</span>
        </button>
      </nav>
    </div>

    ${taskModal?html`<${TaskModal} task=${taskModal.task} initialDate=${taskModal.date}
      onSave=${t=>{upsertTask(t);setTaskModal(null);showToast(taskModal.task?"Updated":"Added");}}
      onDelete=${id=>{deleteTask(id);setTaskModal(null);showToast("Deleted");}}
      onClose=${()=>setTaskModal(null)}/>`:""}
    ${habitModal?html`<${HabitModal} habit=${habitModal.isNew?null:habitModal}
      onSave=${h=>{upsertHabit(h);setHabitModal(null);showToast(habitModal.isNew?"Habit added":"Updated");}}
      onDelete=${id=>{deleteHabit(id);setHabitModal(null);showToast("Deleted");}}
      onClose=${()=>setHabitModal(null)}/>`:""}

    <${CoachPanel} isOpen=${coachOpen} onClose=${()=>setCoachOpen(false)}
      tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs}
      settings=${state.settings} onApplyActions=${applyActions}/>

    <${Toast} onReady=${toastReady}/>
  </div>`;
}

// ── Boot ──────────────────────────────────────────────────────
render(html`<${App}/>`, document.getElementById("app"));

// Service worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}
</script>
</body>
</html>
