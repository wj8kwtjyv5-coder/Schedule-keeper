// ── Design tokens ────────────────────────────────────────────

// ── Utils ──────────────────────────────────────────────────
const pad2 = n => String(n).padStart(2,"0");
const uid = () => crypto?.randomUUID?.() ?? Math.random().toString(36).slice(2)+Date.now().toString(36);
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; };
const isoDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const parseDate = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const startOfDay = d => new Date(d.getFullYear(),d.getMonth(),d.getDate());
const fmtTime = t => { if(!t)return""; const [h,m]=t.split(":").map(Number); return `${h%12||12}:${pad2(m)}${h>=12?"pm":"am"}`; };
const fmtDayShort = s => parseDate(s).toLocaleDateString("en-GB",{weekday:"short"});
const fmtDayLong = s => parseDate(s).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
const fmtDateNum = s => parseDate(s).getDate();

function getWeekDates(from=new Date()){
  const d=startOfDay(from); const dow=(d.getDay()+6)%7; const mon=addDays(d,-dow);
  return Array.from({length:7},(_,i)=>isoDate(addDays(mon,i)));
}
function detectCat(title=""){
  const t=title.toLowerCase();
  if(/\bgame\b|\bmatch\b|\bvs\b/.test(t))return"game";
  if(/\brun\b|\bjog\b|\bsprint\b|\bstride/.test(t))return"run";
  if(/football|soccer/.test(t))return"football";
  if(/\bbike\b|\bcycle|\bspin\b/.test(t))return"bike";
  if(/pilates/.test(t))return"pilates";
  if(/recovery|\brest\b|\bwalk\b|\bmobil/.test(t))return"recovery";
  if(/sauna|pool|steam/.test(t))return"sauna";
  if(/\bwork\b|office|meeting/.test(t))return"work";
  return"other";
}

// ── Sync ────────────────────────────────────────────────────
const SK_KEY="sk2";
const SYNC_URL="/.netlify/functions/sync";

async function loadState(){
  try{ const r=await window.storage?.get(SK_KEY); if(r?.value)return JSON.parse(r.value); }catch{}
  try{ const r=localStorage.getItem(SK_KEY); if(r)return JSON.parse(r); }catch{}
  return null;
}
const _saveBuf={timer:null};
function saveState(state){
  const j=JSON.stringify(state);
  try{ window.storage?.set(SK_KEY,j); }catch{}
  try{ localStorage.setItem(SK_KEY,j); }catch{}
  // Debounced sync to Netlify (for widget)
  clearTimeout(_saveBuf.timer);
  _saveBuf.timer=setTimeout(()=>{
    fetch(SYNC_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:j}).catch(()=>{});
  },1500);
}

// ── Seed data ────────────────────────────────────────────────
function seedTasks(){
  const tasks=[],week=getWeekDates();
  const push=(date,time,title,category,notes="",planKey="")=>
    tasks.push({id:uid(),date,time,title,category,notes,completed:false,planKey,createdAt:Date.now()});
  week.forEach((date,dow)=>{
    if(dow<5){
      const we=["17:00","16:00","17:00","16:00","14:00"][dow];
      push(date,"08:00","Work","work","",`work_${dow}`);
      push(date,we,"Work ends","work","Free window",`wend_${dow}`);
      const runs=[
        ["06:00","Run 30min + 3 sprints (10–12s)","run","Easy pace. Full walk between.","run_mon"],
        ["06:00","Run 30min easy","run","Conversational pace.","run_tue"],
        ["06:00","Bike 35min Zone 2 + 6×10s spin-ups","bike","Fast legs, low resistance.","bike_wed"],
        ["06:00","Run 35min + 3 sprints (10–12s)","run","Crisp sprints.","run_thu"],
        ["06:00","Run 30min easy + 4 strides","run","Relaxed, perfect form.","run_fri"],
      ];
      push(date,...runs[dow]);
      if(dow===1) push(date,"06:40","Pilates 20min","pilates","Core + control.","pil_tue");
      push(date,["18:00","18:00","18:00","18:00","15:30"][dow],"Football session","football","","foot_"+dow);
    }else if(dow===5){
      push(date,"06:10","Active recovery: walk + mobility 45min","recovery","","rec_sat");
      push(date,"06:25","Pilates 30min","pilates","Treat as recovery.","pil_sat");
      push(date,"06:55","Bike easy Zone 1–2 (25min)","bike","Easy spin.","bike_sat");
    }else{
      push(date,"06:10","Active recovery: walk + mobility 45min","recovery","","rec_sun");
      push(date,"06:55","Bike easy Zone 1–2 (25min)","bike","Easy spin.","bike_sun");
    }
  });
  return tasks;
}
function seedHabits(){ return [
  {id:uid(),title:"Wake at 5am",emoji:"⏰",days:[0,1,2,3,4,5,6]},
  {id:uid(),title:"Prayer + Bible",emoji:"✝️",days:[0,1,2,3,4,5,6]},
  {id:uid(),title:"Mobility 10min",emoji:"🤸",days:[0,1,2,3,4,5,6]},
  {id:uid(),title:"Sauna + pool",emoji:"♨️",days:[0,1,2,3,4,5,6]},
  {id:uid(),title:"Eat clean",emoji:"🥗",days:[0,1,2,3,4,5,6]},
  {id:uid(),title:"Bed by 9pm",emoji:"🌙",days:[0,1,2,3,4,5,6]},
];}
const DEF_SETTINGS={weekTargets:{run:5,football:5,bike:3,pilates:2,recovery:2,sauna:5},constraints:{wake:"05:00",bed:"21:00"}};

// ── Coach (Claude) ────────────────────────────────────────────
const SYSTEM=`You are Coach — a sharp, adaptive performance coach for a dedicated football player.

PROFILE: Trains 5–7am + evenings. Work Mon/Wed 8–5, Tue/Thu 8–4, Fri 8–2. Wake 5am, bed 9pm.
Weekly targets: 5×runs, 5×football, 3×bike, 2×pilates, 2×recovery, 5×sauna.

CONTEXT: You receive today's date/time, upcoming tasks (with IDs), week stats, constraints, habits.

KEY SCENARIOS:
① "MATCH CANCELLED"/"game cancelled"/"game is off":
  a) Find game task → deleteTask it
  b) Find taper/prep tasks (reduced sessions, wind-downs) → deleteTask or restore
  c) Replace with quality training: morning → addTask "Run 40min + 4 sprint strides [match cancelled]" cat:run
     evening → addTask "Football technique + fitness 50min [match cancelled]" cat:football + addTask "Pilates 20min" cat:pilates
  Reply: "Got it — match cancelled. Replaced with quality training. Nothing wasted."

② "GAME [day/time]":
  a) addTask match cat:game on correct date
  b) Day before: updateTask to reduce intensity (remove sprint refs)
  c) Day before: addTask "Early wind-down 9pm" at 20:30 cat:other
  d) Game day: addTask "Fuel + hydration check" at 12:00 cat:other
  e) Day after: addTask "Active recovery: walk + mobility 30min" at 06:10 cat:recovery

③ "TIRED/SORE/HEAVY LEGS":
  a) Replace today's hard sessions with "Easy walk + mobility 30min" cat:recovery
  b) Reduce tomorrow if high load

④ General: honour work hours, prefer 5–7am, no hard sessions back-to-back.

OUTPUT STRICT JSON ONLY:
{"reply":"1–3 sentence warm reply","actions":[...]}

ACTIONS:
{"type":"addTask","task":{"title":"...","date":"YYYY-MM-DD","time":"HH:MM","category":"...","notes":"..."}}
{"type":"updateTask","taskId":"...","changes":{"title":"...","time":"...","category":"...","notes":"..."}}
{"type":"deleteTask","taskId":"..."}
{"type":"completeTask","taskId":"..."}`;

// ── Jarvis local coach ────────────────────────────────────────
function localCoach(msg,ctx){
  const m=msg.toLowerCase().replace(/['']/g,"'").trim();
  const today=ctx.today;
  const tomorrow=(()=>{const d=new Date(today);d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);})();
  const tasks=ctx.upcomingTasks||[];
  const weekStats=ctx.weekStats||{};
  const targets=ctx.weekTargets||{};
  const callouts=ctx.callouts||[];
  const habitHistory=ctx.habitHistory||[];
  const loadToday=ctx.loadToday||0;
  const missedTasks=ctx.missedTasks||[];
  const timeNow=ctx.timeNow||"00:00";
  const [curH]=timeNow.split(":").map(Number);

  // Entity helpers
  const DAY_MAP={monday:0,tuesday:1,wednesday:2,thursday:3,friday:4,saturday:5,sunday:6,
    mon:0,tue:1,wed:2,thu:3,fri:4,sat:5,sun:6,
    today:null,tomorrow:1};
  function parseTime(s){
    const m12=/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i.exec(s);
    if(m12){let h=+m12[1],min=+(m12[2]||0);if(m12[3].toLowerCase()==="pm"&&h!==12)h+=12;if(m12[3].toLowerCase()==="am"&&h===12)h=0;return`${String(h).padStart(2,"0")}:${String(min).padStart(2,"0")}`;}
    const m24=/\b(\d{1,2}):(\d{2})\b/.exec(s);
    if(m24)return`${String(+m24[1]).padStart(2,"0")}:${m24[2]}`;
    return null;
  }
  function dateForDay(dayWord){
    if(dayWord==="today"||dayWord===null)return today;
    if(dayWord==="tomorrow")return tomorrow;
    const targetDow=DAY_MAP[dayWord];
    if(targetDow===undefined)return today;
    const now=new Date(today);
    const curDow=(now.getDay()+6)%7; // Mon=0
    let diff=(targetDow-curDow+7)%7||7;
    const d=new Date(now);d.setDate(d.getDate()+diff);
    return d.toISOString().slice(0,10);
  }
  function extractDay(s){
    const keys=Object.keys(DAY_MAP);for(const k of keys){if(s.includes(k))return k;}return null;
  }
  function extractTime(s){return parseTime(s)||null;}
  function findTask(date,cats){
    return tasks.find(t=>t.date===date&&cats.includes(t.category)&&!t.completed)||null;
  }
  function findTasks(date,cats){
    return tasks.filter(t=>t.date===date&&(cats?cats.includes(t.category):true)&&!t.completed);
  }
  function delTask(t){return t?{type:"deleteTask",taskId:t.id}:null;}
  function addTask(title,date,time,category,notes=""){return{type:"addTask",task:{title,date,time,category,notes}};}
  function updateTask(t,changes){return t?{type:"updateTask",taskId:t.id,changes}:null;}

  // Proactive callout note (appended to any reply if game tomorrow)
  const gameTomorrow=callouts.find(c=>c.date===tomorrow);
  const proactiveNote=gameTomorrow?`\n\nHeads up — you have a game tomorrow (${gameTomorrow.time?gameTomorrow.title+" at "+gameTomorrow.time:gameTomorrow.title}). Keeping today sharp but not heavy.`:"";

  // ── SCENARIO GROUPS ──────────────────────────────────────────

  // 1. Match / game cancelled
  if(/match\s*cancel|game\s*(cancel|off|called\s*off|not\s*on)|no\s*(game|match)\s*(today|tonight)/i.test(m)){
    const gameTask=findTask(today,["game"]);
    const todayRunTask=findTask(today,["run"]);
    const acts=[];
    if(gameTask)acts.push(delTask(gameTask));
    // Remove any pre-match prep tasks added today
    findTasks(today,["other"]).forEach(t=>{if(/wind.?down|fuel|hydration|taper/i.test(t.title))acts.push(delTask(t));});
    // Restore quality training
    const mornTime=todayRunTask?"06:30":"06:00";
    acts.push(addTask("Run 40min + 4 sprint strides [match cancelled]",today,mornTime,"run","High quality. Nothing wasted."));
    acts.push(addTask("Football technique + fitness 50min [match cancelled]",today,"18:00","football","Full intensity. Treat it like a performance day."));
    acts.push(addTask("Pilates 20min",today,"19:15","pilates","Core. Control."));
    return{handled:true,reply:"Match off — quality day it is. Run at "+mornTime+", football technique at 6pm, pilates after. Nothing wasted.",actions:acts.filter(Boolean)};
  }

  // 2. Game / match added
  const gameAddMatch=/(?:game|match|fixture)\s*(is\s*)?(on\s+|tomorrow|today|tonight|monday|tuesday|wednesday|thursday|friday|saturday|sunday)?(?:\s*at\s*)?(\d{1,2}(?::\d{2})?\s*(?:am|pm)?)?/i.exec(m);
  if(gameAddMatch&&/\b(game|match|fixture)\b/.test(m)&&!/cancel|off|called/.test(m)&&!/cancelled|cancell/.test(m)){
    const dayWord=extractDay(m)||"today";
    const gameDate=dateForDay(dayWord);
    const gameTime=extractTime(m)||"15:00";
    const prevDay=(()=>{const d=new Date(gameDate);d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);})();
    const nextDay=(()=>{const d=new Date(gameDate);d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);})();
    const acts=[];
    acts.push(addTask("Match",gameDate,gameTime,"game","Performance day. Trust the prep."));
    acts.push(addTask("Fuel + hydration check",gameDate,"12:00","other","Eat well. Stay hydrated."));
    acts.push(addTask("Early wind-down",prevDay,"20:30","other","Lights out by 9pm."));
    acts.push(addTask("Active recovery: walk + mobility 30min",nextDay,"06:10","recovery","Flush the legs."));
    const label=gameDate===today?"today":gameDate===tomorrow?"tomorrow":dayWord;
    return{handled:true,reply:`Game locked in ${label} at ${gameTime}. I've added fuel check, an early wind-down the night before, and recovery the morning after.`,actions:acts};
  }

  // 3. Tired / fatigued / heavy legs / sore
  if(/\b(tired|fatigued|heavy\s*legs?|sore|exhausted|wrecked|dead\s*legs?|drained|no\s*energy)\b/.test(m)){
    const hardCats=["run","football","bike"];
    const hardToday=findTasks(today,hardCats);
    const acts=hardToday.map(t=>delTask(t));
    acts.push(addTask("Easy walk + mobility 30min",today,"06:10","recovery","Flush the legs. No intensity."));
    const reply=loadToday>3
      ?"You've had a heavy day. Wiping the hard sessions — easy walk and mobility only. Let the body speak."+proactiveNote
      :"Noted. Swapping today's hard work for easy recovery. Rest is training too."+proactiveNote;
    return{handled:true,reply,actions:acts.filter(Boolean)};
  }

  // 4. Rest day / day off
  if(/\b(rest\s*day|day\s*off|take\s*(the\s*)?day\s*off|no\s*training\s*today|nothing\s*today)\b/.test(m)){
    const hardToday=findTasks(today,["run","football","bike","pilates"]);
    const acts=hardToday.map(t=>delTask(t));
    acts.push(addTask("Active recovery: walk + mobility 45min",today,"06:10","recovery","Easy movement. Recharge."));
    return{handled:true,reply:"Rest day sorted. Cleared the hard sessions, added easy mobility. You'll come back sharper.",actions:acts.filter(Boolean)};
  }

  // 5. Feeling good / fresh / energised
  if(/\b(feeling\s*(good|great|fresh|strong|energised|energized|brilliant)|legs?\s*(feel|are)\s*(good|great|fresh)|ready\s*to\s*go)\b/.test(m)){
    const acts=[];
    if(weekStats.run&&(weekStats.run.total||0)<(targets.run||5)){
      acts.push(addTask("Extra sprint drills 20min",today,"06:30","run","You're feeling it — push on."));
    }
    return{handled:true,reply:"Good to hear — energy like that doesn't come every day. I've added a short sprint drill to capitalise on it."+(acts.length===0?" Keep the plan as is, everything looks good.":""),actions:acts};
  }

  // 6. Injury / pain
  if(/\b(injur|pain|hurt|strain|pull|tweak|ankle|knee|hamstring|groin|calf|back)\b/.test(m)){
    const hardToday=findTasks(today,["run","football","bike"]);
    const acts=hardToday.map(t=>delTask(t));
    acts.push(addTask("Mobility + gentle walk 20min",today,"06:10","recovery","No load. Listen to the body."));
    acts.push(addTask("Physio / self-massage 15min",today,"19:00","recovery","Focus on the affected area."));
    return{handled:true,reply:"Injury flag noted. Hard sessions cleared for today. Easy mobility and self-care only — don't rush back. If it persists, see a physio.",actions:acts.filter(Boolean)};
  }

  // 7. What's next / what should I do
  if(/\b(what'?s?\s*(next|should\s*i\s*do|do\s*i\s*do)|next\s*task|what\s*now|what\s*do\s*i\s*do)\b/.test(m)){
    const remaining=tasks.filter(t=>t.date===today&&!t.completed&&t.category!=="work").sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));
    if(remaining.length===0)return{handled:true,reply:"Nothing left on today's list — you're done! Rest up, eat well, sleep early.",actions:[]};
    const next=remaining[0];
    const cat=next.category;
    const tips={run:"Keep the pace honest. Form over speed.",football:"Focus on touch and positioning.",bike:"Stay in Zone 2 unless it's a sprint day.",pilates:"Control over rush.",recovery:"Easy is exactly right.",sauna:"Hydrate well before and after.",other:""};
    return{handled:true,reply:`Next up: ${next.title}${next.time?" at "+next.time:""} (${cat}). ${tips[cat]||""}`.trim()+proactiveNote,actions:[]};
  }

  // 8. Week check / how's my week / am I on track
  if(/\b(how'?s?\s*(my\s*)?week|week\s*(check|going|look|stat)|am\s*i\s*on\s*track|week\s*progress|how\s*am\s*i\s*doing)\b/.test(m)){
    const lines=[];
    let onTrack=true;
    Object.entries(targets).forEach(([cat,target])=>{
      const stat=weekStats[cat]||{done:0,total:0};
      const done=stat.done||0;
      const pct=target>0?Math.round((done/target)*100):100;
      if(pct<60)onTrack=false;
      lines.push(`${CATS[cat]?.emoji||"•"} ${cat}: ${done}/${target} (${pct}%)`);
    });
    const verdict=onTrack?"You're on track.":"A few gaps to close.";
    return{handled:true,reply:`${verdict}\n${lines.join(" | ")}`,actions:[]};
  }

  // 9. What did I miss / missed sessions
  if(/\b(what\s*(did\s*i\s*)?miss|missed\s*(session|training|workout)|sessions?\s*missed)\b/.test(m)){
    if(missedTasks.length===0)return{handled:true,reply:"Nothing missed from the last 3 days. Consistent work.",actions:[]};
    const list=missedTasks.slice(0,4).map(t=>`${t.title} (${t.date})`).join(", ");
    return{handled:true,reply:`Missed in the last 3 days: ${list}. Don't chase them — just stay consistent from here.`,actions:[]};
  }

  // 10. What's tomorrow like / plan for [day]
  const planForMatch=/\b(what'?s?\s*(tomorrow|the plan for|plan\s*for|schedule\s*for))\b/.exec(m)||/\bplan\s*for\s*(monday|tuesday|wednesday|thursday|friday|saturday|sunday|tomorrow)\b/.exec(m);
  if(planForMatch){
    const dayWord=extractDay(m)||"tomorrow";
    const targetDate=dateForDay(dayWord==="tomorrow"?"tomorrow":dayWord);
    const dayTasks=tasks.filter(t=>t.date===targetDate&&t.category!=="work").sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));
    if(dayTasks.length===0)return{handled:true,reply:`Nothing scheduled for ${dayWord} yet. Want me to build a session?`,actions:[]};
    const list=dayTasks.slice(0,5).map(t=>`${CATS[t.category]?.emoji||"•"} ${t.title}${t.time?" at "+t.time:""}`).join(", ");
    return{handled:true,reply:`${dayWord.charAt(0).toUpperCase()+dayWord.slice(1)}: ${list}.`,actions:[]};
  }

  // 11. Skip / cancel a specific session
  const skipMatch=/\b(skip|cancel|drop|remove|delete)\s+(the\s+)?(morning|evening|run|football|bike|pilates|recovery|sauna)\b/.exec(m);
  if(skipMatch){
    const catWord=skipMatch[3];
    const catMap={morning:["run","bike","pilates"],evening:["football"],run:["run"],football:["football"],bike:["bike"],pilates:["pilates"],recovery:["recovery"],sauna:["sauna"]};
    const cats=catMap[catWord]||["other"];
    const task=findTask(today,cats);
    if(task)return{handled:true,reply:`${task.title} removed from today.`,actions:[delTask(task)]};
    return{handled:true,reply:`No ${catWord} session found for today.`,actions:[]};
  }

  // 12. Add a specific session type
  const addMatch=/\b(add|schedule|put\s*in|book)\s+(a\s+|an\s+)?(run|jog|sprint|football|soccer|bike|cycle|pilates|yoga|recovery|walk|sauna|pool|mobility|gym|swim)\b/.exec(m);
  if(addMatch){
    const word=addMatch[3];
    const catMap={run:"run",jog:"run",sprint:"run",football:"football",soccer:"football",bike:"bike",cycle:"bike",pilates:"pilates",yoga:"pilates",recovery:"recovery",walk:"recovery",sauna:"sauna",pool:"sauna",mobility:"recovery",gym:"other",swim:"recovery"};
    const cat=catMap[word]||"other";
    const t=extractTime(m)||(curH<12?"06:00":"18:00");
    const dayWord=extractDay(m)||"today";
    const date=dateForDay(dayWord);
    const titleMap={run:"Run 30min",jog:"Easy jog 25min",sprint:"Sprint drills 20min",football:"Football session",soccer:"Football session",bike:"Bike 35min Zone 2",cycle:"Bike 35min Zone 2",pilates:"Pilates 20min",yoga:"Pilates / yoga 20min",recovery:"Active recovery: walk + mobility 30min",walk:"Easy walk 20min",sauna:"Sauna + pool",pool:"Sauna + pool",mobility:"Mobility 15min",gym:"Gym session",swim:"Swimming 30min"};
    return{handled:true,reply:`Added: ${titleMap[word]||word} at ${t}${date!==today?" on "+date:""}.`,actions:[addTask(titleMap[word]||word,date,t,cat)]};
  }

  // 13. Move / reschedule a session
  const moveMatch=/\b(move|shift|reschedule|change)\s+(the\s+)?(run|football|bike|pilates|recovery|sauna|session|morning|evening)\s+(to\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm)?)/i.exec(m);
  if(moveMatch){
    const catWord=moveMatch[3];
    const newTime=parseTime(moveMatch[5]);
    if(newTime){
      const catMap={run:["run"],football:["football"],bike:["bike"],pilates:["pilates"],recovery:["recovery"],sauna:["sauna"],morning:["run","bike","pilates"],evening:["football"],session:["run","football","bike","pilates"]};
      const cats=catMap[catWord.toLowerCase()]||["run"];
      const task=findTask(today,cats);
      if(task)return{handled:true,reply:`Moved ${task.title} to ${newTime}.`,actions:[updateTask(task,{time:newTime})]};
    }
  }

  // 14. Bed early / wind-down
  if(/\b(bed\s*early|early\s*(bed|night)|wind.?down|sleep\s*early|lights?\s*out\s*early)\b/.test(m)){
    return{handled:true,reply:"Wind-down added for 8:30pm. Lights out by 9. Good sleep is the best recovery.",actions:[addTask("Early wind-down",today,"20:30","other","Off screens. Prep kit. Breathe.")]};
  }

  // 15. Add sauna / pool
  if(/\b(sauna|steam|cold\s*plunge|ice\s*bath|pool\s*(session)?)\b/.test(m)&&!/add|schedule/.test(m)){
    return{handled:true,reply:"Sauna added. Hydrate before, cold finish if you can.",actions:[addTask("Sauna + pool",today,"19:00","sauna","")]};
  }

  // 16. Double session / extra training
  if(/\b(double\s*session|two\s*sessions?|extra\s*training|extra\s*session|second\s*session)\b/.test(m)){
    const t=curH<12?"18:00":"07:00";
    return{handled:true,reply:`Extra session added at ${t}. Big day — fuel up and sleep well tonight.`,actions:[addTask("Extra training session",today,t,"football","Double day. Stay focused.")]};
  }

  // 17. Pre-match taper check (game in 1-2 days)
  if(/\b(taper|pre.?match|before\s*the\s*game|day\s*before|light\s*day)\b/.test(m)){
    const hardToday=findTasks(today,["run","football","bike"]);
    const acts=hardToday.map(t=>updateTask(t,{notes:"Pre-match: reduce intensity by 30%. No sprints."}));
    return{handled:true,reply:"Taper mode. Softening today's sessions — reduce intensity, no sprints, sharp touches only.",actions:acts.filter(Boolean)};
  }

  // 18. No football today / skip football
  if(/\bno\s*football\s*(today|tonight)?\b|\bskip\s*(the\s*)?football\b/.test(m)){
    const task=findTask(today,["football"]);
    if(task)return{handled:true,reply:"Football session removed from today.",actions:[delTask(task)]};
    return{handled:true,reply:"No football session found for today.",actions:[]};
  }

  // 19. How many [cat] this week
  const countMatch=/\bhow\s*many\s*(runs?|football|sessions?|bikes?|pilates|sauna)\s*(this\s*week|done)?\b/.exec(m);
  if(countMatch){
    const word=countMatch[1].replace(/s$/,"");
    const catMap={run:"run",football:"football",session:"run",bike:"bike",pilates:"pilates",sauna:"sauna"};
    const cat=catMap[word];
    if(cat){const s=weekStats[cat]||{done:0,total:0};return{handled:true,reply:`${CATS[cat]?.emoji||""} ${cat}: ${s.done||0} done this week, ${s.total||0} total scheduled. Target: ${targets[cat]||"?"}.`,actions:[]};}
  }

  // 20. Habit check
  if(/\b(habit|habits|habit\s*check|how\s*(are\s*)?my\s*habits?)\b/.test(m)){
    if(habitHistory.length===0)return{handled:true,reply:"No habits tracked yet. Add some in the Habits tab.",actions:[]};
    const lines=habitHistory.map(h=>`${h.emoji||"•"} ${h.title}: ${h.doneToday?"✓":"✗"} today${h.streak>1?`, ${h.streak}-day streak`:""}`);
    return{handled:true,reply:"Habits today:\n"+lines.join("\n"),actions:[]};
  }

  // 21. Morning session reminder
  if(/\b(morning\s*session|early\s*session|6am|5am|am\s*session)\b/.test(m)&&/add|schedule|remind|book/.test(m)){
    const t=extractTime(m)||"06:00";
    return{handled:true,reply:`Morning session added at ${t}. Early work compounds.`,actions:[addTask("Morning session",today,t,"run","")]};
  }

  // 22. Football session added specifically
  if(/\b(football\s*tonight|evening\s*football|football\s*at\s*\d|add\s*football)\b/.test(m)){
    const t=extractTime(m)||"18:00";
    const dayWord=extractDay(m)||"today";
    return{handled:true,reply:`Football session added at ${t}.`,actions:[addTask("Football session",dateForDay(dayWord),t,"football","")]};
  }

  // 23. Free day / nothing today
  if(/\b(free\s*day|nothing\s*planned|empty\s*day|no\s*sessions?\s*today)\b/.test(m)){
    return{handled:true,reply:"Today's clean. Good time for quality rest, mobility, or an easy walk if you want to move.",actions:[]};
  }

  // 24. Eat clean / meal prep
  if(/\b(eat\s*clean|clean\s*eating|meal\s*prep|nutrition\s*today|fuel\s*(up|today))\b/.test(m)){
    return{handled:true,reply:"Eat clean reminder added. Performance starts in the kitchen.",actions:[addTask("Eat clean today",today,"12:00","other","High protein. No junk.")]};
  }

  // 25. Sleep / recovery tonight
  if(/\b(sleep\s*(well|tonight|early)|recover\s*(tonight|well)|prioritise\s*sleep)\b/.test(m)){
    return{handled:true,reply:"Good call. Added a 9pm wind-down. Sleep is the #1 recovery tool.",actions:[addTask("Wind-down + sleep by 9pm",today,"20:30","other","No screens. Legs up.")]};
  }

  // 26. Proactive check if 0 tasks done and it's past noon
  if(curH>=14&&/^\s*(hi|hey|hello|what'?s?\s*up|yo)\s*[!.?]?\s*$/.test(m)){
    const done=tasks.filter(t=>t.date===today&&t.completed).length;
    const total=tasks.filter(t=>t.date===today&&t.category!=="work").length;
    if(done===0&&total>0)return{handled:true,reply:`Hey. It's ${timeNow} and none of today's ${total} sessions are done yet. Still time — what's the situation?`,actions:[]};
    if(total===0)return{handled:true,reply:"Hey. Nothing scheduled today — want me to build a session?",actions:[]};
    return{handled:true,reply:`Hey. ${done}/${total} sessions done. ${done===total?"Solid day.":"Keep going — you've got this."}`,actions:[]};
  }

  // 27. Streak acknowledgement
  const longestStreak=habitHistory.reduce((max,h)=>Math.max(max,h.streak||0),0);
  if(longestStreak>=5&&/\b(streak|habits?\s*going|how\s*consistent)\b/.test(m)){
    return{handled:true,reply:`You're on a ${longestStreak}-day streak on your best habit. That's elite consistency — don't break it.`,actions:[]};
  }

  return{handled:false};
}

async function callCoach(msg,ctx){
  // Try Jarvis local first — no API cost, instant, works offline
  const local=localCoach(msg,ctx);
  if(local.handled)return local;
  // Fall back to Claude API for novel/complex requests
  try{
    const res=await fetch("/.netlify/functions/coach",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg,context:ctx})});
    const data=await res.json();
    if(typeof data.reply==="string")return data;
  }catch{}
  return{reply:"Can't reach the server right now. Try rephrasing or check your connection.",actions:[]};
}

function Ring({pct=0,size=48,stroke=3.2,color=T.accent}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,dash=(Math.min(100,pct)/100)*circ;
  return html`<svg width=${size} height=${size} style="transform:rotate(-90deg);flex-shrink:0">
    <circle cx=${size/2} cy=${size/2} r=${r} stroke="rgba(255,255,255,0.08)" stroke-width=${stroke} fill="none"/>
    <circle cx=${size/2} cy=${size/2} r=${r} stroke=${color} stroke-width=${stroke} fill="none"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray 0.4s"/>
  </svg>`;
}

const _toast={fn:null};

function Toast({onReady}){
  const [msg,setMsg]=useState(""); const [vis,setVis]=useState(false); const t=useRef();
  useEffect(()=>{ onReady(m=>{setMsg(m);setVis(true);clearTimeout(t.current);t.current=setTimeout(()=>setVis(false),2600);}); },[]);
  if(!vis) return null;
  return html`<div style=${{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",
    background:"rgba(10,12,22,0.96)",border:`1px solid ${T.borderActive}`,

        <div style=${{display:"flex",gap:5,marginTop:12}}>
          ${weekDates.map((date,i)=>{

            return html`<button key=${date} onClick=${()=>onToggleHabit(h.id,date)} style=${{

              border:`1px solid ${done?T.greenBorder:isToday?T.borderActive:T.border}`,

                ${done?html`<span style=${{fontSize:10,color:T.green}}>✓</span>`:""}
              </div>
            </button>`;
          })}
        </div>
      </div>`;
    })}
  </div>`;
}

// ── Coach Panel ───────────────────────────────────────────────
function CoachPanel({isOpen,onClose,tasks,habits,habitLogs,settings,onApplyActions}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hey! I'm Coach 🤖\n\nTell me what's changed:\n• \"Match cancelled\" — I'll swap it for quality training\n• \"I have a game tomorrow at 7pm\"\n• \"I feel tired today\"\n• \"What should I do next?\""}]);
  const [input,setInput]=useState(""); const [busy,setBusy]=useState(false);
  const bodyRef=useRef(null); const inputRef=useRef(null);
  useEffect(()=>{ if(isOpen) setTimeout(()=>inputRef.current?.focus(),100); },[isOpen]);
  useEffect(()=>{ if(bodyRef.current) bodyRef.current.scrollTop=bodyRef.current.scrollHeight; },[msgs,busy]);

  const buildCtx=useCallback(()=>{
    const now=new Date(),todayStr=todayISO(),weekDates=getWeekDates();
    const upcoming=tasks.filter(t=>t.date>=todayStr).sort((a,b)=>(`${a.date}${a.time||""}`).localeCompare(`${b.date}${b.time||""}`)).slice(0,60).map(t=>({id:t.id,title:t.title,date:t.date,time:t.time||null,category:t.category,completed:t.completed,planKey:t.planKey||null,notes:t.notes||""}));
    const weekStats={};tasks.filter(t=>weekDates.includes(t.date)).forEach(t=>{if(!weekStats[t.category])weekStats[t.category]={done:0,total:0};weekStats[t.category].total++;if(t.completed)weekStats[t.category].done++;});
    // Habit history with streaks
    const habitHistory=habits.filter(h=>h.days.includes(now.getDay())).map(h=>{
      let streak=0;
      for(let i=1;i<=30;i++){const d=new Date(now);d.setDate(d.getDate()-i);const k=`${h.id}_${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;if(habitLogs[k])streak++;else break;}
      return{id:h.id,title:h.title,emoji:h.emoji||"",doneToday:!!habitLogs[`${h.id}_${todayStr}`],streak};
    });
    // Callouts: games within next 3 days
    const in3=(()=>{const d=new Date(now);d.setDate(d.getDate()+3);return d.toISOString().slice(0,10);})();
    const callouts=tasks.filter(t=>t.category==="game"&&t.date>=todayStr&&t.date<=in3&&!t.completed).sort((a,b)=>a.date.localeCompare(b.date)).map(t=>({id:t.id,title:t.title,date:t.date,time:t.time||null}));
    // Load signals
    const loadToday=tasks.filter(t=>t.date===todayStr&&t.category!=="work").length;
    const yst=(()=>{const d=new Date(now);d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);})();
    const loadYesterday=tasks.filter(t=>t.date===yst&&t.category!=="work").length;
    // Missed tasks from last 3 days
    const missedTasks=tasks.filter(t=>{
      if(t.date>=todayStr||t.completed||t.category==="work")return false;
      const d=new Date(now);d.setDate(d.getDate()-3);
      return t.date>=d.toISOString().slice(0,10);
    }).map(t=>({id:t.id,title:t.title,date:t.date,category:t.category}));
    return{today:todayStr,dayOfWeek:now.toLocaleDateString("en-GB",{weekday:"long"}),timeNow:`${pad2(now.getHours())}:${pad2(now.getMinutes())}`,weekStats,weekTargets:settings.weekTargets,constraints:settings.constraints,upcomingTasks:upcoming,todayHabits:habitHistory,habitHistory,callouts,loadToday,loadYesterday,missedTasks};
  },[tasks,habits,habitLogs,settings]);

  const QUICK=[
    {l:"Match cancelled ❌",p:"Match cancelled"},
    {l:"Game tomorrow 🏟️",p:"I have a game tomorrow evening"},
    {l:"Tired today 😴",p:"I feel tired and heavy legged today"},
    {l:"What's next? ⚡",p:"What should I do next?"},
    {l:"Week check 📊",p:"How is my week going so far?"},
    {l:"Rest day 🌙",p:"Make today a rest day"},
    {l:"Add sprints 💨",p:"Add a sprint session today at 6am"},
  ];
  const send=async(text)=>{
    const t=text.trim(); if(!t||busy) return;
    setMsgs(p=>[...p,{role:"user",content:t}]); setInput(""); setBusy(true);
    try{
      const r=await callCoach(t,buildCtx());
      setMsgs(p=>[...p,{role:"assistant",content:r.reply}]);
      if(r.actions?.length){ onApplyActions(r.actions); showToast(`✅ ${r.actions.length} update${r.actions.length>1?"s":""} applied`); }
    }catch{setMsgs(p=>[...p,{role:"assistant",content:"⚠️ Can't reach Coach right now."}]);}
    finally{setBusy(false);}
  };

  if(!isOpen) return null;
  return html`<div style=${{position:"fixed",inset:0,zIndex:80,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick=${onClose}>
    <div style=${{background:"#08091a",borderRadius:"22px 22px 0 0",border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",maxHeight:"90vh",paddingBottom:"env(safe-area-inset-bottom)",boxShadow:"0 -24px 80px rgba(0,0,0,0.7)"}} onClick=${e=>e.stopPropagation()}>
      <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 14px 10px",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <div style=${{display:"flex",alignItems:"center",gap:10}}>
          <div style=${{width:38,height:38,borderRadius:13,background:"linear-gradient(135deg,rgba(143,184,255,0.15),rgba(255,209,107,0.10))",border:`1px solid ${T.blueBorder}`,display:"grid",placeItems:"center",fontSize:19}}>🤖</div>
          <div>
            <div style=${{fontWeight:900,fontSize:15,color:T.text}}>Coach</div>
            <div style=${{fontSize:11,fontWeight:700,color:busy?T.accent:T.green}}>${busy?"thinking…":"● ready"}</div>
          </div>
        </div>
        <${IconBtn} onClick=${onClose}>✕<//>
      </div>
      <div ref=${bodyRef} style=${{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:10,minHeight:180}}>
        ${msgs.map((m,i)=>html`<div key=${i} style=${{
          alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"88%",padding:"10px 13px",
          borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
          background:m.role==="user"?T.accentGlow:T.surface,
          border:`1px solid ${m.role==="user"?T.accentBorder:T.border}`,
          color:T.text,fontSize:14,lineHeight:1.55,whiteSpace:"pre-wrap",
        }}>
          ${m.role==="assistant"?html`<div style=${{fontSize:10,fontWeight:800,color:T.blue,marginBottom:5,letterSpacing:0.8}}>COACH</div>`:""}
          ${m.content}
        </div>`)}
        ${busy?html`<div style=${{alignSelf:"flex-start",padding:"12px 16px",borderRadius:"16px 16px 16px 4px",background:T.surface,border:`1px solid ${T.border}`,color:T.muted,fontSize:18,letterSpacing:4}}>···</div>`:""}
      </div>
      <div style=${{display:"flex",gap:7,padding:"8px 14px",overflowX:"auto",flexShrink:0,borderTop:`1px solid ${T.border}`,scrollbarWidth:"none"}}>
        ${QUICK.map(c=>html`<${Chip} key=${c.l} onClick=${()=>send(c.p)}>${c.l}<//>` )}
      </div>
      <div style=${{display:"flex",gap:8,padding:"10px 14px 12px",flexShrink:0}}>
        <textarea ref=${inputRef} value=${input}
          onInput=${e=>setInput(e.target.value)}
          onKeyDown=${e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);} }}
          placeholder="Ask Coach anything… (Enter to send)" rows=${1}
          style=${{flex:1,padding:"10px 12px",borderRadius:14,border:`1px solid ${T.border}`,
            background:"rgba(255,255,255,0.05)",color:T.text,fontSize:15,fontFamily:"inherit",
            outline:"none",resize:"none",minHeight:46,lineHeight:1.4,maxHeight:120}}/>
        <${Btn} onClick=${()=>send(input)} variant="accent" disabled=${!input.trim()||busy} style=${{height:46,padding:"0 16px",flexShrink:0}}>Send<//>
      </div>
    </div>
  </div>`;
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState(null); const [ready,setReady]=useState(false);
  const [view,setView]=useState("today"); const [coachOpen,setCoachOpen]=useState(false);
  const [taskModal,setTaskModal]=useState(null); const [habitModal,setHabitModal]=useState(null);
  const [syncStatus,setSyncStatus]=useState(null);
  const toastReady=useCallback(fn=>{ _toast.fn=fn; },[]);

  useEffect(()=>{
    loadState().then(saved=>{
      if(saved) setState({tasks:[],habits:[],habitLogs:{},goals:[],settings:DEF_SETTINGS,...saved,settings:{...DEF_SETTINGS,...saved?.settings}});
      else setState({tasks:seedTasks(),habits:seedHabits(),habitLogs:{},goals:[],settings:{...DEF_SETTINGS}});
      setReady(true);
      // Check sync
      fetch(SYNC_URL).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("offline"));
    });
  },[]);

  useEffect(()=>{ if(ready&&state) saveState(state); },[state,ready]);

  const mut=useCallback(fn=>setState(p=>({...p,...fn(p)})),[]);
  const toggleTask=useCallback(id=>mut(s=>({tasks:s.tasks.map(t=>t.id===id?{...t,completed:!t.completed,completedAt:!t.completed?Date.now():null}:t)})),[mut]);
  const upsertTask=useCallback(task=>mut(s=>{const i=s.tasks.findIndex(t=>t.id===task.id);if(i>=0){const tasks=[...s.tasks];tasks[i]={...tasks[i],...task};return{tasks};}return{tasks:[...s.tasks,task]};}),[mut]);
  const deleteTask=useCallback(id=>mut(s=>({tasks:s.tasks.filter(t=>t.id!==id)})),[mut]);
  const toggleHabit=useCallback((hid,date)=>mut(s=>({habitLogs:{...s.habitLogs,[`${hid}_${date}`]:!s.habitLogs[`${hid}_${date}`]}})),[mut]);
  const upsertHabit=useCallback(h=>mut(s=>{const i=s.habits.findIndex(x=>x.id===h.id);if(i>=0){const habits=[...s.habits];habits[i]={...habits[i],...h};return{habits};}return{habits:[...s.habits,h]};}),[mut]);
  const deleteHabit=useCallback(id=>mut(s=>({habits:s.habits.filter(h=>h.id!==id)})),[mut]);
  const applyActions=useCallback(actions=>mut(s=>{
    let tasks=[...s.tasks];
    for(const a of actions){
      if(a.type==="addTask"&&a.task) tasks.push({id:uid(),completed:false,planKey:"",createdAt:Date.now(),...a.task,category:a.task.category||detectCat(a.task.title||"")});
      else if(a.type==="updateTask"&&a.taskId) tasks=tasks.map(t=>t.id===a.taskId?{...t,...a.changes}:t);
      else if(a.type==="deleteTask"&&a.taskId) tasks=tasks.filter(t=>t.id!==a.taskId);
      else if(a.type==="completeTask"&&a.taskId) tasks=tasks.map(t=>t.id===a.taskId?{...t,completed:true,completedAt:Date.now()}:t);
    }
    return{tasks};
  }),[mut]);

  if(!ready||!state) return html`<div style=${{height:"100vh",display:"grid",placeItems:"center",background:T.bg,color:T.muted}}>
    <div style=${{textAlign:"center"}}><div style=${{fontSize:32,marginBottom:8}}>⚡</div><div style=${{fontWeight:700}}>Loading…</div></div>
  </div>`;

  const NAV=[{id:"today",icon:"☀",label:"Today"},{id:"week",icon:"▦",label:"Week"},{id:"habits",icon:"✓",label:"Habits"},{id:"settings",icon:"⚙",label:"Settings"}];
  const weekDates=getWeekDates();
  const wTotal=state.tasks.filter(t=>weekDates.includes(t.date)&&t.category!=="work").length;
  const wDone=state.tasks.filter(t=>weekDates.includes(t.date)&&t.completed&&t.category!=="work").length;

  return html`<div style=${{background:T.bg,minHeight:"100vh",color:T.text,fontFamily:"ui-rounded,ui-sans-serif,system-ui,-apple-system,sans-serif"}}>
    <!-- Ambient -->
    <div style=${{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
      <div style=${{position:"absolute",top:"-5%",left:"5%",width:700,height:600,borderRadius:"50%",background:"radial-gradient(rgba(143,184,255,0.06),transparent 70%)"}}/>
      <div style=${{position:"absolute",top:"5%",right:0,width:500,height:450,borderRadius:"50%",background:"radial-gradient(rgba(255,209,107,0.05),transparent 65%)"}}/>
    </div>

    <div style=${{position:"relative",zIndex:1}}>
      <!-- Header -->
      <header style=${{position:"sticky",top:0,zIndex:20,display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"calc(12px + env(safe-area-inset-top)) 14px 12px",
        background:"rgba(7,8,15,0.88)",backdropFilter:"blur(16px)",borderBottom:`1px solid ${T.border}`}}>
        <div style=${{display:"flex",alignItems:"center",gap:10}}>
          <div style=${{width:36,height:36,borderRadius:12,background:T.blueGlow,border:`1px solid ${T.blueBorder}`,display:"grid",placeItems:"center",fontWeight:900,fontSize:12,color:T.blue}}>SK</div>
          <div>
            <div style=${{fontWeight:900,fontSize:15,color:T.text}}>ScheduleKeeper</div>
            <div style=${{fontSize:11,color:T.muted,fontWeight:700,marginTop:1}}>${wDone}/${wTotal} this week</div>
          </div>
        </div>
        <div style=${{display:"flex",gap:8}}>
          <${IconBtn} onClick=${()=>setTaskModal({task:null,date:todayISO()})} style=${{background:T.blueGlow,borderColor:T.blueBorder,color:T.blue,fontSize:17,fontWeight:900}}>＋<//>
          <${IconBtn} onClick=${()=>setCoachOpen(true)} style=${{background:T.accentGlow,borderColor:T.accentBorder,fontSize:18}}>🤖<//>
        </div>
      </header>

      ${view==="today"?html`<${TodayView} tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs} onToggleTask=${toggleTask} onEditTask=${t=>setTaskModal({task:t,date:null})} onToggleHabit=${toggleHabit} onOpenCoach=${()=>setCoachOpen(true)}/>`:""}
      ${view==="week"?html`<${WeekView} tasks=${state.tasks} onToggleTask=${toggleTask} onEditTask=${t=>setTaskModal({task:t,date:null})} onAddForDate=${date=>setTaskModal({task:null,date})}/>`:""}
      ${view==="habits"?html`<${HabitsView} habits=${state.habits} habitLogs=${state.habitLogs} onToggleHabit=${toggleHabit} onEditHabit=${h=>setHabitModal(h)} onAddHabit=${()=>setHabitModal({isNew:true})}/>`:""}
      ${view==="settings"?html`<${SettingsView} settings=${state.settings} syncStatus=${syncStatus}
        onUpdate=${changes=>mut(s=>({settings:{...s.settings,...changes}}))}
        onExport=${()=>{const b=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`sk-backup-${todayISO()}.json`;a.click();}}
        onReset=${()=>{if(confirm("Reset all data?"))setState({tasks:seedTasks(),habits:seedHabits(),habitLogs:{},goals:[],settings:{...DEF_SETTINGS}});}}/>`:""}

      <!-- Bottom nav -->
      <nav style=${{position:"fixed",left:0,right:0,bottom:0,zIndex:25,display:"flex",gap:4,
        padding:"8px 8px calc(8px + env(safe-area-inset-bottom))",
        background:"rgba(7,8,15,0.94)",backdropFilter:"blur(16px)",borderTop:`1px solid ${T.border}`}}>
        ${NAV.map(v=>html`<button key=${v.id} onClick=${()=>setView(v.id)} style=${{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,
          padding:"7px 4px",borderRadius:13,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${view===v.id?T.borderActive:"transparent"}`,
          background:view===v.id?T.surface:"transparent",
          color:view===v.id?T.text:T.muted,transition:"all 0.15s",
        }}><span style=${{fontSize:17}}>${v.icon}</span><span style=${{fontSize:10,fontWeight:800}}>${v.label}</span></button>`)}
        <button onClick=${()=>setCoachOpen(true)} style=${{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,
          padding:"7px 4px",borderRadius:13,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${T.accentBorder}`,background:T.accentGlow,color:T.accent,
        }}><span style=${{fontSize:17}}>🤖</span><span style=${{fontSize:10,fontWeight:800}}>Coach</span></button>
      </nav>
    </div>

    ${taskModal?html`<${TaskModal} task=${taskModal.task} initialDate=${taskModal.date}
      onSave=${t=>{upsertTask(t);setTaskModal(null);showToast(taskModal.task?"Updated ✅":"Added ✅");}}
      onDelete=${id=>{deleteTask(id);setTaskModal(null);showToast("Deleted");}}
      onClose=${()=>setTaskModal(null)}/>`:""}
    ${habitModal?html`<${HabitModal} habit=${habitModal.isNew?null:habitModal}
      onSave=${h=>{upsertHabit(h);setHabitModal(null);showToast(habitModal.isNew?"Habit added ✅":"Updated ✅");}}
      onDelete=${id=>{deleteHabit(id);setHabitModal(null);showToast("Deleted");}}
      onClose=${()=>setHabitModal(null)}/>`:""}

    <${CoachPanel} isOpen=${coachOpen} onClose=${()=>setCoachOpen(false)}
      tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs}
      settings=${state.settings} onApplyActions=${applyActions}/>

    <${Toast} onReady=${toastReady}/>
  </div>`;
}

// ── Boot ──────────────────────────────────────────────────────
render(html`<${App}/>`, document.getElementById("app"));

// Service worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}
</script>
</body>
</html>
