// ── Utils ──────────────────────────────────────────────────
const pad2 = n => String(n).padStart(2,"0");
const uid = () => crypto?.randomUUID?.() ?? Math.random().toString(36).slice(2)+Date.now().toString(36);
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; };
const isoDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const parseDate = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const startOfDay = d => new Date(d.getFullYear(),d.getMonth(),d.getDate());
const fmtTime = t => { if(!t)return""; const [h,m]=t.split(":").map(Number); return `${h%12||12}:${pad2(m)}${h>=12?"pm":"am"}`; };
const fmtDayShort = s => parseDate(s).toLocaleDateString("en-GB",{weekday:"short"});
const fmtDayLong = s => parseDate(s).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
const fmtDateNum = s => parseDate(s).getDate();

function getWeekDates(from=new Date()){
  const d=startOfDay(from); const dow=(d.getDay()+6)%7; const mon=addDays(d,-dow);
  return Array.from({length:7},(_,i)=>isoDate(addDays(mon,i)));
}
function detectCat(title=""){
  const t=title.toLowerCase();
  if(/\bgame\b|\bmatch\b|\bvs\b/.test(t))return"game";
  if(/\brun\b|\bjog\b|\bsprint\b|\bstride/.test(t))return"run";
  if(/football|soccer/.test(t))return"football";
  if(/\bbike\b|\bcycle|\bspin\b/.test(t))return"bike";
  if(/pilates/.test(t))return"pilates";
  if(/recovery|\brest\b|\bwalk\b|\bmobil/.test(t))return"recovery";
  if(/sauna|pool|steam/.test(t))return"sauna";
  if(/\bwork\b|office|meeting/.test(t))return"work";
  return"other";
}

// ── Sync ────────────────────────────────────────────────────
const SK_KEY="sk2";
const SYNC_URL="/api/sync";

async function loadState(){
  try{ const r=await window.storage?.get(SK_KEY); if(r?.value)return JSON.parse(r.value); }catch{}
  try{ const r=localStorage.getItem(SK_KEY); if(r)return JSON.parse(r); }catch{}
  return null;
}
const _saveBuf={timer:null};
function saveState(state){
  const j=JSON.stringify(state);
  try{ window.storage?.set(SK_KEY,j); }catch{}
  try{ localStorage.setItem(SK_KEY,j); }catch{}
  // Debounced sync to Vercel KV (for widget)
  clearTimeout(_saveBuf.timer);
  _saveBuf.timer=setTimeout(()=>{
    fetch(SYNC_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:j}).catch(()=>{});
  },1500);
}

// ── Load weights ──────────────────────────────────────────────
const LOAD={game:10,football:7,run:6,bike:5,pilates:3,recovery:1,sauna:1,work:2,other:1};
const HIGH_LOAD=13;

// ── Session titles ────────────────────────────────────────────
const SESSION_TITLES={
  run:{normal:"Run 30min + 3 sprints (10–12s)",taper:"Run 25min easy + 4 strides (pre-event prep)",recovery:"Active recovery: walk + mobility 30min [post-match]",notes:{normal:"Easy pace. Full walk between.",taper:"Relaxed — save legs for tomorrow.",recovery:"Gentle movement only."}},
  bike:{normal:"Bike 35min Zone 2 + 6×10s spin-ups",taper:"Bike 25min Zone 1–2 (pre-event taper)",recovery:"Easy bike 20min Zone 1 [post-match]",notes:{normal:"Fast legs, low resistance.",taper:"Keep it easy — event tomorrow.",recovery:"Legs only, minimal effort."}},
  pilates:{normal:"Pilates 20min",taper:"Pilates 15min — core only",recovery:"Mobility + stretch 15min",notes:{normal:"Core + control.",taper:"Gentle.",recovery:"Full body release."}},
  recovery:{normal:"Active recovery: walk + mobility 45min",taper:"Active recovery: walk + mobility 45min",recovery:"Full rest day — walk only if feeling good",notes:{normal:"",taper:"",recovery:""}},
};

// ── Smart week generator ──────────────────────────────────────
function generateWeek(settings,weekDates,eventOverrides={}){
  const sched=settings.schedule||DEF_SCHEDULE;
  const tasks=[];
  const push=(date,time,title,category,notes="",planKey="")=>
    tasks.push({id:uid(),date,time,title,category,notes,completed:false,planKey,createdAt:Date.now()});

  // Build a map: dow → event config (merged with any one-time overrides)
  const events={};
  Object.entries(sched.teamEvents||{}).forEach(([d,e])=>{
    const dow=parseInt(d);
    const ov=eventOverrides[dow];
    events[dow]={...e,...(ov||{})};
  });

  // Pass 1 — Team events
  weekDates.forEach((date,dow)=>{
    const ev=events[dow];
    if(!ev?.enabled) return;
    if(ev.type==="none") return;
    const isMatch=ev.type==="match";
    push(date,ev.time,isMatch?"Match day":"Team training",isMatch?"game":"football","",`team_${dow}`);
  });

  // Pass 2 — Work blocks
  weekDates.forEach((date,dow)=>{
    const w=(sched.work||{})[dow];
    if(!w?.enabled) return;
    push(date,w.start,"Work","work","",`work_${dow}`);
    push(date,w.end,"Work ends","work","Free window",`wend_${dow}`);
  });

  // Helper: was yesterday a match?
  const wasPrevMatch=dow=>{
    const prevDow=(dow+6)%7;
    const prevEv=events[prevDow];
    return prevEv?.enabled&&prevEv.type==="match";
  };
  // Helper: is tomorrow a team event?
  const isTomorrowEvent=dow=>{
    const nextDow=(dow+1)%7;
    const nextEv=events[nextDow];
    return nextEv?.enabled&&nextEv.type!=="none";
  };

  // Pass 3 — Morning sessions with taper/recovery
  weekDates.forEach((date,dow)=>{
    const slot=(sched.morningSlots||{})[dow];
    if(!slot?.enabled) return;
    const cat=slot.category;
    const prevMatch=wasPrevMatch(dow);
    const tmrEvent=isTomorrowEvent(dow);
    const mode=prevMatch?"recovery":tmrEvent?"taper":"normal";
    const st=SESSION_TITLES[cat]||SESSION_TITLES.recovery;
    push(date,slot.time,st[mode]||st.normal,prevMatch?"recovery":cat,st.notes?.[mode]||"",`morning_${dow}`);
  });

  // Post-pass: load check — if day load > HIGH_LOAD, downgrade hard morning session
  weekDates.forEach((date,dow)=>{
    const dayLoad=tasks.filter(t=>t.date===date).reduce((s,t)=>s+(LOAD[t.category]||1),0);
    if(dayLoad>HIGH_LOAD){
      const morn=tasks.find(t=>t.date===date&&t.planKey===`morning_${dow}`&&["run","bike"].includes(t.category));
      if(morn){
        morn.title="Active recovery: walk + mobility 30min [auto — high load]";
        morn.category="recovery";
        morn.notes="Load too high today — body needs recovery.";
      }
    }
  });

  return tasks;
}

// ── Coach (Claude) ────────────────────────────────────────────
const SYSTEM=`You are Coach — a sharp, adaptive performance coach for a dedicated football player.

PROFILE: Trains 5–7am + evenings. Work Mon/Wed 8–5, Tue/Thu 8–4, Fri 8–2. Wake 5am, bed 9pm.
Weekly targets: 5×runs, 5×football, 3×bike, 2×pilates, 2×recovery, 5×sauna.

CONTEXT: You receive today's date/time, upcoming tasks (with IDs), week stats, constraints, habits.

KEY SCENARIOS:
① "MATCH CANCELLED"/"game cancelled"/"game is off":
  a) Find game task → deleteTask it
  b) Find taper/prep tasks (reduced sessions, wind-downs) → deleteTask or restore
  c) Replace with quality training: morning → addTask "Run 40min + 4 sprint strides [match cancelled]" cat:run
     evening → addTask "Football technique + fitness 50min [match cancelled]" cat:football + addTask "Pilates 20min" cat:pilates
  Reply: "Got it — match cancelled. Replaced with quality training. Nothing wasted."

② "GAME [day/time]":
  a) addTask match cat:game on correct date
  b) Day before: updateTask to reduce intensity (remove sprint refs)
  c) Day before: addTask "Early wind-down 9pm" at 20:30 cat:other
  d) Game day: addTask "Fuel + hydration check" at 12:00 cat:other
  e) Day after: addTask "Active recovery: walk + mobility 30min" at 06:10 cat:recovery

③ "TIRED/SORE/HEAVY LEGS":
  a) Replace today's hard sessions with "Easy walk + mobility 30min" cat:recovery
  b) Reduce tomorrow if high load

④ General: honour work hours, prefer 5–7am, no hard sessions back-to-back.

OUTPUT STRICT JSON ONLY:
{"reply":"1–3 sentence warm reply","actions":[...]}

ACTIONS:
{"type":"addTask","task":{"title":"...","date":"YYYY-MM-DD","time":"HH:MM","category":"...","notes":"..."}}
{"type":"updateTask","taskId":"...","changes":{"title":"...","time":"...","category":"...","notes":"..."}}
{"type":"deleteTask","taskId":"..."}
{"type":"completeTask","taskId":"..."}`;

// ── Local (offline) Coach ─────────────────────────────────────
function localCoach(msg,ctx){
  const m=msg.toLowerCase();
  const actions=[];
  let reply="";

  // Find nearest upcoming game/team event
  const nextGame=ctx.upcomingTasks.find(t=>["game","football"].includes(t.category)&&t.date>=ctx.today);
  // Today's hard tasks
  const todayHard=ctx.upcomingTasks.filter(t=>t.date===ctx.today&&["run","bike","football","game"].includes(t.category)&&!t.completed);

  // ① Match cancelled
  if(/cancelled|canceled|game.{0,6}off|match.{0,6}off/.test(m)){
    if(nextGame){
      actions.push({type:"deleteTask",taskId:nextGame.id});
      actions.push({type:"addTask",task:{title:"Run 40min + 4 sprint strides [match cancelled]",date:nextGame.date,time:"06:00",category:"run",notes:"Match cancelled — quality session instead."}});
      actions.push({type:"addTask",task:{title:"Football technique + fitness 50min [match cancelled]",date:nextGame.date,time:nextGame.time||"18:00",category:"football",notes:"Good session to replace the match."}});
      reply=`Got it — match cancelled. Removed the ${nextGame.category==="game"?"game":"team session"} and added a quality run + technique session. Nothing wasted.`;
    }else{reply="I couldn't find an upcoming match or team session to cancel. Check the Week view.";}
    return{handled:true,reply,actions};
  }

  // ② Tired / sore / heavy legs
  if(/tired|sore|heavy.{0,6}leg|exhausted|fatigued/.test(m)){
    if(todayHard.length>0){
      todayHard.forEach(t=>actions.push({type:"updateTask",taskId:t.id,changes:{title:"Easy walk + mobility 30min [recovery]",category:"recovery",notes:"Listening to the body — rest is training too."}}));
      reply=`Smart call. Swapped ${todayHard.length} hard session${todayHard.length>1?"s":""} to easy recovery today. Come back stronger tomorrow.`;
    }else{reply="No hard sessions left today — you're already in good shape. Rest up and go again tomorrow.";}
    return{handled:true,reply,actions};
  }

  // ③ Rest day
  if(/rest.{0,5}day|make.{0,10}rest|day.{0,5}off/.test(m)){
    const todayTraining=ctx.upcomingTasks.filter(t=>t.date===ctx.today&&!["work","other"].includes(t.category)&&!t.completed);
    todayTraining.forEach(t=>actions.push({type:"updateTask",taskId:t.id,changes:{title:"Rest day — walk only if feeling good",category:"recovery",notes:"Full rest. Body repairs during downtime."}}));
    reply=todayTraining.length>0?`Done — converted ${todayTraining.length} session${todayTraining.length>1?"s":""} to rest. Recovery is part of the plan.`:"Today already looks like a light day. Enjoy the rest!";
    return{handled:true,reply,actions};
  }

  // ④ What's next
  if(/what.{0,10}next|what should|next session|next task/.test(m)){
    const now=`${String(new Date().getHours()).padStart(2,"0")}:${String(new Date().getMinutes()).padStart(2,"0")}`;
    const next=ctx.upcomingTasks.find(t=>t.date===ctx.today&&!t.completed&&t.time&&t.time>now&&t.category!=="work");
    if(next){reply=`Your next session is **${next.title}** at ${next.time}${next.notes?` — ${next.notes}`:""}. Go get it! 💪`;}
    else{const tomorrow=ctx.upcomingTasks.find(t=>t.date>ctx.today&&!t.completed&&t.category!=="work");if(tomorrow)reply=`Nothing more today — great work! Tomorrow: **${tomorrow.title}** at ${tomorrow.time||"morning"}.`;else reply="You're all clear for today. Rest up and check the Week view to plan ahead.";}
    return{handled:true,reply,actions};
  }

  // ⑤ Week check
  if(/week.{0,10}check|how.{0,10}week|week.{0,10}going|progress/.test(m)){
    const stats=ctx.weekStats||{};const targets=ctx.weekTargets||{};
    const lines=Object.entries(targets).filter(([k])=>k!=="work").map(([k,t])=>{const s=stats[k]||{done:0,total:0};return`${CATS[k]?.emoji||""} ${CATS[k]?.label||k}: ${s.done}/${t}`;});
    reply=`Week check:\n${lines.join("\n")}\n\nKeep going — consistency beats perfection.`;
    return{handled:true,reply,actions};
  }

  // ⑥ Game / match scheduled
  if(/i have a (game|match)|game (on|tomorrow|saturday|thursday)|match (on|tomorrow|saturday|thursday)/.test(m)){
    // Parse which day from message, default to tomorrow
    const now=new Date();
    let targetDate=isoDate(addDays(now,1));
    if(/saturday/.test(m)){const d=new Date();d.setDate(d.getDate()+((6-d.getDay()+7)%7||7));targetDate=isoDate(d);}
    if(/thursday/.test(m)){const d=new Date();d.setDate(d.getDate()+((4-d.getDay()+7)%7||7));targetDate=isoDate(d);}
    const prevDate=isoDate(addDays(parseDate(targetDate),-1));
    const afterDate=isoDate(addDays(parseDate(targetDate),1));
    actions.push({type:"addTask",task:{title:"Match day",date:targetDate,time:"10:00",category:"game",notes:"Game day — fuel well, warm up properly."}});
    actions.push({type:"addTask",task:{title:"Fuel + hydration check",date:targetDate,time:"08:00",category:"other",notes:"Pre-match nutrition."}});
    actions.push({type:"addTask",task:{title:"Active recovery: walk + mobility 30min [post-match]",date:afterDate,time:"06:10",category:"recovery",notes:"Essential after a game."}});
    // Taper the day before — find hard morning tasks
    const prevHard=ctx.upcomingTasks.filter(t=>t.date===prevDate&&["run","bike"].includes(t.category));
    prevHard.forEach(t=>actions.push({type:"updateTask",taskId:t.id,changes:{title:t.title.replace(/\d+min/,"25min").replace(/sprint.*$/,"strides (pre-match taper)"),notes:"Easy day — big game tomorrow."}}));
    reply=`Match added for ${targetDate}. I've tapered ${prevHard.length>0?`your ${prevDate} session and added`:"and added"} post-match recovery. Good luck! 🏟️`;
    return{handled:true,reply,actions};
  }

  // ⑦ Plan my week
  if(/plan.{0,10}week|generate.{0,5}week|build.{0,5}week|create.{0,5}week|schedule.{0,5}week/.test(m)){
    const wDates=ctx.weekDates||getWeekDates();
    const stgs=ctx.settings||{};
    // Remove existing unfinished non-work week tasks
    const weekTaskIds=ctx.upcomingTasks.filter(t=>wDates.includes(t.date)&&t.category!=="work"&&!t.completed).map(t=>t.id);
    weekTaskIds.forEach(id=>actions.push({type:"deleteTask",taskId:id}));
    // Generate fresh week from schedule template
    const newTasks=generateWeek(stgs,wDates);
    newTasks.forEach(task=>actions.push({type:"addTask",task}));
    reply=`Week planned! Cleared ${weekTaskIds.length} old sessions and generated ${newTasks.length} fresh ones from your schedule template. Review in the Week view and adjust anything.`;
    return{handled:true,reply,actions};
  }

  // ⑧ Auto-adjust (load + health aware)
  if(/auto.{0,6}adjust|adjust.{0,5}schedule|optimize.{0,5}week|rebalance|fix.{0,5}week/.test(m)){
    const wDates=ctx.weekDates||getWeekDates();
    let adjusted=0;
    const h=ctx.health||{};
    const hrElevated=h.resting_hr&&h.baseline_hr&&h.resting_hr>h.baseline_hr+7;
    const hrvLow=h.hrv&&h.hrv<40;
    const poorSleep=h.sleep_hours&&h.sleep_hours<6;
    // If health signals recovery needed, downgrade today's hard sessions
    if(hrElevated||hrvLow||poorSleep){
      const flags=[(hrElevated?"elevated HR":null),(hrvLow?"low HRV":null),(poorSleep?"poor sleep":null)].filter(Boolean).join(", ");
      const todayHardH=ctx.upcomingTasks.filter(t=>t.date===ctx.today&&["run","bike"].includes(t.category)&&!t.completed);
      todayHardH.forEach(t=>{
        actions.push({type:"updateTask",taskId:t.id,changes:{title:"Active recovery: 30min easy walk [auto]",category:"recovery",notes:`Health data flagged: ${flags}. Body first.`}});
        adjusted++;
      });
    }
    // Load-balance rest of week
    wDates.filter(d=>d>ctx.today).forEach(date=>{
      const dayTasks=ctx.upcomingTasks.filter(t=>t.date===date);
      const dayLoad=dayTasks.reduce((s,t)=>s+(LOAD[t.category]||1),0);
      if(dayLoad>HIGH_LOAD){
        const hard=dayTasks.find(t=>["run","bike"].includes(t.category));
        if(hard){
          actions.push({type:"updateTask",taskId:hard.id,changes:{title:hard.title.replace(/\d+min/,"25min")+" [auto-adjusted]",notes:"High load day — reduced duration."}});
          adjusted++;
        }
      }
    });
    reply=adjusted>0
      ?`Auto-adjusted ${adjusted} session${adjusted>1?"s":""} based on load balance${(hrElevated||hrvLow||poorSleep)?" and Watch health data":""}.`
      :"Your week looks well-balanced — no changes needed. Keep that consistency!";
    return{handled:true,reply,actions};
  }

  // ⑨ Health check via Watch data
  if(/health.{0,10}check|how.{0,5}recover|recovery.{0,5}score|hrv|resting.{0,5}hr|heart.{0,5}rate/.test(m)){
    const h=ctx.health||{};
    if(!h.resting_hr&&!h.hrv&&!h.sleep_hours){
      reply="No Watch health data yet. Install the healthSync.js Scriptable script and set it as a morning Personal Automation — then your Apple Watch data will flow in automatically.";
    }else{
      const hrStatus=h.resting_hr?(h.resting_hr<55?"low (great)":h.resting_hr<65?"normal":"elevated ⚠️"):"—";
      const hrvStatus=h.hrv?(h.hrv>60?"excellent":h.hrv>45?"good":h.hrv>30?"moderate":"low ⚠️"):"—";
      const sleepStatus=h.sleep_hours?(h.sleep_hours>=7.5?"great":h.sleep_hours>=6?"ok":"short ⚠️"):"—";
      const readyScore=((h.hrv||50)/80*40)+((h.sleep_hours||7)/9*35)+((Math.max(0,70-(h.resting_hr||65)))/20*25);
      const rdy=Math.min(100,Math.round(readyScore));
      reply=`Watch data (${h.date||"today"}):\n❤️ Resting HR: ${h.resting_hr||"—"}bpm (${hrStatus})\n🧠 HRV: ${h.hrv||"—"}ms (${hrvStatus})\n😴 Sleep: ${h.sleep_hours||"—"}h (${sleepStatus})\n\n⚡ Readiness: ${rdy}%\n\n${rdy>=75?"Green light — train hard today.":rdy>=50?"Moderate readiness — keep intensity manageable.":"Body needs recovery — consider an easy day."}`;
    }
    return{handled:true,reply,actions};
  }

  return{handled:false};
}

async function callCoach(msg,ctx){
  // Try local engine first (instant, no network needed)
  const local=localCoach(msg,ctx);
  if(local.handled) return local;

  // Fall back to cloud Coach
  try{
    const res=await fetch("/api/coach",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg,context:ctx})});
    const data=await res.json();
    if(typeof data.reply==="string") return data;
  }catch{}

  return{reply:"I'm offline. Local commands: \"plan my week\", \"auto-adjust\", \"match cancelled\", \"tired today\", \"rest day\", \"what's next\", \"week check\", \"health check\"",actions:[]};
}

function Ring({pct=0,size=48,stroke=3.2,color=T.accent}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,dash=(Math.min(100,pct)/100)*circ;
  return html`<svg width=${size} height=${size} style="transform:rotate(-90deg);flex-shrink:0">
    <circle cx=${size/2} cy=${size/2} r=${r} stroke="rgba(255,255,255,0.08)" stroke-width=${stroke} fill="none"/>
    <circle cx=${size/2} cy=${size/2} r=${r} stroke=${color} stroke-width=${stroke} fill="none"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray 0.4s"/>
  </svg>`;
}

// ── Habits View ───────────────────────────────────────────────
function HabitsView({habits,habitLogs,onToggleHabit,onEditHabit,onAddHabit}){
  const weekDates=getWeekDates(),todayStr=todayISO();
  const DAY_LABELS=["M","T","W","T","F","S","S"];
  return html`<div style=${{padding:"14px 14px 110px",maxWidth:820,margin:"0 auto"}}>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style=${{fontSize:22,fontWeight:900,color:T.text}}>Habits</div>
      <${Btn} onClick=${onAddHabit} variant="primary">+ Add<//>
    </div>
    ${habits.length===0?html`
      <div style=${{...S.card,textAlign:"center",padding:32,color:T.muted}}>
        <div style=${{fontSize:28,marginBottom:8}}>✓</div>
        <div style=${{fontWeight:700}}>No habits yet</div>
      </div>`
    :habits.map(h=>{
      const weekDone=weekDates.filter(d=>!!habitLogs[`${h.id}_${d}`]).length;
      let streak=0;
      {const todayDone=!!habitLogs[`${h.id}_${todayStr}`];
       const start=todayDone?0:1;
       for(let i=start;i<90;i++){const d=isoDate(addDays(new Date(),-i));if(habitLogs[`${h.id}_${d}`])streak++;else break;}}
      return html`<div key=${h.id} style=${{...S.card,marginBottom:10}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
          <div style=${{display:"flex",alignItems:"center",gap:10}}>
            <span style=${{fontSize:22}}>${h.emoji}</span>
            <div>
              <div style=${{fontWeight:800,fontSize:14,color:T.text}}>${h.title}</div>
              <div style=${{fontSize:11,color:T.muted,marginTop:2}}>${weekDone}/7 this week · <span style=${{color:streak>=3?T.green:T.muted}}>${streak>=3?"🔥":""} ${streak}d streak</span></div>
            </div>
          </div>
          <${IconBtn} onClick=${()=>onEditHabit(h)}>✎<//>
        </div>
        <div style=${{display:"flex",gap:5,marginTop:12}}>
          ${weekDates.map((date,i)=>{
            const done=!!habitLogs[`${h.id}_${date}`],isToday=date===todayStr;
            return html`<button key=${date} onClick=${()=>onToggleHabit(h.id,date)} style=${{
              flex:1,paddingTop:"100%",position:"relative",borderRadius:10,
              border:`1px solid ${done?T.greenBorder:isToday?T.borderActive:T.border}`,
              background:done?T.greenGlow:isToday?"rgba(255,255,255,0.03)":T.surface,
              cursor:"pointer",overflow:"hidden",
            }}>
              <div style=${{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                <span style=${{fontSize:9,fontWeight:800,color:done?T.green:isToday?T.text:T.muted}}>${DAY_LABELS[i]}</span>
                ${done?html`<span style=${{fontSize:10,color:T.green}}>✓</span>`:""}
              </div>
            </button>`;
          })}
        </div>
      </div>`;
    })}
  </div>`;
}

// ── Stats View ────────────────────────────────────────────────
function StatsView({tasks,habits,habitLogs,settings}){
  const weekDates=getWeekDates(),todayStr=todayISO();
  const targets=settings.weekTargets;

  // Weekly category progress vs targets
  const weekCats={};
  tasks.filter(t=>weekDates.includes(t.date)&&t.category!=="work").forEach(t=>{
    if(!weekCats[t.category])weekCats[t.category]={done:0,total:0};
    weekCats[t.category].total++;if(t.completed)weekCats[t.category].done++;
  });

  // Last 7 days task completion trend
  const last7=Array.from({length:7},(_,i)=>{
    const d=isoDate(addDays(new Date(),i-6));
    const dt=tasks.filter(t=>t.date===d&&t.category!=="work");
    return{date:d,done:dt.filter(t=>t.completed).length,total:dt.length};
  });

  // Last 28 days (4 rows × 7) for habit heatmap
  const last28=Array.from({length:28},(_,i)=>isoDate(addDays(new Date(),i-27)));

  return html`<div style=${{padding:"14px 14px 110px",maxWidth:820,margin:"0 auto"}}>
    <div style=${{fontSize:22,fontWeight:900,color:T.text,marginBottom:16}}>Stats</div>

    <!-- Weekly Targets -->
    <div style=${{...S.card,marginBottom:14}}>
      <div style=${{fontSize:11,fontWeight:800,color:T.muted,letterSpacing:1,marginBottom:14}}>WEEKLY TARGETS</div>
      ${Object.entries(targets).map(([k,target])=>{
        const s=weekCats[k]||{done:0,total:0};
        const pct=target>0?Math.min(100,Math.round((s.done/target)*100)):0;
        const cat=CATS[k];
        return html`<div key=${k} style=${{marginBottom:12}}>
          <div style=${{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style=${{fontSize:13,fontWeight:800,color:T.text}}>${cat?.emoji} ${cat?.label||k}</span>
            <span style=${{fontSize:12,fontWeight:700,color:pct>=100?T.green:T.muted}}>${s.done}/${target}</span>
          </div>
          <div style=${{height:7,borderRadius:99,background:"rgba(255,255,255,0.06)"}}>
            <div style=${{height:"100%",borderRadius:99,width:pct+"%",
              background:pct>=100?T.green:cat?.color||T.blue,transition:"width 0.5s"}}/>
          </div>
        </div>`;
      })}
    </div>

    <!-- 7-day Completion Trend -->
    <div style=${{...S.card,marginBottom:14}}>
      <div style=${{fontSize:11,fontWeight:800,color:T.muted,letterSpacing:1,marginBottom:14}}>LAST 7 DAYS</div>
      <div style=${{display:"flex",gap:6,alignItems:"flex-end",height:72}}>
        ${last7.map(({date,done,total})=>{
          const pct=total>0?done/total:0;
          const isToday=date===todayStr;
          const barH=total===0?4:Math.max(8,Math.round(pct*56));
          const barColor=isToday?T.accent:pct>=0.8?T.green:pct>0?T.blue:"rgba(255,255,255,0.07)";
          return html`<div key=${date} style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style=${{fontSize:10,fontWeight:700,color:isToday?T.accent:T.muted}}>${total>0?done+"/"+ total:""}</span>
            <div style=${{flex:1,width:"100%",display:"flex",alignItems:"flex-end"}}>
              <div style=${{width:"100%",borderRadius:"4px 4px 0 0",height:barH+"px",
                background:barColor,transition:"height 0.4s"}}/>
            </div>
            <span style=${{fontSize:9,fontWeight:800,color:isToday?T.accent:T.muted}}>
              ${fmtDayShort(date).slice(0,2).toUpperCase()}
            </span>
          </div>`;
        })}
      </div>
    </div>

    <!-- Habit Heatmap -->
    ${habits.length>0?html`<div style=${{...S.card,marginBottom:14}}>
      <div style=${{fontSize:11,fontWeight:800,color:T.muted,letterSpacing:1,marginBottom:14}}>HABIT HEATMAP · 28 DAYS</div>
      <div style=${{display:"flex",gap:5,marginBottom:8}}>
        ${["M","T","W","T","F","S","S"].map((d,i)=>html`<div key=${i} style=${{flex:1,textAlign:"center",fontSize:9,fontWeight:800,color:T.muted}}>${d}</div>`)}
      </div>
      ${habits.map(h=>html`<div key=${h.id} style=${{marginBottom:14}}>
        <div style=${{fontSize:12,fontWeight:800,color:T.text,marginBottom:5}}>${h.emoji} ${h.title}</div>
        <div style=${{display:"flex",flexDirection:"column",gap:3}}>
          ${[0,1,2,3].map(w=>html`<div key=${w} style=${{display:"flex",gap:5}}>
            ${last28.slice(w*7,w*7+7).map(date=>{
              const done=!!habitLogs[`${h.id}_${date}`];
              const isFuture=date>todayStr;
              const isToday=date===todayStr;
              return html`<div key=${date} title=${date} style=${{
                flex:1,height:16,borderRadius:4,
                background:isFuture?"rgba(255,255,255,0.02)":(done?"rgba(110,231,183,0.30)":"rgba(255,255,255,0.04)"),
                border:`1px solid ${isFuture?"transparent":(done?T.greenBorder:(isToday?T.borderActive:T.border))}`,
                transition:"background 0.2s",
              }}/>`;
            })}
          </div>`)}
        </div>
      </div>`)}
    </div>`:""}
  </div>`;
}

// ── Settings View ─────────────────────────────────────────────
const DOW_LABELS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const TRAINING_CATS=["run","bike","pilates","recovery","football"];

function SettingsView({settings,onUpdate,onExport,onReset,syncStatus}){
  const [wt,setWt]=useState({...settings.weekTargets});
  const [sched,setSched]=useState({...DEF_SCHEDULE,...(settings.schedule||{})});
  const [openSection,setOpenSection]=useState(null);

  const updateSched=ns=>{setSched(ns);onUpdate({schedule:ns});};

  const updateWork=(dow,field,val)=>{
    const ns={...sched,work:{...sched.work,[dow]:{...sched.work[dow],[field]:val}}};
    updateSched(ns);
  };
  const updateMorn=(dow,field,val)=>{
    const ns={...sched,morningSlots:{...sched.morningSlots,[dow]:{...sched.morningSlots[dow],[field]:val}}};
    updateSched(ns);
  };
  const updateTeam=(dow,field,val)=>{
    const cur=sched.teamEvents[dow]||{enabled:false,time:"18:00",type:"training"};
    const ns={...sched,teamEvents:{...sched.teamEvents,[dow]:{...cur,[field]:val}}};
    updateSched(ns);
  };

  const SectionHeader=({id,label,icon})=>html`
    <div onClick=${()=>setOpenSection(p=>p===id?null:id)} style=${{
      display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"10px 0",cursor:"pointer",userSelect:"none"
    }}>
      <span style=${{fontSize:13,fontWeight:800,color:T.text}}>${icon} ${label}</span>
      <span style=${{color:T.muted,fontSize:14,transition:"transform 0.2s",
        transform:openSection===id?"rotate(90deg)":"none"}}>›</span>
    </div>`;

  return html`<div style=${{padding:"14px 14px 110px",maxWidth:820,margin:"0 auto"}}>
    <div style=${{fontSize:22,fontWeight:900,color:T.text,marginBottom:16}}>Settings</div>

    <!-- My Schedule card -->
    <div style=${{...S.card,marginBottom:10}}>
      <div style=${{fontSize:11,fontWeight:800,color:T.muted,letterSpacing:1,marginBottom:2}}>MY SCHEDULE</div>

      <!-- Work Hours -->
      <${SectionHeader} id="work" label="Work Hours" icon="💼"/>
      ${openSection==="work"?html`<div style=${{marginBottom:8}}>
        ${[0,1,2,3,4,5,6].map(dow=>html`
          <div key=${dow} style=${{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${T.border}`}}>
            <div style=${{width:32,fontSize:11,fontWeight:800,color:T.muted}}>${DOW_LABELS[dow]}</div>
            <button onClick=${()=>updateWork(dow,"enabled",!(sched.work[dow]?.enabled))} style=${{
              width:36,height:20,borderRadius:99,border:"none",cursor:"pointer",flexShrink:0,
              background:sched.work[dow]?.enabled?T.green:"rgba(255,255,255,0.12)",
              transition:"background 0.2s"
            }}/>
            ${sched.work[dow]?.enabled?html`
              <input type="time" value=${sched.work[dow]?.start||""} onInput=${e=>updateWork(dow,"start",e.target.value)}
                style=${{...S.input,width:90,padding:"5px 8px",fontSize:12}}/>
              <span style=${{color:T.muted,fontSize:11}}>→</span>
              <input type="time" value=${sched.work[dow]?.end||""} onInput=${e=>updateWork(dow,"end",e.target.value)}
                style=${{...S.input,width:90,padding:"5px 8px",fontSize:12}}/>`
            :html`<span style=${{fontSize:11,color:T.muted}}>Off</span>`}
          </div>`)}
      </div>`:""}

      <div style=${{height:1,background:T.border,margin:"2px 0"}}/>

      <!-- Morning Activities -->
      <${SectionHeader} id="morning" label="Morning Activities" icon="🌅"/>
      ${openSection==="morning"?html`<div style=${{marginBottom:8}}>
        ${[0,1,2,3,4,5,6].map(dow=>{
          const slot=sched.morningSlots[dow]||{enabled:false,time:"06:00",category:"run"};
          return html`<div key=${dow} style=${{padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
            <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:slot.enabled?6:0}}>
              <div style=${{width:32,fontSize:11,fontWeight:800,color:T.muted}}>${DOW_LABELS[dow]}</div>
              <button onClick=${()=>updateMorn(dow,"enabled",!slot.enabled)} style=${{
                width:36,height:20,borderRadius:99,border:"none",cursor:"pointer",flexShrink:0,
                background:slot.enabled?T.green:"rgba(255,255,255,0.12)",transition:"background 0.2s"
              }}/>
              ${slot.enabled?html`<input type="time" value=${slot.time||"06:00"} onInput=${e=>updateMorn(dow,"time",e.target.value)}
                style=${{...S.input,width:90,padding:"5px 8px",fontSize:12}}/>`
              :html`<span style=${{fontSize:11,color:T.muted}}>No session</span>`}
            </div>
            ${slot.enabled?html`<div style=${{display:"flex",gap:5,flexWrap:"wrap",paddingLeft:40}}>
              ${TRAINING_CATS.map(k=>html`<${Chip} key=${k} active=${slot.category===k}

      <${SectionHeader} id="team" label="Team Training & Matches" icon="⚽"/>

        <div style=${{fontSize:11,color:T.muted,marginBottom:8,lineHeight:1.5}}>
          Set the days you normally have team training or matches. The scheduler will automatically taper the day before and add recovery after matches.
        </div>
        ${[0,1,2,3,4,5,6].map(dow=>{
          const ev=sched.teamEvents[dow]||{enabled:false,time:"18:00",type:"training"};

                background:ev.enabled?T.accent:"rgba(255,255,255,0.12)",transition:"background 0.2s"
              }}/>
              ${ev.enabled?html`<input type="time" value=${ev.time||"18:00"} onInput=${e=>updateTeam(dow,"time",e.target.value)}
                style=${{...S.input,width:90,padding:"5px 8px",fontSize:12}}/>`
              :html`<span style=${{fontSize:11,color:T.muted}}>No event</span>`}
            </div>
            ${ev.enabled?html`<div style=${{display:"flex",gap:6,paddingLeft:40}}>
              ${["training","match"].map(t=>html`<${Chip} key=${t} active=${ev.type===t}
                onClick=${()=>updateTeam(dow,"type",t)}>${t==="match"?"🏟️ Match":"⚽ Training"}<//>` )}
            </div>`:""}
          </div>`;
        })}
      </div>`:""}
    </div>

    <!-- Weekly Targets -->
    <div style=${{...S.card,marginBottom:10}}>
      <div style=${{fontSize:11,fontWeight:800,color:T.muted,letterSpacing:1,marginBottom:12}}>WEEKLY TARGETS</div>
      ${Object.entries(wt).map(([k,v])=>html`
        <div key=${k} style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
          <span style=${{fontSize:13,fontWeight:700,color:T.text}}>${CATS[k]?.emoji} ${CATS[k]?.label||k}</span>
          <div style=${{display:"flex",alignItems:"center",gap:8}}>
            <button onClick=${()=>{const nv=Math.max(0,v-1);const nwt={...wt,[k]:nv};setWt(nwt);onUpdate({weekTargets:nwt});}} style=${{width:28,height:28,borderRadius:8,border:`1px solid ${T.border}`,background:T.surface,color:T.text,cursor:"pointer",fontSize:16}}>-</button>
            <span style=${{fontWeight:900,fontSize:15,color:T.text,minWidth:20,textAlign:"center"}}>${v}</span>
            <button onClick=${()=>{const nv=v+1;const nwt={...wt,[k]:nv};setWt(nwt);onUpdate({weekTargets:nwt});}} style=${{width:28,height:28,borderRadius:8,border:`1px solid ${T.border}`,background:T.surface,color:T.text,cursor:"pointer",fontSize:16}}>+</button>
          </div>
        </div>`)}
    </div>

    <!-- Widget sync -->
    <div style=${{...S.card,marginBottom:10}}>
      <div style=${{fontSize:11,fontWeight:800,color:T.muted,letterSpacing:1,marginBottom:4}}>LOCK SCREEN WIDGET SYNC</div>
      <div style=${{fontSize:12,color:T.muted,marginBottom:10,lineHeight:1.55}}>
        Your schedule syncs automatically to the Scriptable lock screen widget whenever you make a change.
        ${syncStatus?html`<br/><span style=${{color:syncStatus==="ok"?T.green:T.red}}>${syncStatus==="ok"?"✓ Synced":"⚠ Sync unavailable (local mode)"}</span>`:""}
      </div>
      <${Btn} onClick=${()=>{fetch(SYNC_URL).then(r=>r.json()).then(()=>showToast("Widget sync working ✅")).catch(()=>showToast("Not syncing — deploy to Vercel + add KV store first"));}} variant="ghost" style=${{fontSize:12}}>
        Test widget sync
      <//>
    </div>

    <div style=${{display:"flex",gap:10,flexWrap:"wrap"}}>
      <${Btn} onClick=${onExport}>Export backup<//>
      <${Btn} onClick=${onReset} variant="danger">Reset all data<//>
    </div>
    <div style=${{marginTop:24,fontSize:12,color:T.muted,fontWeight:700,textAlign:"center"}}>
      ScheduleKeeper v2 · Powered by Claude AI

function BottomSheet({children,title,onClose}){
  return html`<div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(8px)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick=${onClose}>
    <div style=${{background:"#0b0d1c",borderRadius:"22px 22px 0 0",border:`1px solid ${T.border}`,
      padding:"16px 16px calc(16px + env(safe-area-inset-bottom))",
      width:"100%",maxWidth:580,maxHeight:"90vh",overflowY:"auto",
      boxShadow:"0 -20px 60px rgba(0,0,0,0.6)"}} onClick=${e=>e.stopPropagation()}>
      <div style=${{width:40,height:4,background:T.border,borderRadius:99,margin:"0 auto 14px"}}/>
      <div style=${{fontWeight:900,fontSize:18,color:T.text,marginBottom:16}}>${title}</div>
      ${children}

}

function TaskModal({task,initialDate,onSave,onDelete,onClose}){
  const [title,setTitle]=useState(task?.title||"");
  const [date,setDate]=useState(task?.date||initialDate||todayISO());
  const [time,setTime]=useState(task?.time||"");
  const [cat,setCat]=useState(task?.category||"other");
  const [notes,setNotes]=useState(task?.notes||"");
  const [done,setDone]=useState(task?.completed||false);
  useEffect(()=>{ if(title&&!task){ const d=detectCat(title); if(d!=="other")setCat(d); } },[title]);
  const save=()=>{ if(!title.trim())return; onSave({id:task?.id||uid(),title:title.trim(),date,time,category:cat,notes,completed:done,planKey:task?.planKey||"",createdAt:task?.createdAt||Date.now()}); };
  return html`<${BottomSheet} onClose=${onClose} title=${task?"Edit task":"Add task"}>
    <div style=${{marginBottom:12}}><${Label}>Title<//>
      <input style=${S.input} value=${title} onInput=${e=>setTitle(e.target.value)} placeholder="e.g. Run 30min easy" autoFocus/>
    </div>
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
      <div><${Label}>Date<//>  <input type="date" style=${S.input} value=${date} onInput=${e=>setDate(e.target.value)}/></div>
      <div><${Label}>Time<//>  <input type="time" style=${S.input} value=${time} onInput=${e=>setTime(e.target.value)}/></div>
    </div>
    <div style=${{marginBottom:12}}><${Label}>Category<//>
      <div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>
        ${Object.entries(CATS).map(([k,c])=>html`<${Chip} key=${k} active=${cat===k} onClick=${()=>setCat(k)}>${c.emoji} ${c.label}<//>`) }
      </div>
    </div>
    <div style=${{marginBottom:14}}><${Label}>Notes<//>
      <textarea style=${{...S.input,minHeight:60,resize:"none"}} value=${notes} onInput=${e=>setNotes(e.target.value)} placeholder="Optional..."/>
    </div>
    ${task?html`<label style=${{display:"flex",gap:8,alignItems:"center",marginBottom:14,cursor:"pointer"}}>
      <input type="checkbox" checked=${done} onChange=${e=>setDone(e.target.checked)}/>
      <span style=${{fontSize:13,fontWeight:700,color:T.muted}}>Mark complete</span>
    </label>`:""}
    <div style=${{display:"flex",gap:10}}>
      ${task?html`<${Btn} onClick=${()=>onDelete(task.id)} variant="danger">Delete<//>` :""}
      <div style=${{flex:1}}/>
      <${Btn} onClick=${onClose} variant="ghost">Cancel<//>
      <${Btn} onClick=${save} variant="primary">Save<//>
    </div>
  <//>`;
}

function HabitModal({habit,onSave,onDelete,onClose}){
  const [title,setTitle]=useState(habit?.title||"");
  const [emoji,setEmoji]=useState(habit?.emoji||"✓");
  const [days,setDays]=useState(habit?.days||[0,1,2,3,4,5,6]);
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const toggle=d=>setDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d].sort((a,b)=>a-b));
  return html`<${BottomSheet} onClose=${onClose} title=${habit?"Edit habit":"New habit"}>
    <div style=${{display:"grid",gridTemplateColumns:"60px 1fr",gap:10,marginBottom:12}}>
      <div><${Label}>Emoji<//>  <input style=${{...S.input,textAlign:"center",fontSize:20}} value=${emoji} onInput=${e=>setEmoji(e.target.value)} maxLength=${2}/></div>
      <div><${Label}>Name<//>   <input style=${S.input} value=${title} onInput=${e=>setTitle(e.target.value)} placeholder="Habit name" autoFocus/></div>
    </div>
    <div style=${{marginBottom:14}}><${Label}>Days<//>
      <div style=${{display:"flex",gap:5}}>
        ${DAYS.map((d,i)=>html`<button key=${i} onClick=${()=>toggle(i)} style=${{
          flex:1,padding:"8px 2px",borderRadius:10,fontSize:11,fontWeight:800,fontFamily:"inherit",
          border:`1px solid ${days.includes(i)?T.blueBorder:T.border}`,
          background:days.includes(i)?T.blueGlow:T.surface,
          color:days.includes(i)?T.blue:T.muted,cursor:"pointer",
        }}>${d[0]}</button>`)}
      </div>
    </div>
    <div style=${{display:"flex",gap:10}}>
      ${habit?html`<${Btn} onClick=${()=>onDelete(habit.id)} variant="danger">Delete<//>` :""}
      <div style=${{flex:1}}/>
      <${Btn} onClick=${onClose} variant="ghost">Cancel<//>
      <${Btn} onClick=${()=>{ if(title.trim()) onSave({id:habit?.id||uid(),title:title.trim(),emoji,days}); }} variant="primary">Save<//>
    </div>
  <//>`;
}

// ── Coach Panel ───────────────────────────────────────────────
function CoachPanel({isOpen,onClose,tasks,habits,habitLogs,settings,healthData,onApplyActions}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hey! I'm Coach 🤖\n\nWhat I can do:\n• \"Plan my week\" — generate a full week from your template\n• \"Auto-adjust\" — rebalance load + Watch health data\n• \"Match cancelled\" — swap for quality training\n• \"Health check\" — see your Watch recovery data\n• \"Tired today\", \"Rest day\", \"What's next?\""}]);
  const [input,setInput]=useState(""); const [busy,setBusy]=useState(false);
  const bodyRef=useRef(null); const inputRef=useRef(null);
  useEffect(()=>{ if(isOpen) setTimeout(()=>inputRef.current?.focus(),100); },[isOpen]);
  useEffect(()=>{ if(bodyRef.current) bodyRef.current.scrollTop=bodyRef.current.scrollHeight; },[msgs,busy]);

  const buildCtx=useCallback(()=>{
    const now=new Date(),todayStr=todayISO(),weekDates=getWeekDates();
    const upcoming=tasks.filter(t=>t.date>=todayStr).sort((a,b)=>(`${a.date}${a.time||""}`).localeCompare(`${b.date}${b.time||""}`)).slice(0,60).map(t=>({id:t.id,title:t.title,date:t.date,time:t.time||null,category:t.category,completed:t.completed,planKey:t.planKey||null,notes:t.notes||""}));
    const weekStats={};tasks.filter(t=>weekDates.includes(t.date)).forEach(t=>{if(!weekStats[t.category])weekStats[t.category]={done:0,total:0};weekStats[t.category].total++;if(t.completed)weekStats[t.category].done++;});
    return{today:todayStr,dayOfWeek:now.toLocaleDateString("en-GB",{weekday:"long"}),timeNow:`${pad2(now.getHours())}:${pad2(now.getMinutes())}`,weekStats,weekTargets:settings.weekTargets,constraints:settings.constraints,upcomingTasks:upcoming,todayHabits:habits.filter(h=>h.days.includes(now.getDay())).map(h=>({id:h.id,title:h.title,done:!!habitLogs[`${h.id}_${todayStr}`]})),weekDates,settings,health:healthData||null};
  },[tasks,habits,habitLogs,settings,healthData]);

  const QUICK=[
    {l:"Plan week 📅",p:"Plan my week"},
    {l:"Auto-adjust ⚡",p:"Auto-adjust my schedule"},
    {l:"Health check 💓",p:"Health check"},
    {l:"Match cancelled ❌",p:"Match cancelled"},
    {l:"Tired today 😴",p:"I feel tired and heavy legged today"},
    {l:"What's next?",p:"What should I do next?"},
    {l:"Week check 📊",p:"How is my week going so far?"},
    {l:"Rest day 🌙",p:"Make today a rest day"},
  ];
  const send=async(text)=>{
    const t=text.trim(); if(!t||busy) return;
    setMsgs(p=>[...p,{role:"user",content:t}]); setInput(""); setBusy(true);
    try{
      const r=await callCoach(t,buildCtx());
      setMsgs(p=>[...p,{role:"assistant",content:r.reply}]);
      if(r.actions?.length){ onApplyActions(r.actions); showToast(`✅ ${r.actions.length} update${r.actions.length>1?"s":""} applied`); }
    }catch{setMsgs(p=>[...p,{role:"assistant",content:"⚠️ Can't reach Coach right now."}]);}
    finally{setBusy(false);}
  };

  if(!isOpen) return null;
  return html`<div style=${{position:"fixed",inset:0,zIndex:80,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick=${onClose}>
    <div style=${{background:"#08091a",borderRadius:"22px 22px 0 0",border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",maxHeight:"90vh",paddingBottom:"env(safe-area-inset-bottom)",boxShadow:"0 -24px 80px rgba(0,0,0,0.7)"}} onClick=${e=>e.stopPropagation()}>
      <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 14px 10px",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <div style=${{display:"flex",alignItems:"center",gap:10}}>
          <div style=${{width:38,height:38,borderRadius:13,background:"linear-gradient(135deg,rgba(143,184,255,0.15),rgba(255,209,107,0.10))",border:`1px solid ${T.blueBorder}`,display:"grid",placeItems:"center",fontSize:19}}>🤖</div>
          <div>
            <div style=${{fontWeight:900,fontSize:15,color:T.text}}>Coach</div>
            <div style=${{fontSize:11,fontWeight:700,color:busy?T.accent:T.green}}>${busy?"thinking…":"● ready"}</div>
          </div>
        </div>
        <${IconBtn} onClick=${onClose}>✕<//>
      </div>
      <div ref=${bodyRef} style=${{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:10,minHeight:180}}>
        ${msgs.map((m,i)=>html`<div key=${i} style=${{
          alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"88%",padding:"10px 13px",
          borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
          background:m.role==="user"?T.accentGlow:T.surface,
          border:`1px solid ${m.role==="user"?T.accentBorder:T.border}`,
          color:T.text,fontSize:14,lineHeight:1.55,whiteSpace:"pre-wrap",
        }}>
          ${m.role==="assistant"?html`<div style=${{fontSize:10,fontWeight:800,color:T.blue,marginBottom:5,letterSpacing:0.8}}>COACH</div>`:""}
          ${m.content}
        </div>`)}
        ${busy?html`<div style=${{alignSelf:"flex-start",padding:"12px 16px",borderRadius:"16px 16px 16px 4px",background:T.surface,border:`1px solid ${T.border}`,color:T.muted,fontSize:18,letterSpacing:4}}>···</div>`:""}
      </div>
      <div style=${{display:"flex",gap:7,padding:"8px 14px",overflowX:"auto",flexShrink:0,borderTop:`1px solid ${T.border}`,scrollbarWidth:"none"}}>
        ${QUICK.map(c=>html`<${Chip} key=${c.l} onClick=${()=>send(c.p)}>${c.l}<//>` )}
      </div>
      <div style=${{display:"flex",gap:8,padding:"10px 14px 12px",flexShrink:0}}>
        <textarea ref=${inputRef} value=${input}
          onInput=${e=>setInput(e.target.value)}
          onKeyDown=${e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);} }}
          placeholder="Ask Coach anything… (Enter to send)" rows=${1}
          style=${{flex:1,padding:"10px 12px",borderRadius:14,border:`1px solid ${T.border}`,
            background:"rgba(255,255,255,0.05)",color:T.text,fontSize:15,fontFamily:"inherit",
            outline:"none",resize:"none",minHeight:46,lineHeight:1.4,maxHeight:120}}/>
        <${Btn} onClick=${()=>send(input)} variant="accent" disabled=${!input.trim()||busy} style=${{height:46,padding:"0 16px",flexShrink:0}}>Send<//>
      </div>
    </div>
  </div>`;
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState(null); const [ready,setReady]=useState(false);
  const [view,setView]=useState("today"); const [coachOpen,setCoachOpen]=useState(false);
  const [taskModal,setTaskModal]=useState(null); const [habitModal,setHabitModal]=useState(null);
  const [syncStatus,setSyncStatus]=useState(null);
  const [healthData,setHealthData]=useState(null);
  const toastReady=useCallback(fn=>{ _toast.fn=fn; },[]);

  useEffect(()=>{
    loadState().then(saved=>{
      if(saved) setState({tasks:[],habits:[],habitLogs:{},goals:[],settings:DEF_SETTINGS,...saved,settings:{...DEF_SETTINGS,...saved?.settings,schedule:{...DEF_SCHEDULE,...saved?.settings?.schedule}}});
      else setState({tasks:generateWeek(DEF_SETTINGS,getWeekDates()),habits:seedHabits(),habitLogs:{},goals:[],settings:{...DEF_SETTINGS}});
      setReady(true);
      // Check sync
      fetch(SYNC_URL).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("offline"));
      // Load latest Watch health snapshot and auto-complete matching workout tasks
      fetch("/api/health").then(r=>r.ok?r.json():null).then(d=>{
        if(!d)return;
        if(d.resting_hr||d.hrv||d.sleep_hours)setHealthData(d);
        // Auto-complete tasks for workouts Watch recorded today
        if(Array.isArray(d.autoCompleteActions)&&d.autoCompleteActions.length>0&&d.date===new Date().toISOString().slice(0,10)){
          setState(p=>{
            let tasks=[...p.tasks];
            for(const a of d.autoCompleteActions){
              if(a.type==="completeByCategory"){const t=tasks.find(x=>x.date===a.date&&x.category===a.category&&!x.completed);if(t)tasks=tasks.map(x=>x.id===t.id?{...x,completed:true,completedAt:Date.now(),notes:(x.notes?x.notes+"\n":"")+`Auto-completed from Apple Watch (${a.duration_min}min)`}:x);}
            }
            return{...p,tasks};
          });
        }
      }).catch(()=>{});
    });
  },[]);

  useEffect(()=>{ if(ready&&state) saveState(state); },[state,ready]);

  const mut=useCallback(fn=>setState(p=>({...p,...fn(p)})),[]);
  const toggleTask=useCallback(id=>mut(s=>({tasks:s.tasks.map(t=>t.id===id?{...t,completed:!t.completed,completedAt:!t.completed?Date.now():null}:t)})),[mut]);
  const upsertTask=useCallback(task=>mut(s=>{const i=s.tasks.findIndex(t=>t.id===task.id);if(i>=0){const tasks=[...s.tasks];tasks[i]={...tasks[i],...task};return{tasks};}return{tasks:[...s.tasks,task]};}),[mut]);
  const deleteTask=useCallback(id=>mut(s=>({tasks:s.tasks.filter(t=>t.id!==id)})),[mut]);
  const toggleHabit=useCallback((hid,date)=>mut(s=>({habitLogs:{...s.habitLogs,[`${hid}_${date}`]:!s.habitLogs[`${hid}_${date}`]}})),[mut]);
  const upsertHabit=useCallback(h=>mut(s=>{const i=s.habits.findIndex(x=>x.id===h.id);if(i>=0){const habits=[...s.habits];habits[i]={...habits[i],...h};return{habits};}return{habits:[...s.habits,h]};}),[mut]);
  const deleteHabit=useCallback(id=>mut(s=>({habits:s.habits.filter(h=>h.id!==id)})),[mut]);
  const applyActions=useCallback(actions=>mut(s=>{
    let tasks=[...s.tasks];
    for(const a of actions){
      if(a.type==="addTask"&&a.task) tasks.push({id:uid(),completed:false,planKey:"",createdAt:Date.now(),...a.task,category:a.task.category||detectCat(a.task.title||"")});
      else if(a.type==="updateTask"&&a.taskId) tasks=tasks.map(t=>t.id===a.taskId?{...t,...a.changes}:t);
      else if(a.type==="deleteTask"&&a.taskId) tasks=tasks.filter(t=>t.id!==a.taskId);
      else if(a.type==="completeTask"&&a.taskId) tasks=tasks.map(t=>t.id===a.taskId?{...t,completed:true,completedAt:Date.now()}:t);
      else if(a.type==="completeByCategory"&&a.date&&a.category){const t=tasks.find(x=>x.date===a.date&&x.category===a.category&&!x.completed);if(t)tasks=tasks.map(x=>x.id===t.id?{...x,completed:true,completedAt:Date.now(),notes:(x.notes?x.notes+"\n":"")+`Auto-completed from Apple Watch (${a.duration_min}min)`}:x);}
    }
    return{tasks};
  }),[mut]);

  if(!ready||!state) return html`<div style=${{height:"100vh",display:"grid",placeItems:"center",background:T.bg,color:T.muted}}>
    <div style=${{textAlign:"center"}}><div style=${{fontSize:32,marginBottom:8}}>⚡</div><div style=${{fontWeight:700}}>Loading…</div></div>
  </div>`;

  const NAV=[{id:"today",icon:"☀",label:"Today"},{id:"week",icon:"▦",label:"Week"},{id:"habits",icon:"✓",label:"Habits"},{id:"stats",icon:"📈",label:"Stats"},{id:"settings",icon:"⚙",label:"Settings"}];
  const weekDates=getWeekDates();
  const wTotal=state.tasks.filter(t=>weekDates.includes(t.date)&&t.category!=="work").length;
  const wDone=state.tasks.filter(t=>weekDates.includes(t.date)&&t.completed&&t.category!=="work").length;

  return html`<div style=${{background:T.bg,minHeight:"100vh",color:T.text,fontFamily:"ui-rounded,ui-sans-serif,system-ui,-apple-system,sans-serif"}}>
    <!-- Ambient -->
    <div style=${{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
      <div style=${{position:"absolute",top:"-5%",left:"5%",width:700,height:600,borderRadius:"50%",background:"radial-gradient(rgba(143,184,255,0.06),transparent 70%)"}}/>
      <div style=${{position:"absolute",top:"5%",right:0,width:500,height:450,borderRadius:"50%",background:"radial-gradient(rgba(255,209,107,0.05),transparent 65%)"}}/>
    </div>

    <div style=${{position:"relative",zIndex:1}}>
      <!-- Header -->
      <header style=${{position:"sticky",top:0,zIndex:20,display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"calc(12px + env(safe-area-inset-top)) 14px 12px",
        background:"rgba(7,8,15,0.88)",backdropFilter:"blur(16px)",borderBottom:`1px solid ${T.border}`}}>
        <div style=${{display:"flex",alignItems:"center",gap:10}}>
          <div style=${{width:36,height:36,borderRadius:12,background:T.blueGlow,border:`1px solid ${T.blueBorder}`,display:"grid",placeItems:"center",fontWeight:900,fontSize:12,color:T.blue}}>SK</div>
          <div>
            <div style=${{fontWeight:900,fontSize:15,color:T.text}}>ScheduleKeeper</div>
            <div style=${{fontSize:11,color:T.muted,fontWeight:700,marginTop:1}}>${wDone}/${wTotal} this week</div>
          </div>
        </div>
        <div style=${{display:"flex",gap:8}}>
          <${IconBtn} onClick=${()=>setTaskModal({task:null,date:todayISO()})} style=${{background:T.blueGlow,borderColor:T.blueBorder,color:T.blue,fontSize:17,fontWeight:900}}>＋<//>
          <${IconBtn} onClick=${()=>setCoachOpen(true)} style=${{background:T.accentGlow,borderColor:T.accentBorder,fontSize:18}}>🤖<//>
        </div>
      </header>

      ${view==="today"?html`<${TodayView} tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs} onToggleTask=${toggleTask} onEditTask=${t=>setTaskModal({task:t,date:null})} onToggleHabit=${toggleHabit} onOpenCoach=${()=>setCoachOpen(true)} healthData=${healthData}/>`:""}
      ${view==="week"?html`<${WeekView} tasks=${state.tasks} settings=${state.settings} onToggleTask=${toggleTask} onEditTask=${t=>setTaskModal({task:t,date:null})} onAddForDate=${date=>setTaskModal({task:null,date})}
        onPlanWeek=${eventOv=>{
          const week=getWeekDates();
          const newTasks=generateWeek(state.settings,week,eventOv);
          mut(s=>({tasks:[...s.tasks.filter(t=>!week.includes(t.date)),...newTasks]}));
          showToast(`✅ ${newTasks.length} tasks generated for this week`);
        }}/>`:""}
      ${view==="habits"?html`<${HabitsView} habits=${state.habits} habitLogs=${state.habitLogs} onToggleHabit=${toggleHabit} onEditHabit=${h=>setHabitModal(h)} onAddHabit=${()=>setHabitModal({isNew:true})}/>`:""}
      ${view==="stats"?html`<${StatsView} tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs} settings=${state.settings}/>`:""}
      ${view==="settings"?html`<${SettingsView} settings=${state.settings} syncStatus=${syncStatus}
        onUpdate=${changes=>mut(s=>({settings:{...s.settings,...changes}}))}
        onExport=${()=>{const b=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`sk-backup-${todayISO()}.json`;a.click();}}
        onReset=${()=>{if(confirm("Reset all data?"))setState({tasks:generateWeek(DEF_SETTINGS,getWeekDates()),habits:seedHabits(),habitLogs:{},goals:[],settings:{...DEF_SETTINGS}});}}/>`:""}

      <!-- Bottom nav -->
      <nav style=${{position:"fixed",left:0,right:0,bottom:0,zIndex:25,display:"flex",gap:4,
        padding:"8px 8px calc(8px + env(safe-area-inset-bottom))",
        background:"rgba(7,8,15,0.94)",backdropFilter:"blur(16px)",borderTop:`1px solid ${T.border}`}}>
        ${NAV.map(v=>html`<button key=${v.id} onClick=${()=>setView(v.id)} style=${{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,
          padding:"7px 4px",borderRadius:13,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${view===v.id?T.borderActive:"transparent"}`,
          background:view===v.id?T.surface:"transparent",
          color:view===v.id?T.text:T.muted,transition:"all 0.15s",
        }}><span style=${{fontSize:17}}>${v.icon}</span><span style=${{fontSize:10,fontWeight:800}}>${v.label}</span></button>`)}
        <button onClick=${()=>setCoachOpen(true)} style=${{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,
          padding:"7px 4px",borderRadius:13,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${T.accentBorder}`,background:T.accentGlow,color:T.accent,
        }}><span style=${{fontSize:17}}>🤖</span><span style=${{fontSize:10,fontWeight:800}}>Coach</span></button>
      </nav>
    </div>

    ${taskModal?html`<${TaskModal} task=${taskModal.task} initialDate=${taskModal.date}
      onSave=${t=>{upsertTask(t);setTaskModal(null);showToast(taskModal.task?"Updated ✅":"Added ✅");}}
      onDelete=${id=>{deleteTask(id);setTaskModal(null);showToast("Deleted");}}
      onClose=${()=>setTaskModal(null)}/>`:""}
    ${habitModal?html`<${HabitModal} habit=${habitModal.isNew?null:habitModal}
      onSave=${h=>{upsertHabit(h);setHabitModal(null);showToast(habitModal.isNew?"Habit added ✅":"Updated ✅");}}
      onDelete=${id=>{deleteHabit(id);setHabitModal(null);showToast("Deleted");}}
      onClose=${()=>setHabitModal(null)}/>`:""}

    <${CoachPanel} isOpen=${coachOpen} onClose=${()=>setCoachOpen(false)}
      tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs}
      settings=${state.settings} healthData=${healthData} onApplyActions=${applyActions}/>

    <${Toast} onReady=${toastReady}/>
  </div>`;
}

// ── Boot ──────────────────────────────────────────────────────
render(html`<${App}/>`, document.getElementById("app"));

// Service worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}
</script>
</body>
</html>
