    </div>
  </div>`;
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState(null); const [ready,setReady]=useState(false);
  const [view,setView]=useState("today");
  const [taskModal,setTaskModal]=useState(null); const [habitModal,setHabitModal]=useState(null);
  const [syncStatus,setSyncStatus]=useState(null);
  const [coachOpen,setCoachOpen]=useState(false);
  const toastReady=useCallback(fn=>{ _toast.fn=fn; },[]);

  useEffect(()=>{
    loadState().then(saved=>{
      if(saved){
        // Handle URL action params (for widget tap actions)
        const sp=new URLSearchParams(window.location.search);
        const action=sp.get("action");
        const taskId=sp.get("taskId");
        const habitId=sp.get("habitId");
        if(action==="completeNext"){
          const today=todayISO(); let marked=false;
          saved.tasks=(saved.tasks||[]).map(t=>{
            if(marked||t.date!==today||t.completed||t.category==="work")return t;
            marked=true; return{...t,completed:true,completedAt:Date.now()};
          });
          if(marked) setTimeout(()=>showToast("Task completed ✓"),400);
        }
        if(action==="complete"&&taskId){
          saved.tasks=(saved.tasks||[]).map(t=>t.id===taskId?{...t,completed:true,completedAt:Date.now()}:t);
          setTimeout(()=>showToast("Task completed ✓"),400);
        }
        if(action==="toggleHabit"&&habitId){
          const key=`${habitId}_${todayISO()}`;
          saved.habitLogs={...saved.habitLogs,[key]:!saved.habitLogs?.[key]};
          setTimeout(()=>showToast("Habit updated ✓"),400);
        }
        if(action) window.history.replaceState({},"",window.location.pathname);
        // Apple Health iOS Shortcut sync: ?hk=1&hrv=65&rhr=52&date=2026-03-14&sleep=22:00-06:30&sq=4
        if(sp.get("hk")==="1"){
          const hkDate=sp.get("date")||todayISO();
          const hkPatch={syncedAt:Date.now()};
          if(sp.get("hrv"))hkPatch.hrv=Number(sp.get("hrv"));
          if(sp.get("rhr"))hkPatch.restingHR=Number(sp.get("rhr"));
          if(sp.get("hr"))hkPatch.liveHR=Number(sp.get("hr"));
          if(sp.get("sleep")){
            const[bed,wake]=sp.get("sleep").split("-");
            hkPatch.sleep={bedtime:bed,wakeTime:wake,quality:Number(sp.get("sq")||3)};
          }
          saved.healthLogs={...saved.healthLogs,[hkDate]:{...saved.healthLogs?.[hkDate],...hkPatch}};
          // Workout auto-logging: ?hk=1&wt=running&wd=45&wcal=480&whr=158&wdist=7.2&wname=Morning+Run
          if(sp.get("wt")){
            const wType=sp.get("wt");
            const wName=sp.get("wname")||(wType.charAt(0).toUpperCase()+wType.slice(1).replace(/[_-]/g," "));
            const wDur=sp.get("wd")?Number(sp.get("wd")):null;
            const wCal=sp.get("wcal")?Number(sp.get("wcal")):null;
            const wHR=sp.get("whr")?Number(sp.get("whr")):null;
            const wDist=sp.get("wdist")?parseFloat(sp.get("wdist")):null;
            const wCat=mapAppleWorkout(wType);
            const noteParts=[wDur&&`${wDur}min`,wCal&&`${wCal} kcal`,wHR&&`${wHR}bpm avg`,wDist&&`${wDist}km`].filter(Boolean);
            const alreadyLogged=(saved.tasks||[]).some(t=>t.date===hkDate&&t.fromAppleHealth&&t.category===wCat&&t.title===wName);
            if(!alreadyLogged){
              saved.tasks=[...(saved.tasks||[]),{
                id:uid(),date:hkDate,time:"",title:wName,category:wCat,
                notes:noteParts.join(" · ")+(noteParts.length?" [Apple Health]":"[Apple Health]"),
                completed:true,completedAt:Date.now(),createdAt:Date.now(),fromAppleHealth:true,
              }];
              setTimeout(()=>showToast(`${wName} logged from Apple Health`),600);
            }
          }
          window.history.replaceState({},"",window.location.pathname);
          setTimeout(()=>showToast("Apple Health synced"),500);
        }
        setState({tasks:[],habits:[],habitLogs:{},healthLogs:{},foodLogs:{},notes:{},goals:[],trainingPlans:[],settings:DEF_SETTINGS,...saved,foodLogs:saved.foodLogs||{},notes:saved.notes||{},settings:{...DEF_SETTINGS,...saved?.settings,schedule:{...DEF_SCHEDULE,...saved?.settings?.schedule}}});
      } else {
        setState({tasks:generateWeek(DEF_SETTINGS,getWeekDates()),habits:seedHabits(),habitLogs:{},healthLogs:{},foodLogs:{},notes:{},goals:[],trainingPlans:[],settings:{...DEF_SETTINGS}});
      }
      setReady(true);
      // Check sync
      fetch(SYNC_URL).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("offline"));
    });
  },[]);

  useEffect(()=>{ if(ready&&state) saveState(state); },[state,ready]);
  useEffect(()=>{
    if(!state) return;
    if(state.settings?.notifEnabled){
      scheduleTaskReminders(state.tasks||[]);
      scheduleWellnessReminders(state.settings?.constraints?.bed);
    } else {
      _clearNotifTimers();
    }
    return _clearNotifTimers;
  },[state?.tasks, state?.settings?.notifEnabled, state?.settings?.constraints?.bed]);

  const mut=useCallback(fn=>setState(p=>({...p,...fn(p)})),[]);
  const toggleTask=useCallback(id=>mut(s=>({tasks:s.tasks.map(t=>t.id===id?{...t,completed:!t.completed,completedAt:!t.completed?Date.now():null}:t)})),[mut]);
  const upsertTask=useCallback(task=>mut(s=>{const i=s.tasks.findIndex(t=>t.id===task.id);if(i>=0){const tasks=[...s.tasks];tasks[i]={...tasks[i],...task};return{tasks};}return{tasks:[...s.tasks,task]};}),[mut]);
  const deleteTask=useCallback(id=>mut(s=>({tasks:s.tasks.filter(t=>t.id!==id)})),[mut]);
  const toggleHabit=useCallback((hid,date)=>mut(s=>({habitLogs:{...s.habitLogs,[`${hid}_${date}`]:!s.habitLogs[`${hid}_${date}`]}})),[mut]);
  const upsertHabit=useCallback(h=>mut(s=>{const i=s.habits.findIndex(x=>x.id===h.id);if(i>=0){const habits=[...s.habits];habits[i]={...habits[i],...h};return{habits};}return{habits:[...s.habits,h]};}),[mut]);
  const deleteHabit=useCallback(id=>mut(s=>({habits:s.habits.filter(h=>h.id!==id)})),[mut]);
  const upsertHealthLog=useCallback((date,patch)=>mut(s=>({healthLogs:{...s.healthLogs,[date]:{...s.healthLogs[date],...patch}}})),[mut]);
  const upsertFoodLog=useCallback((date,meals)=>mut(s=>({foodLogs:{...s.foodLogs,[date]:{meals}}})),[mut]);
  const upsertNote=useCallback((date,text)=>mut(s=>({notes:{...s.notes,[date]:text}})),[mut]);
  const bulkEditTasks=useCallback(moves=>mut(s=>({tasks:s.tasks.map(t=>{const mv=moves.find(m=>m.task.id===t.id);return mv?{...t,date:mv.toDate}:t;})})),[mut]);
  const upsertPlan=useCallback((plan,newTasks)=>mut(s=>({trainingPlans:[...(s.trainingPlans||[]).filter(p=>p.id!==plan.id),plan],tasks:[...s.tasks,...(newTasks||[])]})),[mut]);
  const deletePlan=useCallback(planId=>mut(s=>({trainingPlans:(s.trainingPlans||[]).filter(p=>p.id!==planId),tasks:s.tasks.filter(t=>!(t.planKey||"").startsWith(`plan_${planId}`))})),[mut]);
  const applyActions=useCallback(actions=>mut(s=>{
    let tasks=[...s.tasks];
    for(const a of actions){
      if(a.type==="addTask"&&a.task) tasks.push({id:uid(),completed:false,planKey:"",createdAt:Date.now(),...a.task,category:a.task.category||detectCat(a.task.title||"")});
      else if(a.type==="updateTask"&&a.taskId) tasks=tasks.map(t=>t.id===a.taskId?{...t,...a.changes}:t);
      else if(a.type==="deleteTask"&&a.taskId) tasks=tasks.filter(t=>t.id!==a.taskId);
      else if(a.type==="completeTask"&&a.taskId) tasks=tasks.map(t=>t.id===a.taskId?{...t,completed:true,completedAt:Date.now()}:t);
    }
    return{tasks};
  }),[mut]);

  if(!ready||!state) return html`<div style=${{
    height:"100vh",display:"grid",placeItems:"center",
    background:"radial-gradient(ellipse 80% 70% at 30% 20%,rgba(139,92,246,0.12),transparent 60%),radial-gradient(ellipse 60% 60% at 80% 80%,rgba(52,211,153,0.08),transparent 60%),#05070f",
    color:T.muted}}>
    <div style=${{textAlign:"center",animation:"fadeUp 0.6s ease"}}>
      <div style=${{
        width:56,height:56,borderRadius:18,margin:"0 auto 16px",
        background:"linear-gradient(135deg,rgba(167,139,250,0.2),rgba(52,211,153,0.12))",
        border:"1px solid rgba(167,139,250,0.3)",
        display:"grid",placeItems:"center",
        boxShadow:"0 0 32px rgba(167,139,250,0.2)",
      }}>
        <span style=${{fontWeight:900,fontSize:16,color:T.accent}}>FD</span>
      </div>
      <div style=${{fontWeight:900,letterSpacing:-0.5,fontSize:17,color:T.text}}>Feliz Dias</div>
      <div style=${{fontSize:9,color:T.muted,marginTop:6,fontWeight:800,letterSpacing:2.2,textTransform:"uppercase"}}>Loading</div>
    </div>
  </div>`;

  const NAV=[{id:"today",icon:"◉",label:"Today"},{id:"week",icon:"◫",label:"Review"},{id:"habits",icon:"◈",label:"Habits"},{id:"health",icon:"♦",label:"Health"},{id:"journal",icon:"✦",label:"Journal"},{id:"body",icon:"◍",label:"Body"},{id:"settings",icon:"⊙",label:"More"}];
  const weekDates=getWeekDates();
  const wTotal=state.tasks.filter(t=>weekDates.includes(t.date)&&t.category!=="work").length;
  const wDone=state.tasks.filter(t=>weekDates.includes(t.date)&&t.completed&&t.category!=="work").length;

  return html`<div style=${{background:T.bg,minHeight:"100vh",color:T.text,fontFamily:"ui-rounded,ui-sans-serif,system-ui,-apple-system,sans-serif"}}>
    <!-- Opal ambient -->
    <div style=${{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
      <!-- Violet-iris — top left -->
      <div style=${{position:"absolute",top:"-20%",left:"-10%",width:680,height:680,borderRadius:"50%",
        background:"radial-gradient(ellipse,rgba(139,92,246,0.13) 0%,rgba(109,40,217,0.06) 40%,transparent 68%)",
        animation:"opalShift 8s ease-in-out infinite"}}/>
      <!-- Mint-teal — middle right -->
      <div style=${{position:"absolute",top:"28%",right:"-14%",width:560,height:560,borderRadius:"50%",
        background:"radial-gradient(ellipse,rgba(52,211,153,0.09) 0%,rgba(16,185,129,0.04) 45%,transparent 68%)",
        animation:"opalShift 11s ease-in-out infinite 2s"}}/>
      <!-- Rose-champagne — bottom left -->
      <div style=${{position:"absolute",bottom:"-5%",left:"-5%",width:480,height:480,borderRadius:"50%",
        background:"radial-gradient(ellipse,rgba(249,168,212,0.07) 0%,rgba(236,72,153,0.03) 45%,transparent 68%)",
        animation:"opalShift 13s ease-in-out infinite 1s"}}/>
      <!-- Sky-blue — center -->
      <div style=${{position:"absolute",top:"55%",left:"30%",width:440,height:440,borderRadius:"50%",
        background:"radial-gradient(ellipse,rgba(56,189,248,0.06) 0%,rgba(14,165,233,0.03) 45%,transparent 68%)",
        animation:"opalShift 9s ease-in-out infinite 3.5s"}}/>
      <!-- Amber-gold — top right -->
      <div style=${{position:"absolute",top:"8%",right:"8%",width:320,height:320,borderRadius:"50%",
        background:"radial-gradient(ellipse,rgba(251,191,36,0.05) 0%,transparent 65%)",
        animation:"opalShift 15s ease-in-out infinite 0.5s"}}/>
      <!-- Deep purple haze — bottom right -->
      <div style=${{position:"absolute",bottom:"15%",right:"5%",width:380,height:380,borderRadius:"50%",
        background:"radial-gradient(ellipse,rgba(192,132,252,0.07) 0%,transparent 65%)",
        animation:"opalShift 10s ease-in-out infinite 4s"}}/>
      <!-- Fading cross — faith symbol -->
      <div style=${{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-55%)",width:520,height:520,pointerEvents:"none",animation:"opalShift 22s ease-in-out infinite 6s"}}>
        <div style=${{position:"absolute",left:"50%",top:"6%",transform:"translateX(-50%)",width:22,height:"88%",
          background:"linear-gradient(180deg,transparent 0%,rgba(255,255,255,0.045) 15%,rgba(255,255,255,0.065) 50%,rgba(255,255,255,0.045) 85%,transparent 100%)",
          borderRadius:11}}/>
        <div style=${{position:"absolute",top:"29%",left:"10%",width:"80%",height:22,
          background:"linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.045) 15%,rgba(255,255,255,0.065) 50%,rgba(255,255,255,0.045) 85%,transparent 100%)",
          borderRadius:11}}/>
      </div>
      <!-- Subtle noise texture overlay -->
      <div style=${{position:"absolute",inset:0,opacity:0.025,
        backgroundImage:"url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E\")",
        backgroundSize:"200px 200px"}}/>
    </div>

    <div style=${{position:"relative",zIndex:1}}>
      <!-- Header -->
      <header style=${{position:"sticky",top:0,zIndex:20,display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"calc(12px + env(safe-area-inset-top)) 18px 12px",
        background:"rgba(5,7,15,0.82)",backdropFilter:"blur(32px)",WebkitBackdropFilter:"blur(32px)",
        borderBottom:"1px solid rgba(255,255,255,0.055)",
        boxShadow:"0 1px 0 rgba(167,139,250,0.06),0 8px 32px rgba(0,0,0,0.3)"}}>
        <div style=${{display:"flex",alignItems:"center",gap:11}}>
          <div style=${{width:38,height:38,borderRadius:14,
            background:"linear-gradient(135deg,rgba(167,139,250,0.18) 0%,rgba(52,211,153,0.10) 100%)",
            border:"1px solid rgba(167,139,250,0.30)",
            display:"grid",placeItems:"center",
            boxShadow:"0 0 16px rgba(167,139,250,0.15),0 1px 0 rgba(255,255,255,0.08) inset"}}>
            <span style=${{fontWeight:900,fontSize:11,color:T.accent,letterSpacing:-0.3}}>FD</span>
          </div>
          <div>
            <div style=${{fontWeight:800,fontSize:15,color:T.text,letterSpacing:-0.5,lineHeight:1.1}}>Feliz Dias</div>
            <div style=${{fontSize:9,color:T.muted,fontWeight:700,marginTop:2,letterSpacing:0.8,textTransform:"uppercase"}}>
              ${wDone}<span style=${{color:"rgba(167,139,250,0.5)"}}>/${wTotal}</span> this week
            </div>
          </div>
        </div>
        <div style=${{display:"flex",gap:7}}>
          <button onClick=${()=>setTaskModal({task:null,date:todayISO()})} style=${{
            width:38,height:38,borderRadius:13,cursor:"pointer",fontSize:20,fontWeight:300,
            background:"linear-gradient(135deg,rgba(167,139,250,0.16),rgba(167,139,250,0.08))",
            border:"1px solid rgba(167,139,250,0.32)",color:T.accent,
            display:"grid",placeItems:"center",fontFamily:"inherit",
            boxShadow:"0 0 12px rgba(167,139,250,0.12)"}}>+</button>
          <button onClick=${()=>setCoachOpen(true)} style=${{
            width:38,height:38,borderRadius:13,cursor:"pointer",fontSize:16,
            background:"linear-gradient(135deg,rgba(52,211,153,0.14),rgba(52,211,153,0.06))",
            border:"1px solid rgba(52,211,153,0.28)",color:T.green,
            display:"grid",placeItems:"center",fontFamily:"inherit",
            boxShadow:"0 0 12px rgba(52,211,153,0.10)"}}>▸</button>
          <button onClick=${()=>setView("journal")} style=${{
            width:38,height:38,borderRadius:13,cursor:"pointer",fontSize:15,
            background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",
            color:T.muted,display:"grid",placeItems:"center",fontFamily:"inherit"}}>✦</button>
        </div>
      </header>

      ${view==="today"?html`<${TodayView} tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs} onToggleTask=${toggleTask} onEditTask=${t=>setTaskModal({task:t,date:null})} onToggleHabit=${toggleHabit} onOpenJournal=${()=>setView("journal")} healthLog=${state.healthLogs?.[todayISO()]||{}} onUpsertLog=${(patch)=>upsertHealthLog(todayISO(),patch)}/>`:""}
      ${view==="week"?html`<${ReviewView} tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs} healthLogs=${state.healthLogs||{}} notes=${state.notes||{}} settings=${state.settings} onUpsertNote=${upsertNote} onToggleTask=${toggleTask} onEditTask=${t=>setTaskModal({task:t,date:null})} onAddForDate=${date=>setTaskModal({task:null,date})}
        onPlanWeek=${eventOv=>{const week=getWeekDates();const newTasks=generateWeek(state.settings,week,eventOv);mut(s=>({tasks:[...s.tasks.filter(t=>!week.includes(t.date)),...newTasks]}));}}/>`:""}
      ${view==="habits"?html`<${HabitsView} habits=${state.habits} habitLogs=${state.habitLogs} onToggleHabit=${toggleHabit} onEditHabit=${h=>setHabitModal(h)} onAddHabit=${()=>setHabitModal({isNew:true})}/>`:""}
      ${view==="health"?html`<${HealthView} tasks=${state.tasks} healthLogs=${state.healthLogs||{}} onUpsertLog=${upsertHealthLog} foodLogs=${state.foodLogs||{}} settings=${state.settings} onUpsertFoodLog=${upsertFoodLog} onUpdateSettings=${changes=>mut(s=>({settings:{...s.settings,...changes}}))}/>`:""}
      ${view==="journal"?html`<${JournalView} tasks=${state.tasks} notes=${state.notes||{}} onUpsertNote=${upsertNote} healthLogs=${state.healthLogs||{}} onUpsertLog=${upsertHealthLog} onBulkEditTasks=${bulkEditTasks}/>`:""}
      ${view==="body"?html`<${BodyView} bodyMap=${state.healthLogs?.[todayISO()]?.bodyMap||{}} onUpdateBodyMap=${zones=>upsertHealthLog(todayISO(),{bodyMap:{zones}})}/>`:""}
      ${view==="settings"?html`<${SettingsView} settings=${state.settings} syncStatus=${syncStatus}
        trainingPlans=${state.trainingPlans||[]} tasks=${state.tasks}
        onUpsertPlan=${upsertPlan} onDeletePlan=${deletePlan}
        onUpdate=${changes=>mut(s=>({settings:{...s.settings,...changes}}))}
        onExport=${()=>{const b=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`sk-backup-${todayISO()}.json`;a.click();}}
        onReset=${()=>{if(confirm("Reset all data?"))setState({tasks:generateWeek(DEF_SETTINGS,getWeekDates()),habits:seedHabits(),habitLogs:{},healthLogs:{},foodLogs:{},notes:{},goals:[],trainingPlans:[],settings:{...DEF_SETTINGS}});}}/>`:""}

      <!-- Bottom nav — WHOOP-style pill -->
      <nav style=${{
        position:"fixed",left:12,right:12,bottom:0,zIndex:25,display:"flex",gap:1,
        padding:"6px",marginBottom:"calc(12px + env(safe-area-inset-bottom))",
        background:"rgba(5,7,15,0.88)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",
        border:"1px solid rgba(255,255,255,0.07)",borderRadius:26,
        boxShadow:"0 -2px 60px rgba(0,0,0,0.6),0 0 0 1px rgba(167,139,250,0.06) inset,0 2px 0 rgba(255,255,255,0.04) inset",
      }}>
        ${NAV.map(v=>html`<button key=${v.id} onClick=${()=>setView(v.id)} style=${{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
          padding:"8px 4px 7px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${view===v.id?"rgba(167,139,250,0.25)":"transparent"}`,
          background:view===v.id
            ?"linear-gradient(145deg,rgba(167,139,250,0.14),rgba(167,139,250,0.07))"
            :"transparent",
          color:view===v.id?T.accent:T.muted,
          boxShadow:view===v.id?"0 0 16px rgba(167,139,250,0.10)":"none",
          transition:"background 0.2s,border-color 0.2s,color 0.2s,box-shadow 0.2s",
        }}>
          <span style=${{
            fontSize:15,
            filter:view===v.id?`drop-shadow(0 0 6px ${T.accent}88)`:"none",
            transition:"filter 0.2s",
          }}>${v.icon}</span>
          <span style=${{fontSize:8,fontWeight:900,letterSpacing:0.8,textTransform:"uppercase"}}>${v.label}</span>
        </button>`)}
      </nav>
    </div>

    ${taskModal?html`<${TaskModal} task=${taskModal.task} initialDate=${taskModal.date}
      onSave=${t=>{upsertTask(t);setTaskModal(null);showToast(taskModal.task?"Updated":"Added");}}
      onDelete=${id=>{deleteTask(id);setTaskModal(null);showToast("Deleted");}}
      onClose=${()=>setTaskModal(null)}/>`:""}
    ${habitModal?html`<${HabitModal} habit=${habitModal.isNew?null:habitModal}
      onSave=${h=>{upsertHabit(h);setHabitModal(null);showToast(habitModal.isNew?"Habit added":"Updated");}}
      onDelete=${id=>{deleteHabit(id);setHabitModal(null);showToast("Deleted");}}
      onClose=${()=>setHabitModal(null)}/>`:""}

    <${CoachPanel} isOpen=${coachOpen} onClose=${()=>setCoachOpen(false)}
      tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs}
      settings=${state.settings} onApplyActions=${applyActions}/>

    <${Toast} onReady=${toastReady}/>
  </div>`;
}

// ── Boot ──────────────────────────────────────────────────────
render(html`<${App}/>`, document.getElementById("app"));

// Service worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}
</script>
</body>
</html>
