<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:#070b14;color:#eef2ff;font-family:ui-rounded,ui-sans-serif,system-ui,-apple-system,sans-serif}
input,textarea,select,button{font-family:inherit}

.sk-habit:hover{filter:brightness(1.08)}
input:focus,textarea:focus{outline:none;border-color:rgba(129,140,248,0.55)!important;box-shadow:0 0 0 3px rgba(129,140,248,0.12)}

<script type="module">
import { h, render, Fragment } from 'preact';
import { useState, useEffect, useRef, useCallback, useMemo } from 'preact/hooks';
import { html } from 'htm/preact';

// ── Design tokens ────────────────────────────────────────────
const T = {
  bg:"#070b14",surface:"rgba(255,255,255,0.058)",surfaceHover:"rgba(255,255,255,0.095)",surfaceElevated:"rgba(255,255,255,0.085)",
  border:"rgba(255,255,255,0.085)",borderActive:"rgba(255,255,255,0.28)",

  // emerald – success / recovery
  green:"#34d399",greenGlow:"rgba(52,211,153,0.13)",greenBorder:"rgba(52,211,153,0.32)",

  purple:"#c084fc",
  shadow:"0 2px 4px rgba(0,0,0,0.55),0 12px 40px rgba(0,0,0,0.38)",
};
const CATS = {
  run:     {emoji:"🏃",color:"#818cf8",glow:"rgba(129,140,248,0.14)",border:"rgba(129,140,248,0.32)",label:"Run"},
  football:{emoji:"⚽",color:"#fb923c",glow:"rgba(251,146,60,0.14)",border:"rgba(251,146,60,0.32)",label:"Football"},
  game:    {emoji:"🏟",color:"#f472b6",glow:"rgba(244,114,182,0.14)",border:"rgba(244,114,182,0.30)",label:"Game"},
  bike:    {emoji:"🚴",color:"#22d3ee",glow:"rgba(34,211,238,0.14)",border:"rgba(34,211,238,0.30)",label:"Bike"},
  pilates: {emoji:"🧘",color:"#c084fc",glow:"rgba(192,132,252,0.14)",border:"rgba(192,132,252,0.30)",label:"Pilates"},
  recovery:{emoji:"🌿",color:"#34d399",glow:"rgba(52,211,153,0.13)",border:"rgba(52,211,153,0.30)",label:"Recovery"},
  sauna:   {emoji:"🌡",color:"#fb7185",glow:"rgba(251,113,133,0.13)",border:"rgba(251,113,133,0.30)",label:"Sauna"},
  work:    {emoji:"💼",color:"#94a3b8",glow:"rgba(148,163,184,0.07)",border:"rgba(148,163,184,0.18)",label:"Work"},
  other:   {emoji:"◈",color:"#64748b", glow:"rgba(255,255,255,0.04)",border:"rgba(255,255,255,0.10)",label:"Other"},
};

// ── Utils ──────────────────────────────────────────────────
const pad2 = n => String(n).padStart(2,"0");
const uid = () => crypto?.randomUUID?.() ?? Math.random().toString(36).slice(2)+Date.now().toString(36);
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; };
const isoDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const parseDate = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const startOfDay = d => new Date(d.getFullYear(),d.getMonth(),d.getDate());
const fmtTime = t => { if(!t)return""; const [h,m]=t.split(":").map(Number); return `${h%12||12}:${pad2(m)}${h>=12?"pm":"am"}`; };
const fmtDayShort = s => parseDate(s).toLocaleDateString("en-GB",{weekday:"short"});
const fmtDayLong = s => parseDate(s).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
const fmtDateNum = s => parseDate(s).getDate();

function getWeekDates(from=new Date()){
  const d=startOfDay(from); const dow=(d.getDay()+6)%7; const mon=addDays(d,-dow);
  return Array.from({length:7},(_,i)=>isoDate(addDays(mon,i)));
}
function detectCat(title=""){
  const t=title.toLowerCase();
  if(/\bgame\b|\bmatch\b|\bvs\b/.test(t))return"game";
  if(/\brun\b|\bjog\b|\bsprint\b|\bstride/.test(t))return"run";
  if(/football|soccer/.test(t))return"football";
  if(/\bbike\b|\bcycle|\bspin\b/.test(t))return"bike";
  if(/pilates/.test(t))return"pilates";
  if(/recovery|\brest\b|\bwalk\b|\bmobil/.test(t))return"recovery";
  if(/sauna|pool|steam/.test(t))return"sauna";
  if(/\bwork\b|office|meeting/.test(t))return"work";
  return"other";
}

// ── Sync ────────────────────────────────────────────────────
const SK_KEY="sk2";
const SYNC_URL="/api/sync";

async function loadState(){
  try{ const r=await window.storage?.get(SK_KEY); if(r?.value)return JSON.parse(r.value); }catch{}
  try{ const r=localStorage.getItem(SK_KEY); if(r)return JSON.parse(r); }catch{}
  return null;
}
const _saveBuf={timer:null};
function saveState(state){
  const j=JSON.stringify(state);
  try{ window.storage?.set(SK_KEY,j); }catch{}
  try{ localStorage.setItem(SK_KEY,j); }catch{}
  // Debounced sync to Netlify (for widget)
  clearTimeout(_saveBuf.timer);
  _saveBuf.timer=setTimeout(()=>{
    fetch(SYNC_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:j}).catch(()=>{});
  },1500);
}

// ── Seed data ────────────────────────────────────────────────
function seedTasks(){
  const tasks=[],week=getWeekDates();
  const push=(date,time,title,category,notes="",planKey="")=>
    tasks.push({id:uid(),date,time,title,category,notes,completed:false,planKey,createdAt:Date.now()});
  week.forEach((date,dow)=>{
    if(dow<5){
      const we=["17:00","16:00","17:00","16:00","14:00"][dow];
      push(date,"08:00","Work","work","",`work_${dow}`);
      push(date,we,"Work ends","work","Free window",`wend_${dow}`);
      const runs=[
        ["06:00","Run 30min + 3 sprints (10–12s)","run","Easy pace. Full walk between.","run_mon"],
        ["06:00","Run 30min easy","run","Conversational pace.","run_tue"],
        ["06:00","Bike 35min Zone 2 + 6×10s spin-ups","bike","Fast legs, low resistance.","bike_wed"],
        ["06:00","Run 35min + 3 sprints (10–12s)","run","Crisp sprints.","run_thu"],
        ["06:00","Run 30min easy + 4 strides","run","Relaxed, perfect form.","run_fri"],
      ];
      push(date,...runs[dow]);
      if(dow===1) push(date,"06:40","Pilates 20min","pilates","Core + control.","pil_tue");
      push(date,["18:00","18:00","18:00","18:00","15:30"][dow],"Football session","football","","foot_"+dow);
    }else if(dow===5){
      push(date,"06:10","Active recovery: walk + mobility 45min","recovery","","rec_sat");
      push(date,"06:25","Pilates 30min","pilates","Treat as recovery.","pil_sat");
      push(date,"06:55","Bike easy Zone 1–2 (25min)","bike","Easy spin.","bike_sat");
    }else{
      push(date,"06:10","Active recovery: walk + mobility 45min","recovery","","rec_sun");
      push(date,"06:55","Bike easy Zone 1–2 (25min)","bike","Easy spin.","bike_sun");
    }
  });
  return tasks;
}
function seedHabits(){ return [
  {id:uid(),title:"Wake at 5am",emoji:"⏰",days:[0,1,2,3,4,5,6]},
  {id:uid(),title:"Prayer + Bible",emoji:"✝️",days:[0,1,2,3,4,5,6]},
  {id:uid(),title:"Mobility 10min",emoji:"🤸",days:[0,1,2,3,4,5,6]},
  {id:uid(),title:"Sauna + pool",emoji:"♨️",days:[0,1,2,3,4,5,6]},
  {id:uid(),title:"Eat clean",emoji:"🥗",days:[0,1,2,3,4,5,6]},
  {id:uid(),title:"Bed by 9pm",emoji:"🌙",days:[0,1,2,3,4,5,6]},
];}
const DEF_SETTINGS={weekTargets:{run:5,football:5,bike:3,pilates:2,recovery:2,sauna:5},constraints:{wake:"05:00",bed:"21:00"}};

// ── Coach (Claude) ────────────────────────────────────────────
const SYSTEM=`You are Coach — a sharp, adaptive performance coach for a dedicated football player.

PROFILE: Trains 5–7am + evenings. Work Mon/Wed 8–5, Tue/Thu 8–4, Fri 8–2. Wake 5am, bed 9pm.
Weekly targets: 5×runs, 5×football, 3×bike, 2×pilates, 2×recovery, 5×sauna.

CONTEXT: You receive today's date/time, upcoming tasks (with IDs), week stats, constraints, habits.

KEY SCENARIOS:
① "MATCH CANCELLED"/"game cancelled"/"game is off":
  a) Find game task → deleteTask it
  b) Find taper/prep tasks (reduced sessions, wind-downs) → deleteTask or restore
  c) Replace with quality training: morning → addTask "Run 40min + 4 sprint strides [match cancelled]" cat:run
     evening → addTask "Football technique + fitness 50min [match cancelled]" cat:football + addTask "Pilates 20min" cat:pilates
  Reply: "Got it — match cancelled. Replaced with quality training. Nothing wasted."

② "GAME [day/time]":
  a) addTask match cat:game on correct date
  b) Day before: updateTask to reduce intensity (remove sprint refs)
  c) Day before: addTask "Early wind-down 9pm" at 20:30 cat:other
  d) Game day: addTask "Fuel + hydration check" at 12:00 cat:other
  e) Day after: addTask "Active recovery: walk + mobility 30min" at 06:10 cat:recovery

③ "TIRED/SORE/HEAVY LEGS":
  a) Replace today's hard sessions with "Easy walk + mobility 30min" cat:recovery
  b) Reduce tomorrow if high load

④ General: honour work hours, prefer 5–7am, no hard sessions back-to-back.

OUTPUT STRICT JSON ONLY:
{"reply":"1–3 sentence warm reply","actions":[...]}

ACTIONS:
{"type":"addTask","task":{"title":"...","date":"YYYY-MM-DD","time":"HH:MM","category":"...","notes":"..."}}
{"type":"updateTask","taskId":"...","changes":{"title":"...","time":"...","category":"...","notes":"..."}}
{"type":"deleteTask","taskId":"..."}
{"type":"completeTask","taskId":"..."}`;

async function callCoach(msg,ctx){
  const res=await fetch("/api/coach",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg,context:ctx})});
  const data=await res.json();
  if(typeof data.reply==="string") return data;
  return {reply:"Try again.",actions:[]};

}

// ── Base components ───────────────────────────────────────────
function Ring({pct=0,size=48,stroke=3.2,color=T.accent,glow=false}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,dash=(Math.min(100,pct)/100)*circ;
  const id=`rg${size}${stroke}`.replace(".","");
  return html`<svg width=${size} height=${size} style=${{transform:"rotate(-90deg)",flexShrink:0,filter:glow&&pct>20?`drop-shadow(0 0 ${Math.round(stroke*2)}px ${color}99)`:undefined}}>
    <circle cx=${size/2} cy=${size/2} r=${r} stroke="rgba(255,255,255,0.07)" stroke-width=${stroke} fill="none"/>
    <circle cx=${size/2} cy=${size/2} r=${r} stroke=${color} stroke-width=${stroke} fill="none"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray 0.5s cubic-bezier(0.34,1.2,0.64,1)"/>
  </svg>`;
}

const S={
  card:{background:T.surface,border:`1px solid ${T.border}`,borderRadius:22,padding:16,backdropFilter:"blur(16px)",boxShadow:T.shadow},
  input:{width:"100%",padding:"11px 14px",borderRadius:14,border:`1px solid ${T.border}`,
    background:"rgba(255,255,255,0.045)",color:T.text,fontSize:14,outline:"none",boxSizing:"border-box",transition:"border-color 0.15s,box-shadow 0.15s"},
  section:{fontSize:11,fontWeight:800,color:T.muted,letterSpacing:1.4,marginBottom:10,textTransform:"uppercase"},
};

function Btn({onClick,children,variant="default",style={},disabled=false}){
  const V={
    default:{background:T.surface,border:`1px solid ${T.border}`,color:T.text},
    primary:{background:T.blueGlow,border:`1px solid ${T.blueBorder}`,color:T.blue,boxShadow:`0 0 16px ${T.blueGlow}`},
    accent:{background:T.accentGlow,border:`1px solid ${T.accentBorder}`,color:T.accent},
    danger:{background:T.redGlow,border:`1px solid ${T.redBorder}`,color:T.red},
    ghost:{background:"transparent",border:`1px solid ${T.border}`,color:T.muted},
  };
  return html`<button onClick=${onClick} disabled=${disabled} style=${{
    display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,
    padding:"10px 18px",borderRadius:14,fontFamily:"inherit",fontWeight:800,fontSize:13,
    letterSpacing:0.4,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,
    userSelect:"none",...V[variant],...style
  }}>${children}</button>`;
}

function Chip({children,active=false,onClick,color}){
  const c=color||T.accent;
  const cGlow=active?`${c}22`:"transparent";
  return html`<button onClick=${onClick} style=${{
    display:"inline-flex",alignItems:"center",gap:4,padding:"6px 13px",
    borderRadius:999,border:`1px solid ${active?c+"55":T.border}`,
    background:active?cGlow:T.surface,color:active?c:T.muted,
    fontSize:12,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap",
    fontFamily:"inherit",
    boxShadow:active?`0 0 12px ${c}22`:"none",
  }}>${children}</button>`;
}

function IconBtn({onClick,children,style={}}){
  return html`<button onClick=${onClick} style=${{
    width:38,height:38,borderRadius:13,border:`1px solid ${T.border}`,
    background:T.surface,color:T.muted,fontSize:15,cursor:"pointer",
    display:"grid",placeItems:"center",flexShrink:0,...style
  }}>${children}</button>`;
}

function Label({children}){
  return html`<div style=${{fontSize:11,fontWeight:800,color:T.muted,letterSpacing:0.8,marginBottom:6}}>${children}</div>`;
}

// ── Toast ─────────────────────────────────────────────────────
const _toast={fn:null};
function showToast(msg){ _toast.fn?.(msg); }
function Toast({onReady}){
  const [msg,setMsg]=useState(""); const [vis,setVis]=useState(false); const t=useRef();
  useEffect(()=>{ onReady(m=>{setMsg(m);setVis(true);clearTimeout(t.current);t.current=setTimeout(()=>setVis(false),2600);}); },[]);
  if(!vis) return null;
  return html`<div style=${{position:"fixed",bottom:96,left:"50%",transform:"translateX(-50%)",
    background:"rgba(7,11,20,0.97)",border:`1px solid ${T.blueBorder}`,
    borderRadius:16,padding:"10px 20px",zIndex:200,color:T.text,fontSize:13,
    fontWeight:800,maxWidth:320,textAlign:"center",backdropFilter:"blur(20px)",
    boxShadow:`0 8px 32px rgba(0,0,0,0.5),0 0 0 1px rgba(129,140,248,0.12) inset`,
    animation:"fadeUp 0.2s ease",letterSpacing:0.2}}>${msg}</div>`;
}

// ── Task Item ─────────────────────────────────────────────────
function TaskItem({task,onToggle,onEdit,highlight=false}){
  const cat=CATS[task.category]||CATS.other;
  return html`<div onClick=${()=>onEdit(task)} className="sk-task" style=${{
    display:"flex",alignItems:"center",gap:11,padding:"12px 14px 12px 12px",
    borderRadius:16,
    border:`1px solid ${highlight?cat.border:task.completed?"rgba(255,255,255,0.05)":T.border}`,
    borderLeft:`3px solid ${task.completed?"rgba(255,255,255,0.08)":cat.color}`,
    background:task.completed?"rgba(255,255,255,0.015)":(highlight?`${cat.glow}`:`${T.surface}`),
    cursor:"pointer",transition:"background 0.15s,border-color 0.15s",
    opacity:task.completed?0.42:1,
  }}>
    <button onClick=${e=>{e.stopPropagation();onToggle(task.id);}} style=${{
      width:26,height:26,borderRadius:9,flexShrink:0,
      border:`2px solid ${task.completed?cat.color:T.border}`,
      background:task.completed?cat.color:"transparent",
      color:"#070b14",
      cursor:"pointer",display:"grid",placeItems:"center",
      fontSize:12,fontWeight:900,
      animation:task.completed?"popIn 0.25s cubic-bezier(0.34,1.56,0.64,1)":undefined,
      boxShadow:task.completed?`0 0 10px ${cat.color}55`:undefined,
    }}>${task.completed?"✓":""}</button>
    <div style=${{flex:1,minWidth:0}}>
      <div style=${{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
        <span style=${{fontSize:15}}>${cat.emoji}</span>
        <span style=${{fontSize:14,fontWeight:800,color:task.completed?T.muted:T.text,textDecoration:task.completed?"line-through":"none",letterSpacing:-0.1}}>
          ${task.title}
        </span>
        ${highlight?html`<span style=${{fontSize:10,fontWeight:900,padding:"2px 8px",borderRadius:999,background:`${cat.color}22`,border:`1px solid ${cat.color}55`,color:cat.color,letterSpacing:0.5}}>NOW</span>`:""}
      </div>
      ${(task.time||task.notes)&&task.category!=="work"?html`
        <div style=${{marginTop:3,display:"flex",gap:10,color:T.muted,fontSize:12,fontWeight:600}}>
          ${task.time?html`<span style=${{color:`${cat.color}bb`}}>${fmtTime(task.time)}</span>`:""}
          ${task.notes?html`<span style=${{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:220}}>${task.notes}</span>`:""}
        </div>`:""}
    </div>
  </div>`;
}

// ── Today View ────────────────────────────────────────────────
function TodayView({tasks,habits,habitLogs,onToggleTask,onEditTask,onToggleHabit,onOpenCoach}){
  const todayStr=todayISO(),now=new Date(),curTime=`${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
  const todayTasks=useMemo(()=>tasks.filter(t=>t.date===todayStr&&t.category!=="work").sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99")),[tasks,todayStr]);
  const nextTask=todayTasks.find(t=>!t.completed&&t.time&&t.time>curTime);
  const done=todayTasks.filter(t=>t.completed).length,total=todayTasks.length,pct=total>0?Math.round((done/total)*100):0;
  const weekDates=getWeekDates();
  const weekCats=useMemo(()=>{
    const s={};
    tasks.filter(t=>weekDates.includes(t.date)&&t.category!=="work").forEach(t=>{
      if(!s[t.category])s[t.category]={done:0,total:0};
      s[t.category].total++;if(t.completed)s[t.category].done++;
    });
    return s;
  },[tasks]);
  const todayHabits=habits.filter(h=>h.days.includes(now.getDay()));

  const pctColor=pct>=80?T.green:pct>=50?T.blue:T.accent;
  return html`<div style=${{padding:"14px 14px 110px",maxWidth:820,margin:"0 auto"}}>
    <!-- hero card -->
    <div className="sk-card" style=${{
      background:`linear-gradient(140deg,rgba(129,140,248,0.10) 0%,rgba(52,211,153,0.06) 55%,rgba(251,191,36,0.05) 100%)`,
      border:`1px solid ${T.border}`,borderRadius:24,padding:20,marginBottom:16,
      boxShadow:`0 0 0 1px rgba(129,140,248,0.08) inset,${T.shadow}`,
    }}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
        <div style=${{flex:1}}>
          <div style=${{fontSize:10,fontWeight:900,color:T.muted,letterSpacing:1.6,marginBottom:5}}>TODAY</div>
          <div style=${{fontSize:19,fontWeight:900,color:T.text,lineHeight:1.2,letterSpacing:-0.3}}>${fmtDayLong(todayStr)}</div>
          <div style=${{marginTop:11,display:"flex",gap:5,flexWrap:"wrap"}}>
            ${Object.entries(weekCats).filter(([k])=>!["other","work"].includes(k)&&weekCats[k].total>0).map(([k,s])=>
              html`<${Chip} key=${k} active=${s.done>0} color=${CATS[k]?.color}>${CATS[k]?.emoji} ${s.done}/${s.total}<//>`)
            }
          </div>
        </div>
        <div style=${{textAlign:"center",flexShrink:0}}>
          <div style=${{position:"relative",width:58,height:58}}>
            <${Ring} pct=${pct} size=${58} stroke=${4.5} color=${pctColor} glow=${pct>0}/>
            <div style=${{position:"absolute",inset:0,display:"grid",placeItems:"center",fontSize:13,fontWeight:900,color:pctColor}}>${pct}%</div>
          </div>

                <span style=${{color:weekDone>0?T.green:T.muted}}>${weekDone}/7 this week</span>

          </div>
          <${IconBtn} onClick=${()=>onEditHabit(h)} style=${{fontSize:13}}>✎<//>
        </div>
        <div style=${{display:"flex",gap:5,marginTop:13}}>

                <span style=${{fontSize:9,fontWeight:900,color:done?T.green:isToday?T.blue:T.muted,letterSpacing:0.4}}>${DAY_LABELS[i]}</span>
                ${done?html`<span style=${{fontSize:11,color:T.green,lineHeight:1}}>✓</span>`:""}

// ── Coach Panel ───────────────────────────────────────────────
function CoachPanel({isOpen,onClose,tasks,habits,habitLogs,settings,onApplyActions}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hey! I'm Coach 🤖\n\nTell me what's changed:\n• \"Match cancelled\" — I'll swap it for quality training\n• \"I have a game tomorrow at 7pm\"\n• \"I feel tired today\"\n• \"What should I do next?\""}]);
  const [input,setInput]=useState(""); const [busy,setBusy]=useState(false);
  const bodyRef=useRef(null); const inputRef=useRef(null);
  useEffect(()=>{ if(isOpen) setTimeout(()=>inputRef.current?.focus(),100); },[isOpen]);
  useEffect(()=>{ if(bodyRef.current) bodyRef.current.scrollTop=bodyRef.current.scrollHeight; },[msgs,busy]);

  const buildCtx=useCallback(()=>{
    const now=new Date(),todayStr=todayISO(),weekDates=getWeekDates();
    const upcoming=tasks.filter(t=>t.date>=todayStr).sort((a,b)=>(`${a.date}${a.time||""}`).localeCompare(`${b.date}${b.time||""}`)).slice(0,60).map(t=>({id:t.id,title:t.title,date:t.date,time:t.time||null,category:t.category,completed:t.completed,planKey:t.planKey||null,notes:t.notes||""}));
    const weekStats={};tasks.filter(t=>weekDates.includes(t.date)).forEach(t=>{if(!weekStats[t.category])weekStats[t.category]={done:0,total:0};weekStats[t.category].total++;if(t.completed)weekStats[t.category].done++;});
    return{today:todayStr,dayOfWeek:now.toLocaleDateString("en-GB",{weekday:"long"}),timeNow:`${pad2(now.getHours())}:${pad2(now.getMinutes())}`,weekStats,weekTargets:settings.weekTargets,constraints:settings.constraints,upcomingTasks:upcoming,todayHabits:habits.filter(h=>h.days.includes(now.getDay())).map(h=>({id:h.id,title:h.title,done:!!habitLogs[`${h.id}_${todayStr}`]}))};
  },[tasks,habits,habitLogs,settings]);

  const QUICK=[
    {l:"Match cancelled ❌",p:"Match cancelled"},
    {l:"Game tomorrow 🏟️",p:"I have a game tomorrow evening"},
    {l:"Tired today 😴",p:"I feel tired and heavy legged today"},
    {l:"What's next? ⚡",p:"What should I do next?"},
    {l:"Week check 📊",p:"How is my week going so far?"},
    {l:"Rest day 🌙",p:"Make today a rest day"},
    {l:"Add sprints 💨",p:"Add a sprint session today at 6am"},
  ];
  const send=async(text)=>{
    const t=text.trim(); if(!t||busy) return;
    setMsgs(p=>[...p,{role:"user",content:t}]); setInput(""); setBusy(true);
    try{
      const r=await callCoach(t,buildCtx());
      setMsgs(p=>[...p,{role:"assistant",content:r.reply}]);
      if(r.actions?.length){ onApplyActions(r.actions); showToast(`✅ ${r.actions.length} update${r.actions.length>1?"s":""} applied`); }
    }catch{setMsgs(p=>[...p,{role:"assistant",content:"⚠️ Can't reach Coach right now."}]);}
    finally{setBusy(false);}
  };

  if(!isOpen) return null;
  return html`<div style=${{position:"fixed",inset:0,zIndex:80,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(12px)",display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick=${onClose}>
    <div style=${{background:"rgba(7,11,20,0.98)",backdropFilter:"blur(32px)",borderRadius:"26px 26px 0 0",border:`1px solid ${T.border}`,borderBottom:"none",display:"flex",flexDirection:"column",maxHeight:"90vh",paddingBottom:"env(safe-area-inset-bottom)",boxShadow:`0 -32px 80px rgba(0,0,0,0.8),0 0 0 1px rgba(129,140,248,0.08) inset`,animation:"slideUp 0.3s cubic-bezier(0.22,1,0.36,1)"}} onClick=${e=>e.stopPropagation()}>
      <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 16px 12px",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <div style=${{display:"flex",alignItems:"center",gap:11}}>
          <div style=${{width:42,height:42,borderRadius:15,
            background:"linear-gradient(135deg,rgba(129,140,248,0.25),rgba(251,191,36,0.12))",
            border:`1px solid rgba(129,140,248,0.35)`,
            display:"grid",placeItems:"center",fontSize:20,
            boxShadow:`0 0 20px rgba(129,140,248,0.25)`}}>⚡</div>
          <div>
            <div style=${{fontWeight:900,fontSize:16,color:T.text,letterSpacing:-0.3}}>Coach</div>
            <div style=${{fontSize:11,fontWeight:700,color:busy?T.accent:T.green,display:"flex",alignItems:"center",gap:4}}>
              ${busy?html`<span style=${{animation:"pulseGlow 1s infinite"}}>◌</span> thinking…`:html`<span>◉</span> ready`}
            </div>
          </div>
        </div>
        <${IconBtn} onClick=${onClose} style=${{color:T.muted}}>✕<//>
      </div>
      <div ref=${bodyRef} style=${{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:10,minHeight:180}}>
        ${msgs.map((m,i)=>html`<div key=${i} style=${{
          alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"88%",padding:"10px 13px",
          borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
          background:m.role==="user"?T.accentGlow:T.surface,
          border:`1px solid ${m.role==="user"?T.accentBorder:T.border}`,
          boxShadow:m.role==="user"?"0 2px 8px rgba(0,0,0,0.2)":T.shadow,
          color:T.text,fontSize:14,lineHeight:1.55,whiteSpace:"pre-wrap",
        }}>
          ${m.role==="assistant"?html`<div style=${{fontSize:10,fontWeight:800,color:T.blue,marginBottom:5,letterSpacing:0.8}}>COACH</div>`:""}

const STRAIN_WEIGHTS={game:3.5,football:3.5,run:2.5,bike:2.0,pilates:1.5,sauna:0.7,recovery:0.5,work:0,other:0.5};

function calcSleepMins(bedtime,wakeTime){
  if(!bedtime||!wakeTime)return null;
  const[bh,bm]=bedtime.split(":").map(Number);
  const[wh,wm]=wakeTime.split(":").map(Number);
  let m=(wh*60+wm)-(bh*60+bm);
  if(m<0)m+=1440;
  return m;
}
function calcRecovery(log){
  if(!log)return null;
  let pts=0,total=0;
  if(log.sleep?.bedtime&&log.sleep?.wakeTime){
    const mins=calcSleepMins(log.sleep.bedtime,log.sleep.wakeTime);
    if(mins!=null){const hrs=mins/60;pts+=Math.min(40,hrs>=8?40:40*(hrs/8));}
    total+=40;
  }
  if(log.sleep?.quality){pts+=(log.sleep.quality-1)/4*20;total+=20;}
  if(log.hrv){pts+=Math.min(25,Math.max(0,(log.hrv-30)/50*25));total+=25;}
  if(log.restingHR){pts+=Math.min(15,Math.max(0,(80-log.restingHR)/40*15));total+=15;}
  if(total===0)return null;
  return Math.round(pts/total*100);
}
function calcStrain(tasks,date){
  return tasks.filter(t=>t.date===date&&t.completed).reduce((s,t)=>s+(STRAIN_WEIGHTS[t.category]??0.5),0);
}
function recoveryColor(s){if(s==null)return T.muted;if(s>=67)return T.green;if(s>=34)return"#fbbf24";return T.red;}
function strainColor(s){if(s<7)return T.green;if(s<14)return"#fbbf24";return T.red;}

const PLAN_PRESETS=[
  {name:"5K Starter",    desc:"Build your base",    startMins:20,sessionsPerWeek:3,totalWeeks:6},
  {name:"5K Builder",    desc:"Push to 5K",          startMins:25,sessionsPerWeek:3,totalWeeks:8},
  {name:"10K Prep",      desc:"Double the distance", startMins:30,sessionsPerWeek:4,totalWeeks:10},
  {name:"Half Marathon", desc:"Long game",            startMins:35,sessionsPerWeek:4,totalWeeks:12},
  {name:"Custom",        desc:"Set your own params", startMins:25,sessionsPerWeek:3,totalWeeks:8},
];

// Session type labels and day offsets per session count
const SESSION_CONFIG={
  2:{days:[0,4],types:[["Easy","Long"],["Tempo","Long"]]},
  3:{days:[0,2,4],types:[["Easy","Easy","Long"],["Easy","Tempo","Long"]]},
  4:{days:[0,1,3,5],types:[["Easy","Tempo","Easy","Long"],["Easy","Tempo","Easy","Long"]]},
  5:{days:[0,1,3,4,6],types:[["Easy","Tempo","Easy","Easy","Long"],["Easy","Tempo","Easy","Tempo","Long"]]},
};

const SESSION_NOTES={
  Easy:"Zone 2 — conversational pace, comfortable effort.",
  Tempo:"Comfortably hard — sustain for the full run.",
  Long:"Slow and steady — 60-90s/km slower than easy pace.",
};

function generatePlanTasks(plan){
  const tasks=[];
  const cfg=SESSION_CONFIG[plan.sessionsPerWeek]||SESSION_CONFIG[3];
  const days=cfg.days;
  const typeMatrix=cfg.types;
  const start=parseDate(plan.startDate);
  // Align start to Monday of that week
  const startDow=(start.getDay()+6)%7;
  const monday=addDays(start,-startDow);

  for(let w=0;w<plan.totalWeeks;w++){
    const weekMins=plan.startMins+(w*plan.incrementMins);
    const types=typeMatrix[w%typeMatrix.length];
    days.forEach((dayOffset,si)=>{
      const date=isoDate(addDays(monday,w*7+dayOffset));
      const type=types[si];
      tasks.push({
        id:uid(),
        date,
        time:"06:00",
        title:`Run ${weekMins}min — ${type}`,
        category:"run",
        notes:SESSION_NOTES[type],
        completed:false,
        planKey:`plan_${plan.id}_w${w}_s${si}`,
        createdAt:Date.now(),
      });
    });
  }
  return tasks;
}

function getPlanCurrentWeek(plan){
  const start=parseDate(plan.startDate);
  const now=new Date();
  const diff=Math.floor((startOfDay(now)-startOfDay(start))/(1000*60*60*24*7));
  return Math.max(0,Math.min(diff,plan.totalWeeks-1));
}

        }}>
          <div>
            <div style=${{fontWeight:800,fontSize:14,color:T.text}}>${p.name}</div>
            <div style=${{fontSize:12,color:T.muted,marginTop:2}}>${p.desc}</div>
          </div>
          <div style=${{fontSize:12,color:T.muted,textAlign:"right",flexShrink:0}}>
            <div style=${{color:T.blue,fontWeight:800}}>${p.startMins}→${p.startMins+(p.totalWeeks-1)*5}min</div>
            <div>${p.sessionsPerWeek}×/wk · ${p.totalWeeks} wks</div>
          </div>
        </button>`)}
        <${Btn} onClick=${()=>setStep(1)} variant="primary" style=${{width:"100%",marginTop:4}}>Customise →<//>
      </div>
    `:""}
    ${step===1?html`
      <div style=${{display:"flex",flexDirection:"column",gap:16}}>
        <div>
          <${Label}>Start date<//>
          <input type="date" value=${startDate} onInput=${e=>setStartDate(e.target.value)} style=${S.input}/>
        </div>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <${Label}>Start duration (min)<//>
            <div style=${{display:"flex",alignItems:"center",gap:8}}>
              <button onClick=${()=>setStartMins(m=>Math.max(10,m-5))} style=${{width:34,height:34,borderRadius:10,border:`1px solid ${T.border}`,background:T.surface,color:T.text,cursor:"pointer",fontSize:16}}>−</button>
              <span style=${{fontWeight:900,fontSize:18,color:T.blue,minWidth:32,textAlign:"center"}}>${startMins}</span>
              <button onClick=${()=>setStartMins(m=>m+5)} style=${{width:34,height:34,borderRadius:10,border:`1px solid ${T.border}`,background:T.surface,color:T.text,cursor:"pointer",fontSize:16}}>+</button>
            </div>
          </div>
          <div>
            <${Label}>Weekly increase (min)<//>
            <div style=${{display:"flex",alignItems:"center",gap:8}}>
              <button onClick=${()=>setIncrementMins(m=>Math.max(1,m-1))} style=${{width:34,height:34,borderRadius:10,border:`1px solid ${T.border}`,background:T.surface,color:T.text,cursor:"pointer",fontSize:16}}>−</button>
              <span style=${{fontWeight:900,fontSize:18,color:T.green,minWidth:32,textAlign:"center"}}>+${incrementMins}</span>
              <button onClick=${()=>setIncrementMins(m=>m+1)} style=${{width:34,height:34,borderRadius:10,border:`1px solid ${T.border}`,background:T.surface,color:T.text,cursor:"pointer",fontSize:16}}>+</button>
            </div>
          </div>
          <div>
            <${Label}>Sessions / week<//>
            <div style=${{display:"flex",gap:6}}>
              ${[2,3,4,5].map(n=>html`<button key=${n} onClick=${()=>setSessionsPerWeek(n)} style=${{flex:1,padding:"8px 4px",borderRadius:10,border:`1px solid ${sessionsPerWeek===n?T.blueBorder:T.border}`,background:sessionsPerWeek===n?T.blueGlow:T.surface,color:sessionsPerWeek===n?T.blue:T.muted,cursor:"pointer",fontFamily:"inherit",fontWeight:800,fontSize:13}}>${n}</button>`)}
            </div>
          </div>
          <div>
            <${Label}>Total weeks<//>
            <div style=${{display:"flex",alignItems:"center",gap:8}}>
              <button onClick=${()=>setTotalWeeks(w=>Math.max(2,w-1))} style=${{width:34,height:34,borderRadius:10,border:`1px solid ${T.border}`,background:T.surface,color:T.text,cursor:"pointer",fontSize:16}}>−</button>
              <span style=${{fontWeight:900,fontSize:18,color:T.text,minWidth:32,textAlign:"center"}}>${totalWeeks}</span>
              <button onClick=${()=>setTotalWeeks(w=>w+1)} style=${{width:34,height:34,borderRadius:10,border:`1px solid ${T.border}`,background:T.surface,color:T.text,cursor:"pointer",fontSize:16}}>+</button>
            </div>
          </div>
        </div>
        <!-- Preview -->
        <div style=${{background:`${T.blue}10`,border:`1px solid ${T.blueBorder}`,borderRadius:14,padding:14}}>
          <div style=${{fontSize:11,fontWeight:800,color:T.blue,letterSpacing:1,marginBottom:8}}>PLAN PREVIEW</div>
          <div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>
            ${previewWeeks.map(r=>html`<div key=${r.week} style=${{background:T.blueGlow,border:`1px solid ${T.blueBorder}`,borderRadius:8,padding:"4px 10px",fontSize:12}}>
              <span style=${{color:T.muted,fontWeight:700}}>Wk ${r.week}</span> <span style=${{color:T.blue,fontWeight:900}}>${r.mins}min</span>
            </div>`)}
            ${totalWeeks>4?html`<div style=${{borderRadius:8,padding:"4px 10px",fontSize:12,color:T.muted}}>… → Wk ${totalWeeks}: <span style=${{color:T.blue,fontWeight:900}}>${finalMins}min</span></div>`:""}
          </div>
          <div style=${{marginTop:8,fontSize:12,color:T.muted}}>${sessionsPerWeek} runs/week · ${totalWeeks} weeks · finishes at ${finalMins}min</div>
        </div>
        <div style=${{display:"flex",gap:10}}>
          <${Btn} onClick=${()=>setStep(0)} variant="ghost">← Back<//>
          <${Btn} onClick=${confirm} variant="primary" style=${{flex:1}}>Start Plan ▶<//>
        </div>
      </div>
    `:""}
  <//>`;
}

function PlansSection({trainingPlans,tasks,onUpsertPlan,onDeletePlan}){
  const[wizardOpen,setWizardOpen]=useState(false);
  const[expandedId,setExpandedId]=useState(null);
  const today=todayISO();

  return html`<div>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style=${{fontSize:11,fontWeight:900,color:T.muted,letterSpacing:1.4}}>RUNNING PLANS</div>
      <${Btn} onClick=${()=>setWizardOpen(true)} variant="primary" style=${{fontSize:12,padding:"6px 14px"}}>+ New Plan<//>
    </div>

    ${(trainingPlans||[]).length===0?html`
      <div className="sk-card" style=${{...S.card,textAlign:"center",padding:24,marginBottom:12,background:`${T.blue}09`,border:`1px dashed ${T.blueBorder}`}}>
        <div style=${{fontSize:28,marginBottom:8}}>🏃</div>
        <div style=${{fontWeight:800,fontSize:14,color:T.text}}>No active plan</div>
        <div style=${{fontSize:12,color:T.muted,marginTop:4}}>Start a progressive running plan — each week adds ${5}min</div>
      </div>
    `:""}

    ${(trainingPlans||[]).map(plan=>{
      const curWeek=getPlanCurrentWeek(plan);
      const pct=Math.round((curWeek+1)/plan.totalWeeks*100);
      const weekMins=plan.startMins+curWeek*plan.incrementMins;
      const isExpanded=expandedId===plan.id;
      const planTasks=tasks.filter(t=>(t.planKey||"").startsWith(`plan_${plan.id}`));
      const completedTasks=planTasks.filter(t=>t.completed).length;

      return html`<div key=${plan.id} className="sk-card" style=${{...S.card,marginBottom:12,border:`1px solid ${T.blueBorder}44`}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div style=${{flex:1}}>
            <div style=${{fontWeight:900,fontSize:15,color:T.text,letterSpacing:-0.2}}>${plan.name}</div>
            <div style=${{fontSize:12,color:T.muted,marginTop:2}}>Week ${curWeek+1} of ${plan.totalWeeks} · ${weekMins}min runs this week</div>
            <!-- Progress bar -->
            <div style=${{marginTop:10,height:4,borderRadius:99,background:`${T.blue}20`}}>
              <div style=${{height:"100%",borderRadius:99,background:`linear-gradient(90deg,${T.blue},#22d3ee)`,width:`${pct}%`,transition:"width 0.5s ease",boxShadow:`0 0 8px ${T.blue}55`}}></div>
            </div>
            <div style=${{marginTop:4,fontSize:11,color:T.muted,display:"flex",justifyContent:"space-between"}}>
              <span>${completedTasks} sessions done</span><span>${pct}% complete</span>
            </div>
          </div>
          <div style=${{flexShrink:0}}>
            <${Ring} pct=${pct} size=${44} stroke=${3.5} color=${T.blue} glow=${true}/>
          </div>
        </div>

        <div style=${{display:"flex",gap:8,marginTop:14}}>
          <button onClick=${()=>setExpandedId(isExpanded?null:plan.id)} style=${{flex:1,padding:"7px 12px",borderRadius:10,border:`1px solid ${T.border}`,background:T.surface,color:T.muted,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12}}>
            ${isExpanded?"▲ Hide weeks":"▼ View all weeks"}
          </button>
          <${Btn} onClick=${()=>{if(confirm(`End "${plan.name}"? This will remove all future plan sessions.`))onDeletePlan(plan.id);}} variant="danger" style=${{fontSize:12,padding:"7px 14px"}}>End plan<//>
        </div>

        ${isExpanded?html`
          <div style=${{marginTop:12,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:6}}>
            ${Array.from({length:plan.totalWeeks},(_,w)=>{
              const wMins=plan.startMins+w*plan.incrementMins;
              const isCur=w===curWeek;
              const isPast=w<curWeek;
              return html`<div key=${w} style=${{padding:"8px 10px",borderRadius:11,border:`1px solid ${isCur?T.blueBorder:T.border}`,background:isCur?T.blueGlow:isPast?"rgba(255,255,255,0.02)":T.surface}}>
                <div style=${{fontSize:10,fontWeight:800,color:isCur?T.blue:T.muted,letterSpacing:0.5}}>WK ${w+1}${isCur?" ●":isPast?" ✓":""}</div>
                <div style=${{fontSize:14,fontWeight:900,color:isCur?T.blue:isPast?T.muted:T.text,marginTop:2}}>${wMins}min</div>
                <div style=${{fontSize:10,color:T.muted,marginTop:1}}>${plan.sessionsPerWeek}× runs</div>
              </div>`;
            })}
          </div>
        `:""}
      </div>`;
    })}

    ${wizardOpen?html`<${PlanWizardModal}
      onSave=${plan=>{
        const newTasks=generatePlanTasks(plan);
        onUpsertPlan(plan,newTasks);
        showToast(`▶ ${plan.name} started! ${newTasks.length} sessions added.`);
      }}
      onClose=${()=>setWizardOpen(false)}
    />`:""}
  </div>`;
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState(null); const [ready,setReady]=useState(false);
  const [view,setView]=useState("today"); const [coachOpen,setCoachOpen]=useState(false);
  const [taskModal,setTaskModal]=useState(null); const [habitModal,setHabitModal]=useState(null);
  const [syncStatus,setSyncStatus]=useState(null);
  const toastReady=useCallback(fn=>{ _toast.fn=fn; },[]);

  useEffect(()=>{
    loadState().then(saved=>{
      if(saved){
        // Handle URL action params (for widget tap actions)
        const sp=new URLSearchParams(window.location.search);
        const action=sp.get("action");
        const taskId=sp.get("taskId");
        const habitId=sp.get("habitId");
        if(action==="completeNext"){
          const today=todayISO(); let marked=false;
          saved.tasks=(saved.tasks||[]).map(t=>{
            if(marked||t.date!==today||t.completed||t.category==="work")return t;
            marked=true; return{...t,completed:true,completedAt:Date.now()};
          });
          if(marked) setTimeout(()=>showToast("Task completed ✓"),400);
        }
        if(action==="complete"&&taskId){
          saved.tasks=(saved.tasks||[]).map(t=>t.id===taskId?{...t,completed:true,completedAt:Date.now()}:t);
          setTimeout(()=>showToast("Task completed ✓"),400);
        }
        if(action==="toggleHabit"&&habitId){
          const key=`${habitId}_${todayISO()}`;
          saved.habitLogs={...saved.habitLogs,[key]:!saved.habitLogs?.[key]};
          setTimeout(()=>showToast("Habit updated ✓"),400);
        }
        if(action) window.history.replaceState({},"",window.location.pathname);
        setState({tasks:[],habits:[],habitLogs:{},healthLogs:{},goals:[],trainingPlans:[],settings:DEF_SETTINGS,...saved,settings:{...DEF_SETTINGS,...saved?.settings}});
      } else {
        setState({tasks:seedTasks(),habits:seedHabits(),habitLogs:{},healthLogs:{},goals:[],trainingPlans:[],settings:{...DEF_SETTINGS}});
      }
      setReady(true);
      // Check sync
      fetch(SYNC_URL).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("offline"));
    });
  },[]);

  useEffect(()=>{ if(ready&&state) saveState(state); },[state,ready]);

  const mut=useCallback(fn=>setState(p=>({...p,...fn(p)})),[]);
  const toggleTask=useCallback(id=>mut(s=>({tasks:s.tasks.map(t=>t.id===id?{...t,completed:!t.completed,completedAt:!t.completed?Date.now():null}:t)})),[mut]);
  const upsertTask=useCallback(task=>mut(s=>{const i=s.tasks.findIndex(t=>t.id===task.id);if(i>=0){const tasks=[...s.tasks];tasks[i]={...tasks[i],...task};return{tasks};}return{tasks:[...s.tasks,task]};}),[mut]);
  const deleteTask=useCallback(id=>mut(s=>({tasks:s.tasks.filter(t=>t.id!==id)})),[mut]);
  const toggleHabit=useCallback((hid,date)=>mut(s=>({habitLogs:{...s.habitLogs,[`${hid}_${date}`]:!s.habitLogs[`${hid}_${date}`]}})),[mut]);
  const upsertHabit=useCallback(h=>mut(s=>{const i=s.habits.findIndex(x=>x.id===h.id);if(i>=0){const habits=[...s.habits];habits[i]={...habits[i],...h};return{habits};}return{habits:[...s.habits,h]};}),[mut]);
  const deleteHabit=useCallback(id=>mut(s=>({habits:s.habits.filter(h=>h.id!==id)})),[mut]);
  const upsertHealthLog=useCallback((date,patch)=>mut(s=>({healthLogs:{...s.healthLogs,[date]:{...s.healthLogs[date],...patch}}})),[mut]);
  const upsertPlan=useCallback((plan,newTasks)=>mut(s=>({trainingPlans:[...(s.trainingPlans||[]).filter(p=>p.id!==plan.id),plan],tasks:[...s.tasks,...(newTasks||[])]})),[mut]);
  const deletePlan=useCallback(planId=>mut(s=>({trainingPlans:(s.trainingPlans||[]).filter(p=>p.id!==planId),tasks:s.tasks.filter(t=>!(t.planKey||"").startsWith(`plan_${planId}`))})),[mut]);
  const applyActions=useCallback(actions=>mut(s=>{
    let tasks=[...s.tasks];
    for(const a of actions){
      if(a.type==="addTask"&&a.task) tasks.push({id:uid(),completed:false,planKey:"",createdAt:Date.now(),...a.task,category:a.task.category||detectCat(a.task.title||"")});
      else if(a.type==="updateTask"&&a.taskId) tasks=tasks.map(t=>t.id===a.taskId?{...t,...a.changes}:t);
      else if(a.type==="deleteTask"&&a.taskId) tasks=tasks.filter(t=>t.id!==a.taskId);
      else if(a.type==="completeTask"&&a.taskId) tasks=tasks.map(t=>t.id===a.taskId?{...t,completed:true,completedAt:Date.now()}:t);
    }
    return{tasks};
  }),[mut]);

  if(!ready||!state) return html`<div style=${{height:"100vh",display:"grid",placeItems:"center",background:T.bg,color:T.muted}}>
    <div style=${{textAlign:"center",animation:"fadeUp 0.5s ease"}}>
      <div style=${{fontSize:32,marginBottom:14,filter:`drop-shadow(0 0 12px ${T.blue})`}}>◉</div>
      <div style=${{fontWeight:900,letterSpacing:-0.3,fontSize:15,color:T.text}}>Feliz Dias</div>
      <div style=${{fontSize:12,color:T.muted,marginTop:4,fontWeight:700}}>Loading…</div>
    </div>
  </div>`;

  const NAV=[{id:"today",icon:"◉",label:"Today"},{id:"week",icon:"⊞",label:"Week"},{id:"habits",icon:"✦",label:"Habits"},{id:"health",icon:"♥",label:"Health"},{id:"settings",icon:"⊙",label:"More"}];
  const weekDates=getWeekDates();
  const wTotal=state.tasks.filter(t=>weekDates.includes(t.date)&&t.category!=="work").length;
  const wDone=state.tasks.filter(t=>weekDates.includes(t.date)&&t.completed&&t.category!=="work").length;

  return html`<div style=${{background:T.bg,minHeight:"100vh",color:T.text,fontFamily:"ui-rounded,ui-sans-serif,system-ui,-apple-system,sans-serif"}}>
    <!-- Ambient -->
    <div style=${{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
      <div style=${{position:"absolute",top:"-10%",left:"-5%",width:600,height:600,borderRadius:"50%",background:"radial-gradient(rgba(129,140,248,0.09),transparent 65%)"}}/>
      <div style=${{position:"absolute",top:"30%",right:"-10%",width:500,height:500,borderRadius:"50%",background:"radial-gradient(rgba(34,211,238,0.06),transparent 65%)"}}/>
      <div style=${{position:"absolute",bottom:"10%",left:"20%",width:400,height:400,borderRadius:"50%",background:"radial-gradient(rgba(52,211,153,0.05),transparent 65%)"}}/>
    </div>

    <div style=${{position:"relative",zIndex:1}}>
      <!-- Header -->
      <header style=${{position:"sticky",top:0,zIndex:20,display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"calc(14px + env(safe-area-inset-top)) 16px 14px",
        background:"rgba(7,11,20,0.88)",backdropFilter:"blur(24px)",
        borderBottom:`1px solid ${T.border}`}}>
        <div style=${{display:"flex",alignItems:"center",gap:10}}>
          <div style=${{width:38,height:38,borderRadius:14,
            background:"linear-gradient(135deg,rgba(129,140,248,0.25),rgba(34,211,238,0.12))",
            border:`1px solid rgba(129,140,248,0.35)`,display:"grid",placeItems:"center",
            boxShadow:`0 0 16px rgba(129,140,248,0.2)`}}>
            <span style=${{background:`linear-gradient(135deg,${T.blue},#22d3ee)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontWeight:900,fontSize:13,letterSpacing:-0.5}}>FD</span>
          </div>
          <div>
            <div style=${{fontWeight:900,fontSize:16,color:T.text,letterSpacing:-0.3}}>Feliz Dias</div>
            <div style=${{fontSize:11,color:T.muted,fontWeight:700,marginTop:1}}>${wDone}/${wTotal} this week</div>
          </div>
        </div>
        <div style=${{display:"flex",gap:7}}>
          <${IconBtn} onClick=${()=>setTaskModal({task:null,date:todayISO()})} style=${{background:T.blueGlow,borderColor:T.blueBorder,color:T.blue,fontSize:18,fontWeight:900,boxShadow:`0 0 12px ${T.blueGlow}`}}>＋<//>
          <${IconBtn} onClick=${()=>setCoachOpen(true)} style=${{background:T.accentGlow,borderColor:T.accentBorder,color:T.accent,fontSize:17,fontWeight:900}}>⚡<//>
        </div>
      </header>

      ${view==="today"?html`<${TodayView} tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs} onToggleTask=${toggleTask} onEditTask=${t=>setTaskModal({task:t,date:null})} onToggleHabit=${toggleHabit} onOpenCoach=${()=>setCoachOpen(true)}/>`:""}
      ${view==="week"?html`<${WeekView} tasks=${state.tasks} onToggleTask=${toggleTask} onEditTask=${t=>setTaskModal({task:t,date:null})} onAddForDate=${date=>setTaskModal({task:null,date})}/>`:""}
      ${view==="habits"?html`<${HabitsView} habits=${state.habits} habitLogs=${state.habitLogs} onToggleHabit=${toggleHabit} onEditHabit=${h=>setHabitModal(h)} onAddHabit=${()=>setHabitModal({isNew:true})}/>`:""}
      ${view==="health"?html`<${HealthView} tasks=${state.tasks} healthLogs=${state.healthLogs||{}} onUpsertLog=${upsertHealthLog}/>`:""}
      ${view==="settings"?html`<${SettingsView} settings=${state.settings} syncStatus=${syncStatus}
        trainingPlans=${state.trainingPlans||[]} tasks=${state.tasks}
        onUpsertPlan=${upsertPlan} onDeletePlan=${deletePlan}
        onUpdate=${changes=>mut(s=>({settings:{...s.settings,...changes}}))}
        onExport=${()=>{const b=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`sk-backup-${todayISO()}.json`;a.click();}}
        onReset=${()=>{if(confirm("Reset all data?"))setState({tasks:seedTasks(),habits:seedHabits(),habitLogs:{},healthLogs:{},goals:[],trainingPlans:[],settings:{...DEF_SETTINGS}});}}/>`:""}

      <!-- Bottom nav -->
      <nav style=${{position:"fixed",left:10,right:10,bottom:0,zIndex:25,display:"flex",gap:2,
        padding:"5px",marginBottom:"calc(10px + env(safe-area-inset-bottom))",
        background:"rgba(7,11,20,0.94)",backdropFilter:"blur(28px)",
        border:`1px solid ${T.border}`,borderRadius:24,
        boxShadow:`0 -4px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(129,140,248,0.06) inset`}}>
        ${NAV.map(v=>html`<button key=${v.id} onClick=${()=>setView(v.id)} style=${{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,
          padding:"7px 4px",borderRadius:18,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${view===v.id?T.blueBorder+"88":"transparent"}`,
          background:view===v.id?`linear-gradient(135deg,${T.blueGlow},rgba(34,211,238,0.04))`:"transparent",
          color:view===v.id?T.blue:T.muted,
        }}>
          <span style=${{fontSize:15,filter:view===v.id?`drop-shadow(0 0 5px ${T.blue})`:"none",transition:"filter 0.2s"}}>${v.icon}</span>
          <span style=${{fontSize:10,fontWeight:900,letterSpacing:0.4}}>${v.label}</span>
        </button>`)}
        <button onClick=${()=>setCoachOpen(true)} style=${{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,
          padding:"7px 4px",borderRadius:18,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${T.accentBorder}`,
          background:`linear-gradient(135deg,${T.accentGlow},rgba(129,140,248,0.06))`,
          color:T.accent,
          boxShadow:`0 0 14px ${T.accentGlow}`,
        }}>
          <span style=${{fontSize:15,filter:`drop-shadow(0 0 5px ${T.accent}88)`}}>⚡</span>
          <span style=${{fontSize:10,fontWeight:900,letterSpacing:0.4}}>Coach</span>
        </button>
      </nav>
    </div>

    ${taskModal?html`<${TaskModal} task=${taskModal.task} initialDate=${taskModal.date}
      onSave=${t=>{upsertTask(t);setTaskModal(null);showToast(taskModal.task?"Updated ✅":"Added ✅");}}
      onDelete=${id=>{deleteTask(id);setTaskModal(null);showToast("Deleted");}}
      onClose=${()=>setTaskModal(null)}/>`:""}
    ${habitModal?html`<${HabitModal} habit=${habitModal.isNew?null:habitModal}
      onSave=${h=>{upsertHabit(h);setHabitModal(null);showToast(habitModal.isNew?"Habit added ✅":"Updated ✅");}}
      onDelete=${id=>{deleteHabit(id);setHabitModal(null);showToast("Deleted");}}
      onClose=${()=>setHabitModal(null)}/>`:""}

    <${CoachPanel} isOpen=${coachOpen} onClose=${()=>setCoachOpen(false)}
      tasks=${state.tasks} habits=${state.habits} habitLogs=${state.habitLogs}
      settings=${state.settings} onApplyActions=${applyActions}/>

    <${Toast} onReady=${toastReady}/>
  </div>`;
}

// ── Boot ──────────────────────────────────────────────────────
render(html`<${App}/>`, document.getElementById("app"));

// Service worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}
</script>
</body>
</html>
