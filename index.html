// ── Utils ──────────────────────────────────────────────────
const pad2 = n => String(n).padStart(2,"0");
const uid = () => crypto?.randomUUID?.() ?? Math.random().toString(36).slice(2)+Date.now().toString(36);
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; };
const isoDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const parseDate = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const startOfDay = d => new Date(d.getFullYear(),d.getMonth(),d.getDate());
const fmtTime = t => { if(!t)return""; const [h,m]=t.split(":").map(Number); return `${h%12||12}:${pad2(m)}${h>=12?"pm":"am"}`; };
const fmtDayShort = s => parseDate(s).toLocaleDateString("en-GB",{weekday:"short"});
const fmtDayLong = s => parseDate(s).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
const fmtDateNum = s => parseDate(s).getDate();

// ── Notifications ─────────────────────────────────────────────
const _notifTimers = [];
function _clearNotifTimers(){ _notifTimers.forEach(clearTimeout); _notifTimers.length=0; }

function _fireNotif(title, body, tag){
  const sw = navigator.serviceWorker?.controller;
  if(sw){ sw.postMessage({type:"SHOW_NOTIFICATION",title,body,tag,data:{}}); }
  else if(Notification.permission==="granted"){ new Notification(title,{body,icon:"/icons/icon-192.png",tag}); }
}

function scheduleTaskReminders(tasks){
  _clearNotifTimers();
  if(Notification.permission!=="granted") return;
  const now=Date.now(), todayStr=todayISO(), tomStr=isoDate(addDays(new Date(),1));
  tasks
    .filter(t=>!t.completed&&t.time&&t.category!=="work"&&(t.date===todayStr||t.date===tomStr))
    .forEach(t=>{
      const taskMs=new Date(`${t.date}T${t.time}:00`).getTime();
      const cat=CATS[t.category]||CATS.other;
      [60,15].forEach(mins=>{
        const delay=taskMs-mins*60_000-now;
        if(delay>0) _notifTimers.push(setTimeout(()=>{
          _fireNotif(
            `${cat.icon} ${t.title} — ${mins===60?"in 1 hour":"in 15 min"}`,
            `${fmtTime(t.time)}${t.notes?" · "+t.notes:""}`,
            `task-${t.id}-${mins}`
          );
        },delay));
      });
    });
}

function scheduleWellnessReminders(bedtime){
  if(Notification.permission!=="granted"||!bedtime) return;
  const now=Date.now(), [bh,bm]=bedtime.split(":").map(Number);
  [
    {mins:120, title:"Red light glasses", body:"2 hours to bed — put on red light glasses now"},
    {mins:30,  title:"Wind down",         body:"30 min to bed — start winding down"},
  ].forEach(({mins,title,body})=>{
    const base=new Date(); base.setHours(bh,bm,0,0);
    const delay=base.getTime()-mins*60_000-now;
    if(delay>0) _notifTimers.push(setTimeout(()=>_fireNotif(title,body,`wellness-${mins}`),delay));
  });
}

function getWeekDates(from=new Date()){
  const d=startOfDay(from); const dow=(d.getDay()+6)%7; const mon=addDays(d,-dow);
  return Array.from({length:7},(_,i)=>isoDate(addDays(mon,i)));
}
// Returns array of last n ISO dates ending today (oldest first)
function getRecentDates(n=30){
  const today=parseDate(todayISO());
  return Array.from({length:n},(_,i)=>isoDate(addDays(today,i-n+1)));
}
// Returns Mon-aligned grid of date strings (null for padding cells) for a given year/month
function getMonthGrid(year,month){
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  const startDow=(first.getDay()+6)%7; // Mon=0
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=last.getDate();d++) cells.push(isoDate(new Date(year,month,d)));
  while(cells.length%7!==0) cells.push(null);
  return cells;
}
// Count completed non-work tasks on a date
function dayDoneCount(tasks,date){
  return tasks.filter(t=>t.date===date&&t.completed&&t.category!=="work").length;
}
// Returns 0-100 or null for a date
function dayCompletionPct(tasks,date){
  const all=tasks.filter(t=>t.date===date&&t.category!=="work");
  if(!all.length) return null;
  return Math.round(all.filter(t=>t.completed).length/all.length*100);
}
// Habit completion % for a habit over a set of dates
function habitPctForDates(habit,habitLogs,dates){
  const scheduled=dates.filter(d=>habit.days.includes(new Date(d+"T12:00:00").getDay()));
  if(!scheduled.length) return null;
  return Math.round(scheduled.filter(d=>habitLogs[`${habit.id}_${d}`]).length/scheduled.length*100);
}
// Generate improvement callouts for a given week
function getCallouts(tasks,habits,habitLogs,settings,weekDates){
  const out=[];
  Object.entries(settings.weekTargets||{}).forEach(([cat,target])=>{
    if(!target) return;
    const done=tasks.filter(t=>weekDates.includes(t.date)&&t.category===cat&&t.completed).length;
    const pct=Math.round(done/target*100);
    if(pct<80) out.push({type:"cat",cat,done,target,pct});
  });
  habits.forEach(h=>{
    const pct=habitPctForDates(h,habitLogs,weekDates);
    if(pct!==null&&pct<70) out.push({type:"habit",habit:h,pct});
  });
  return out.sort((a,b)=>a.pct-b.pct);
}
function detectCat(title=""){
  const t=title.toLowerCase();
  if(/\bgame\b|\bmatch\b|\bvs\b/.test(t))return"game";
  if(/\brun\b|\bjog\b|\bsprint\b|\bstride/.test(t))return"run";
  if(/football|soccer/.test(t))return"football";
  if(/\bbike\b|\bcycle|\bspin\b/.test(t))return"bike";
  if(/pilates/.test(t))return"pilates";
  if(/recovery|\brest\b|\bwalk\b|\bmobil/.test(t))return"recovery";
  if(/sauna|pool|steam/.test(t))return"sauna";
  if(/\bwork\b|office|meeting/.test(t))return"work";
  return"other";
}

function generateWeek(settings,weekDates,eventOverrides={}){
  const sched=settings.schedule||DEF_SCHEDULE;
  const tasks=[];
  const push=(date,time,title,category,notes="",planKey="")=>
    tasks.push({id:uid(),date,time,title,category,notes,completed:false,planKey,createdAt:Date.now()});
  const events={};
  Object.entries(sched.teamEvents||{}).forEach(([d,e])=>{
    const dow=parseInt(d);
    const ov=eventOverrides[dow];
    events[dow]={...e,...(ov||{})};
  });
  weekDates.forEach((date,dow)=>{
    const ev=events[dow];
    if(!ev?.enabled)return;
    if(ev.type==="none")return;
    const isMatch=ev.type==="match";
    push(date,ev.time,isMatch?"Match day":"Team training",isMatch?"game":"football","",`team_${dow}`);
  });
  weekDates.forEach((date,dow)=>{
    const w=(sched.work||{})[dow];
    if(!w?.enabled)return;
    push(date,w.start,"Work","work","",`work_${dow}`);
    push(date,w.end,"Work ends","work","Free window",`wend_${dow}`);
  });
  const wasPrevMatch=dow=>{const p=(dow+6)%7;const e=events[p];return e?.enabled&&e.type==="match";};
  const isTomorrowEvent=dow=>{const n=(dow+1)%7;const e=events[n];return e?.enabled&&e.type!=="none";};
  weekDates.forEach((date,dow)=>{
    const slot=(sched.morningSlots||{})[dow];
    if(!slot?.enabled)return;
    const cat=slot.category;
    const prevMatch=wasPrevMatch(dow);
    const tmrEvent=isTomorrowEvent(dow);
    const mode=prevMatch?"recovery":tmrEvent?"taper":"normal";
    const st=SESSION_TITLES[cat]||SESSION_TITLES.recovery;
    push(date,slot.time,st[mode]||st.normal,prevMatch?"recovery":cat,st.notes?.[mode]||"",`morning_${dow}`);
  });
  weekDates.forEach((date,dow)=>{
    const dayLoad=tasks.filter(t=>t.date===date).reduce((s,t)=>s+(LOAD[t.category]||1),0);
    if(dayLoad>HIGH_LOAD){
      const morn=tasks.find(t=>t.date===date&&t.planKey===`morning_${dow}`&&["run","bike"].includes(t.category));
      if(morn){morn.title="Active recovery: walk + mobility 30min [auto — high load]";morn.category="recovery";morn.notes="Load too high today — body needs recovery.";}
    }
  });
  return tasks;
}

function calcTDEE(profile){
  const{weight=75,height=178,age=26,sex="male"}=profile||{};
  const bmr=sex==="female"
    ?447.593+9.247*weight+3.098*height-4.330*age
    :88.362+13.397*weight+4.799*height-5.677*age;
  return Math.round(bmr*1.725);
}
function calcDailyMacros(profile,tasks,date){
  const tdee=calcTDEE(profile);
  const strain=calcStrain(tasks,date);
  const trainingBonus=Math.round(strain*40);
  const targetCal=tdee+trainingBonus-300;
  const weight=profile?.weight||75;
  const protein=Math.round(weight*2.0);
  const fat=Math.round(weight*0.9);
  const highIntensity=tasks.some(t=>t.date===date&&["football","game","run"].includes(t.category));
  const carbsBase=Math.round((targetCal-protein*4-fat*9)/4);
  const carbs=highIntensity?Math.round(carbsBase*1.15):carbsBase;
  return{
    cal:Math.max(1500,targetCal),
    protein:Math.max(100,protein),
    carbs:Math.max(50,carbs),
    fat:Math.max(30,fat),
    tdee,trainingBonus,isHighIntensity:highIntensity,
  };
}

function playAlarm(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  [0,0.5,1.0].forEach(t=>{
    const osc=ctx.createOscillator(),g=ctx.createGain();
    osc.frequency.value=880;osc.type="sine";
    g.gain.setValueAtTime(0.4,ctx.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.4);
    osc.connect(g);g.connect(ctx.destination);
    osc.start(ctx.currentTime+t);osc.stop(ctx.currentTime+t+0.45);
  });
}
function startBinauralAudio(mode){
  stopAudio();
  _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ctx=_audioCtx,beatFreq=mode==="nap"?6:2,carrier=200;
  const oscL=ctx.createOscillator(),gainL=ctx.createGain();
  const oscR=ctx.createOscillator(),gainR=ctx.createGain();
  const merger=ctx.createChannelMerger(2);
  oscL.frequency.value=carrier;oscL.type="sine";gainL.gain.value=0.13;
  oscR.frequency.value=carrier+beatFreq;oscR.type="sine";gainR.gain.value=0.13;
  oscL.connect(gainL);gainL.connect(merger,0,0);
  oscR.connect(gainR);gainR.connect(merger,0,1);
  // Pink noise
  const bsz=ctx.sampleRate*10,nb=ctx.createBuffer(1,bsz,ctx.sampleRate),nd=nb.getChannelData(0);
  let b=[0,0,0,0,0,0,0];
  for(let i=0;i<bsz;i++){
    const w=Math.random()*2-1;
    b[0]=0.99886*b[0]+w*0.0555179;b[1]=0.99332*b[1]+w*0.0750759;
    b[2]=0.96900*b[2]+w*0.1538520;b[3]=0.86650*b[3]+w*0.3104856;
    b[4]=0.55000*b[4]+w*0.5329522;b[5]=-0.7616*b[5]-w*0.0168980;
    nd[i]=(b[0]+b[1]+b[2]+b[3]+b[4]+b[5]+b[6]+w*0.5362)/7;b[6]=w*0.115926;
  }
  const ns=ctx.createBufferSource(),ng=ctx.createGain();
  ns.buffer=nb;ns.loop=true;ng.gain.value=0.035;
  ns.connect(ng);
  const master=ctx.createGain();
  master.gain.setValueAtTime(0,ctx.currentTime);
  master.gain.linearRampToValueAtTime(1,ctx.currentTime+30);
  merger.connect(master);ng.connect(master);master.connect(ctx.destination);
  oscL.start();oscR.start();ns.start();
  _audioNodes=[oscL,oscR,ns];
}

    if(nextGame){
      actions.push({type:"deleteTask",taskId:nextGame.id});

    const afterDate=isoDate(addDays(parseDate(targetDate),1));
    actions.push({type:"addTask",task:{title:"Match day",date:targetDate,time:"10:00",category:"game",notes:"Fuel well. Warm up properly. Trust the prep."}});
    actions.push({type:"addTask",task:{title:"Pre-match nutrition — complex carbs + hydration",date:targetDate,time:"07:30",category:"other",notes:"Pasta/rice + lean protein 3hrs before. 2L water by kick-off."}});
    actions.push({type:"addTask",task:{title:"Post-match recovery: walk + mobility 30min",date:afterDate,time:"06:00",category:"recovery",notes:"Essential after a game. Ice hot spots, eat protein within 30min."}});
    const prevHard=upcoming.filter(t=>t.date===prevDate&&["run","bike"].includes(t.category));
    prevHard.forEach(t=>actions.push({type:"updateTask",taskId:t.id,changes:{title:t.title.replace(/\d+min/,"20min").replace(/sprint.*$/,"easy strides (pre-match taper)"),notes:"Taper day — big game tomorrow. Legs fresh."}}) );
    return{handled:true,reply:pick([
      `Match added for ${targetDate}. ${prevHard.length>0?`Tapered your ${prevDate} session.`:" "} Pre-match nutrition + post-match recovery both scheduled. Good luck. 🏟️`,
      `Done — game on ${targetDate} is in. ${prevHard.length>0?`${prevDate} session tapered.`:""}Recovery day after, and pre-match fuel reminder the morning of.`,
    ]),actions};
  }

  // ⑦ Plan week
  if(/plan.{0,10}week|generate.{0,5}week|build.{0,5}week|create.{0,5}week|set.{0,5}up.{0,5}week/.test(m)){
    const wDates=ctx.weekDates||getWeekDates();
    const stgs=ctx.settings||{};
    const oldIds=upcoming.filter(t=>wDates.includes(t.date)&&t.category!=="work"&&!t.completed).map(t=>t.id);
    oldIds.forEach(id=>actions.push({type:"deleteTask",taskId:id}));
    const newT=generateWeek(stgs,wDates);
    newT.forEach(task=>actions.push({type:"addTask",task}));
    return{handled:true,reply:pick([
      `Week planned. Cleared ${oldIds.length} old sessions, generated ${newT.length} new ones from your template. Check Review tab.`,
      `Done — ${newT.length} sessions built for the week. Taper days and recovery are already baked in. See Review tab.`,
    ]),actions};
  }

  // ⑧ Auto-adjust
  if(/auto.{0,6}adjust|adjust.{0,5}schedule|optimize.{0,5}week|rebalance|fix.{0,5}week|balance.{0,5}week/.test(m)){
    const wDates2=ctx.weekDates||getWeekDates();let adjusted=0;
    wDates2.filter(d=>d>=today).forEach(date=>{
      const dt=upcoming.filter(t=>t.date===date);
      const dl=dt.reduce((s,t)=>s+(LOAD[t.category]||1),0);
      if(dl>HIGH_LOAD){const hard=dt.find(t=>["run","bike"].includes(t.category));if(hard){actions.push({type:"updateTask",taskId:hard.id,changes:{title:hard.title.replace(/\d+min/,"25min")+" [load-managed]",notes:"High load day — volume reduced."}});adjusted++;}}
    });
    const weekLoad=upcoming.filter(t=>weekDates.includes(t.date)).reduce((s,t)=>s+(LOAD[t.category]||1),0);
    return{handled:true,reply:pick([
      adjusted>0?`Auto-adjusted ${adjusted} session${adjusted>1?"s":""}. Week load: ${weekLoad}. Check Review tab.`:`Week load: ${weekLoad} — well-balanced. No changes needed. That consistency is building something.`,
      adjusted>0?`Dialled back ${adjusted} overloaded day${adjusted>1?"s":""}. Your week load sits at ${weekLoad}.`:`Already balanced at load ${weekLoad}. Keep the structure.`,
    ]),actions};
  }

  // ⑨ Readiness / health check / HRV
  if(/health.{0,10}check|readiness|how.{0,8}recover|am\s+i\s+ready|hrv|resting.{0,5}hr|heart.{0,5}rate|feel.{0,6}(physically|today)/.test(m)){
    if(recovery!=null){
      const r=recovery;
      const light=r>=70?"🟢 Green light — push it today. High-intensity sessions are a go.":r>=40?"🟡 Amber — train smart, not hard. Skip max efforts today.":"🔴 Red zone. Easy movement or full rest only.";
      const hrvLine=hl.hrv?`\nHRV: **${hl.hrv}ms** (${hl.hrv>=60?"excellent":hl.hrv>=45?"good":hl.hrv>=30?"moderate":"low"})`:"";
      const hrLine=hl.restingHR?`\nResting HR: **${hl.restingHR}bpm** (${hl.restingHR<55?"excellent":hl.restingHR<65?"good":"elevated"})`:"";
      const slpMins=hl.sleep?.bedtime&&hl.sleep?.wakeTime?calcSleepMins(hl.sleep.bedtime,hl.sleep.wakeTime):null;
      const slpLine=slpMins?`\nSleep: **${(slpMins/60).toFixed(1)}hrs**`:""
      return{handled:true,reply:`**Recovery: ${r}%**${hrvLine}${hrLine}${slpLine}\n\n${light}`,actions:[]};
    }
    return{handled:true,reply:pick([
      "No health data yet. Log sleep and HRV in the Health tab — or sync via Apple Health shortcut. Once data is in, I'll give you a full readiness score.",
      "Health data not logged. Head to Health tab → log sleep. Add your HRV if you have a wearable. I'll calculate your readiness score immediately.",
    ]),actions:[]};
  }

  // ⑩ Sleep check
  if(/how.{0,8}(did\s+i\s+)?sleep|sleep.{0,8}(check|last night|quality|score)|last night.{0,5}sleep/.test(m)){
    const sl=hl.sleep;
    if(sl?.bedtime&&sl?.wakeTime){
      const mins=calcSleepMins(sl.bedtime,sl.wakeTime)||0;
      const hrs=(mins/60).toFixed(1);
      const qLabels=["Poor 😴","Fair 😐","Good 🙂","Great 😊","Optimal 🌟"];
      const qual=sl.quality?qLabels[sl.quality-1]||"Good":"Unrated";
      const advice=mins>=420?pick(["Solid night — your recovery should be strong today.","Good sleep. Your body had time to adapt."]):"Under 7hrs. Reduce intensity today if possible. Target bed by 10pm tonight.";
      return{handled:true,reply:`Sleep last night: **${hrs}hrs** | Quality: **${qual}**\n\n${advice}`,actions:[]};
    }
    return{handled:true,reply:"No sleep logged. Go to Health tab → log bedtime + wake time. I'll calculate duration, quality, and factor it into your readiness score.",actions:[]};
  }

  // [CHUNK_C]
  // Fallback — always handled, never "I'm offline"
  const nextAny=upcoming.find(t=>t.date>=today&&!t.completed&&t.category!=="work");
  return{handled:true,isFallback:true,reply:pick([
    `${recovery!=null?`Recovery: **${recovery}%**. `:""}${nextAny?`Next: **${nextAny.title}** on ${nextAny.date}.`:""}\n\n"${quote.text}" — ${quote.ref}\n\nTry: health check, macros, habits, match day prep, plan my week, warmup protocol, pace zones — or just tell me how you're feeling.`,
    `${nextAny?`**${nextAny.title}** is coming up on ${nextAny.date}. `:""}${recovery!=null?`You're at ${recovery}% recovery. `:""}Ready to help with anything — training, nutrition, scheduling, motivation, or recovery.`,
    `I'm your personal coach, here for anything.\n\n"${quote.text}" — ${quote.ref}\n\n${nextAny?`Next session: **${nextAny.title}**.`:"Looks clear — want me to plan your week?"}`,
  ]),actions:[]};
}

async function callCoach(msg,ctx){
  const local=localCoach(msg,ctx);
  if(local.handled) return local;
  try{
    const res=await fetch("/api/coach",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg,context:ctx,system:SYSTEM})});
    const data=await res.json();
    if(typeof data.reply==="string") return data;
  }catch{}
  return{reply:"I'm offline. Try: \"plan my week\", \"auto-adjust\", \"match cancelled\", \"tired today\", \"rest day\", \"what's next\", \"week check\".",actions:[]};
}

function Ring({pct=0,size=48,stroke=3,color=T.accent,glow=false}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,dash=(Math.min(100,pct)/100)*circ;
  const glowId=`glow-${Math.round(size)}-${color.replace(/[^a-z0-9]/gi,"")}`;
  return html`<svg width=${size} height=${size} style=${{transform:"rotate(-90deg)",flexShrink:0}}>
    ${glow?html`<defs>
      <filter id=${glowId} x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>`:""}
    <circle cx=${size/2} cy=${size/2} r=${r} stroke="rgba(255,255,255,0.05)" stroke-width=${stroke} fill="none"/>
    <circle cx=${size/2} cy=${size/2} r=${r} stroke=${color} stroke-width=${stroke} fill="none"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
      filter=${glow?`url(#${glowId})`:"none"}
      style="transition:stroke-dasharray 0.6s cubic-bezier(0.34,1.2,0.64,1)"/>
  </svg>`;
}

function SleepModePanel({onClose}){
  const[mode,setMode]=useState("nap");
  const[napMins,setNapMins]=useState(20);
  const[running,setRunning]=useState(false);
  const[secsLeft,setSecsLeft]=useState(0);
  const[alarmFired,setAlarmFired]=useState(false);
  const intervalRef=useRef(null);

  const stop=useCallback(()=>{
    stopAudio();
    clearInterval(intervalRef.current);
    setRunning(false);
  },[]);

  useEffect(()=>{ return()=>{ stopAudio(); clearInterval(intervalRef.current); }; },[]);

  // Manages countdown interval — starts/stops with `running`
  useEffect(()=>{
    if(!running)return;
    intervalRef.current=setInterval(()=>setSecsLeft(s=>s>0?s-1:0),1000);
    return()=>clearInterval(intervalRef.current);
  },[running]);
  // Fires completion when nap timer reaches 0
  useEffect(()=>{
    if(running&&secsLeft===0&&mode==="nap"){
      clearInterval(intervalRef.current);
      stopAudio();
      playAlarm();
      setRunning(false);
      setAlarmFired(true);
    }
  },[secsLeft,running,mode]);

  const start=()=>{
    startBinauralAudio(mode);
    setAlarmFired(false);
    if(mode==="nap"){setSecsLeft(napMins*60);}else{setSecsLeft(0);}
    setRunning(true);
  };

  const mins=Math.floor(secsLeft/60),secs=secsLeft%60;
  const beatHz=mode==="nap"?"6Hz Theta":"2Hz Delta";
  const modeLabel=mode==="nap"?"Nap":"Wind Down";

  return html`<div style=${{
    position:"fixed",inset:0,zIndex:70,
    background:"rgba(7,8,15,0.96)",
    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
    padding:"24px 20px",
  }}>
    <!-- Mode toggle -->
    <div style=${{display:"flex",gap:6,marginBottom:32,padding:"4px",background:"rgba(255,255,255,0.03)",borderRadius:14,border:`1px solid ${T.border}`,width:"100%",maxWidth:320}}>
      ${[{id:"nap",label:"Nap"},{id:"sleep",label:"Wind Down"}].map(m=>html`
        <button key=${m.id} onClick=${()=>{if(!running){setMode(m.id);setAlarmFired(false);setSecsLeft(0);}}} style=${{
          flex:1,padding:"10px 4px",borderRadius:10,cursor:running?"not-allowed":"pointer",fontFamily:"inherit",
          fontWeight:800,fontSize:13,letterSpacing:0.2,
          border:`1px solid ${mode===m.id?T.accentBorder:"transparent"}`,
          background:mode===m.id?T.accentGlow:"transparent",
          color:mode===m.id?T.accent:T.muted,
          transition:"all 0.18s",
        }}>${m.label}</button>`)}
    </div>

    <!-- Timer -->
    <div style=${{textAlign:"center",marginBottom:28}}>
      ${running||alarmFired?html`
        <div style=${{fontSize:64,fontWeight:900,color:alarmFired?T.green:T.accent,fontVariantNumeric:"tabular-nums",letterSpacing:-2,lineHeight:1}}>
          ${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}
        </div>
        <div style=${{fontSize:12,color:T.muted,marginTop:6,fontWeight:600}}>
          ${alarmFired?"Time's up — well rested!":modeLabel+" in progress"}
        </div>
      `:html`
        <div style=${{fontSize:64,fontWeight:900,color:"rgba(255,255,255,0.12)",fontVariantNumeric:"tabular-nums",letterSpacing:-2,lineHeight:1}}>
          ${mode==="nap"?String(Math.floor(napMins/1)).padStart(2,"0")+":00":"∞"}
        </div>
        <div style=${{fontSize:12,color:T.muted,marginTop:6,fontWeight:600}}>ready</div>
      `}
    </div>

    <!-- Nap duration presets (nap mode only) -->
    ${mode==="nap"&&!running?html`
      <div style=${{marginBottom:20,width:"100%",maxWidth:320}}>
        <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.2,marginBottom:10,textAlign:"center"}}>NAP DURATION</div>
        <div style=${{display:"flex",gap:8,justifyContent:"center"}}>
          ${[10,20,30,45].map(m=>html`<button key=${m} onClick=${()=>setNapMins(m)} style=${{
            padding:"10px 16px",borderRadius:11,cursor:"pointer",fontFamily:"inherit",
            fontWeight:800,fontSize:13,
            border:`1px solid ${napMins===m?T.accentBorder:T.border}`,
            background:napMins===m?T.accentGlow:T.surface,
            color:napMins===m?T.accent:T.muted,
          }}>${m}m</button>`)}
        </div>
      </div>
    `:""}

    <!-- Info label -->
    <div style=${{textAlign:"center",marginBottom:24,color:T.muted,fontSize:11,lineHeight:1.6}}>
      Binaural beats · ${beatHz} · Pink noise<br/>
      <span style=${{fontSize:10,opacity:0.7}}>Use headphones for best effect</span>
    </div>

    <!-- Controls -->
    <div style=${{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:320}}>
      ${!running&&!alarmFired?html`
        <${Btn} onClick=${start} variant="primary" style=${{fontSize:15,padding:"14px 0"}}>Start ${modeLabel}<//>
      `:!alarmFired?html`
        <${Btn} onClick=${stop} variant="danger" style=${{fontSize:15,padding:"14px 0"}}>Stop<//>
      `:html`
        <${Btn} onClick=${()=>{setAlarmFired(false);setSecsLeft(0);}} variant="primary" style=${{fontSize:15,padding:"14px 0"}}>Done<//>
      `}
      <${Btn} onClick=${()=>{stop();onClose();}} variant="ghost" style=${{fontSize:13}}>Close<//>
    </div>
  </div>`;
}

// ── Body Fuel & Journal Panel ─────────────────────────────────
function BodyFuelPanel({tasks,healthLog,onUpsertLog,dateStr}){
  const ENERGY_EMOJIS=["😴","😑","😐","💪","🔥"];
  const suggestions=getFuelSuggestions(healthLog,tasks,dateStr);
  const herbs=getHerbSuggestions(healthLog,tasks,dateStr);
  const upcoming=tasks.filter(t=>t.date===dateStr&&!t.completed&&t.time&&new Set(["game","football","run","bike","gym","swim","pilates","recovery","sauna"]).has(t.category)).sort((a,b)=>a.time.localeCompare(b.time))[0];
  // Countdown to upcoming workout
  let countdown=null;
  if(upcoming?.time){
    const now=new Date();
    const[uh,um]=upcoming.time.split(":").map(Number);
    const totalMins=(uh*60+um)-(now.getHours()*60+now.getMinutes());
    if(totalMins>0) countdown=totalMins>=60?`in ${Math.floor(totalMins/60)}h ${totalMins%60>0?totalMins%60+"min":""}`:`in ${totalMins}min`;
  }
  const cat=upcoming?CATS[upcoming.category]:null;
  return html`<div style=${{...S.card,marginBottom:14,padding:"16px 18px"}}>
    <!-- Header -->
    <div style=${{fontSize:9,fontWeight:900,color:T.muted,letterSpacing:2.4,marginBottom:14,textTransform:"uppercase"}}>Body Fuel & Journal</div>

        ${["Drained — prioritise recovery","Low — keep it gentle today","Decent — train steady","Good — push it","Top form — go hard"][healthLog.energy-1]}

    </div>

    <!-- Upcoming workout banner -->
    ${upcoming?html`<div style=${{
      display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:12,marginBottom:14,
      background:`${cat?.glow||"rgba(167,139,250,0.07)"}`,
      border:`1px solid ${cat?.border||T.border}`,

      <span style=${{fontSize:20}}>${cat?.emoji||"🏋️"}</span>

    <!-- Fuel suggestion cards -->
    <div style=${{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
      ${suggestions.slice(0,4).map((s,i)=>html`<div key=${i} style=${{

// ── Body View ─────────────────────────────────────────────────
function BodyView({bodyMap,onUpdateBodyMap}){
  const zones=bodyMap?.zones||{};
  const [view,setView]=useState("f");
  const [selectedZone,setSelectedZone]=useState(null);
  const [pickerZone,setPickerZone]=useState(null);
  const [pickerType,setPickerType]=useState("pain");
  const [pickerLevel,setPickerLevel]=useState(3);

  const visibleZones=BODY_ZONES.filter(z=>z.view===view);
  const connections=selectedZone?new Set(FASCIA_CONNECTIONS[selectedZone]||[]):new Set();

  function zoneColor(id){
    const z=zones[id];
    if(!z)return null;
    const base=BODY_TYPE_COLORS[z.type]||"#a78bfa";
    return{fill:"url(#hg-"+id+")",stroke:base};
  }
  function openPicker(id,e){
    e.stopPropagation();
    if(pickerZone===id){setPickerZone(null);return;}
    const existing=zones[id];
    setPickerType(existing?.type||"pain");
    setPickerLevel(existing?.level||3);
    setPickerZone(id);
    setSelectedZone(id);
  }
  function applyPicker(id){
    const newZones={...zones,[id]:{type:pickerType,level:pickerLevel}};
    onUpdateBodyMap(newZones);
    setPickerZone(null);
  }
  function clearZone(id){
    const newZones={...zones};
    delete newZones[id];
    onUpdateBodyMap(newZones);
    setPickerZone(null);
    if(selectedZone===id)setSelectedZone(null);
  }

  const selZoneData=selectedZone?BODY_ZONES.find(z=>z.id===selectedZone):null;
  const selState=selectedZone?zones[selectedZone]:null;
  const suggestion=selState?(BODY_SUGGESTIONS[selectedZone]?.[selState.type]):null;
  const markedZones=Object.entries(zones);

  // SVG silhouette paths (front + back)

  return html`<div style=${{padding:"16px 14px",paddingBottom:120}}>

          ${["f","b"].map(v=>html`<button key=${v} onClick=${()=>{setView(v);setSelectedZone(null);setPickerZone(null);}} style=${{

      </div>
      <!-- Legend -->
      <div style=${{display:"flex",gap:10,marginBottom:10}}>
        ${Object.entries(BODY_TYPE_COLORS).map(([t,c])=>html`<div key=${t} style=${{display:"flex",alignItems:"center",gap:4,fontSize:10,color:T.textSoft}}>

        <div style=${{fontSize:10,color:T.muted,marginLeft:"auto"}}>Tap zone to mark</div>
      </div>
      <!-- SVG body map -->
      <div style=${{display:"flex",justifyContent:"center"}} onClick=${()=>{setPickerZone(null);}}>
        <svg viewBox="0 0 160 286" style=${{width:200,height:357,maxWidth:"100%"}}>
          <defs>
            ${Object.entries(zones).map(([id,z])=>{
              const base=BODY_TYPE_COLORS[z.type]||"#a78bfa";
              const centerOpacities=[0,0.5,0.6,0.72,0.85,0.95];
              const co=centerOpacities[z.level]||0.5;
              return html`<radialGradient key=${id} id=${"hg-"+id} cx="50%" cy="35%" r="70%" gradientUnits="objectBoundingBox">

            const isPickerOpen=pickerZone===z.id;

            const shouldPulse=zoneState&&zoneState.type==="pain"&&zoneState.level>=4;
            const pulseAnim=shouldPulse?"heatPulse 2s ease-in-out infinite":"none";
            const dropFilter=isSelected&&col?`drop-shadow(0 0 6px ${col.stroke}aa)`:"none";
            return html`<g key=${z.id} onClick=${(e)=>openPicker(z.id,e)} style=${{cursor:"pointer"}}>
              <ellipse
                cx=${z.cx} cy=${z.cy} rx=${z.rx+2} ry=${z.ry+2}

                stroke=${isPickerOpen?"#fff":isSelected?(col?.stroke||T.accent):isConnected?"#38bdf8":col?.stroke||"rgba(255,255,255,0.18)"}
                strokeWidth=${isPickerOpen?2.5:isSelected||isConnected?1.8:0.8}

              >${zones[z.id]?.level||""}</text>`:""}

    <!-- Zone picker (inline card) -->

      <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style=${{fontSize:13,fontWeight:900,color:T.text}}>${BODY_ZONES.find(z=>z.id===pickerZone)?.label||pickerZone}</div>
        <div style=${{display:"flex",gap:3,alignItems:"center"}}>
          ${[1,2,3,4,5].map(l=>{
            const dotColor=l<=pickerLevel?BODY_TYPE_COLORS[pickerType]:"rgba(255,255,255,0.10)";

          color:pickerLevel===l?BODY_TYPE_COLORS[pickerType]:T.muted,
        }}>${l}</button>`)}
      </div>
      <div style=${{display:"flex",gap:8}}>
        <button onClick=${()=>applyPicker(pickerZone)} style=${{
          flex:1,padding:"9px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${T.accentBorder}`,background:T.accentGlow,color:T.accent,fontSize:12,fontWeight:800,
        }}>Save</button>
        ${zones[pickerZone]?html`<button onClick=${()=>clearZone(pickerZone)} style=${{
          padding:"9px 14px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",
          border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:12,fontWeight:700,

        <button onClick=${()=>setPickerZone(null)} style=${{
          padding:"9px 14px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${T.border}`,background:"transparent",color:T.muted,fontSize:12,fontWeight:700,
        }}>✕</button>
      </div>
    </div>`:""}

    <!-- Suggestion card for selected zone -->
    ${selectedZone&&selState&&suggestion?html`<div style=${{...S.card,padding:"14px 16px",marginBottom:14,
      borderLeft:`3px solid ${BODY_TYPE_COLORS[selState.type]}`,

    try{return JSON.parse(localStorage.getItem("dismissedReschedule")||"{}");}catch{return{};}
  });
  const missedWorkouts=useMemo(()=>getMissedWorkouts(tasks).filter(t=>!dismissedReschedule[t.id]),[tasks,dismissedReschedule]);
  const herbs=getHerbSuggestions(todayLog,tasks,today);

        ${ENERGY_EMOJIS.map((e,i)=>html`<button key=${i} onClick=${()=>onUpsertLog(today,{energy:i+1})} style=${{
          flex:1,padding:"9px 4px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",
          border:`1px solid ${todayLog.energy===i+1?T.accentBorder:T.border}`,

      <!-- Body map quick summary -->
      ${(()=>{const bz=Object.entries(todayLog.bodyMap?.zones||{});return bz.length>0?html`<div style=${{marginTop:10,paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.06)"}}>

    <!-- Missed workout reschedule -->

        placeholder="How are you feeling? Notes for today — body, mindset, wins, gratitude…"

    <!-- Today's fuel suggestions -->
    ${fuelSuggestions.length>0?html`<div style=${{...S.card,marginBottom:14,padding:"14px 16px"}}>
      <div style=${{fontSize:9,fontWeight:900,color:T.muted,letterSpacing:2.4,marginBottom:10,textTransform:"uppercase"}}>Fuel Plan</div>
      <div style=${{display:"flex",flexDirection:"column",gap:8}}>
        ${fuelSuggestions.slice(0,3).map((s,i)=>html`<div key=${i} style=${{

// ── Today View ────────────────────────────────────────────────
function TodayView({tasks,habits,habitLogs,onToggleTask,onEditTask,onToggleHabit,onOpenJournal,healthLog={},onUpsertLog}){
  const[sleepMode,setSleepMode]=useState(null);
  const todayStr=todayISO(),now=new Date(),curTime=`${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
  const todayTasks=useMemo(()=>tasks.filter(t=>t.date===todayStr&&t.category!=="work").sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99")),[tasks,todayStr]);
  const nextTask=todayTasks.find(t=>!t.completed&&t.time&&t.time>curTime);
  const done=todayTasks.filter(t=>t.completed).length,total=todayTasks.length,pct=total>0?Math.round((done/total)*100):0;
  const weekDates=getWeekDates();
  const weekCats=useMemo(()=>{
    const s={};
    tasks.filter(t=>weekDates.includes(t.date)&&t.category!=="work").forEach(t=>{
      if(!s[t.category])s[t.category]={done:0,total:0};
      s[t.category].total++;if(t.completed)s[t.category].done++;
    });
    return s;
  },[tasks]);
  const todayHabits=habits.filter(h=>h.days.includes(now.getDay()));

  const pctColor=pct>=80?T.green:pct>=50?T.accent:T.amber;

        <div style=${{flex:1}}>

          <div style=${{fontSize:21,fontWeight:900,color:T.text,lineHeight:1.15,letterSpacing:-0.8}}>${fmtDayLong(todayStr)}</div>

                display:"inline-flex",alignItems:"center",gap:4,padding:"5px 10px",

function DayStrip({tasks,habits,habitLogs,selectedDay,onSelectDay}){
  const todayStr=todayISO();
  const dates=getRecentDates(30);
  const containerRef=useRef(null);
  useEffect(()=>{
    const el=containerRef.current?.querySelector("[data-today]");
    if(el) el.scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});
  },[]);
  return html`<div ref=${containerRef} style=${{
    display:"flex",gap:5,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none",
    WebkitMaskImage:"linear-gradient(to right,transparent,black 12px,black 88%,transparent)",
    marginBottom:16,
  }}>
    ${dates.map(date=>{
      const pct=dayCompletionPct(tasks,date);
      const isToday=date===todayStr,isFuture=date>todayStr,isSel=date===selectedDay;
      const barH=pct!=null?Math.max(4,Math.round(pct/100*28)):0;
      const habitsToday=habits.filter(h=>h.days.includes(new Date(date+"T12:00:00").getDay()));
      const habDone=habitsToday.filter(h=>habitLogs[`${h.id}_${date}`]).length;
      const habPct=habitsToday.length?Math.round(habDone/habitsToday.length*100):null;
      const barColor=pct>=80?T.green:pct>=50?T.accent:pct!=null?T.amber:T.border;
      return html`<button key=${date} data-today=${isToday||undefined} onClick=${()=>onSelectDay(date===selectedDay?null:date)} style=${{
        flexShrink:0,width:46,padding:"8px 4px 6px",borderRadius:12,cursor:"pointer",fontFamily:"inherit",
        border:`1px solid ${isSel?T.accentBorder:isToday?"rgba(139,92,246,0.22)":T.border}`,
        background:isSel?T.accentGlow:isToday?"rgba(139,92,246,0.07)":"rgba(255,255,255,0.02)",
        opacity:isFuture?0.3:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
      }}>
        <span style=${{fontSize:9,fontWeight:800,color:isSel||isToday?T.accent:T.muted,letterSpacing:0.5}}>${fmtDayShort(date)[0]}</span>
        <span style=${{fontSize:12,fontWeight:900,color:isSel||isToday?T.text:T.muted}}>${fmtDateNum(date)}</span>
        <div style=${{width:22,height:32,display:"flex",flexDirection:"column",justifyContent:"flex-end",alignItems:"center"}}>
          ${pct!=null?html`<div style=${{width:6,borderRadius:3,background:barColor,height:barH+"px",transition:"height 0.3s"}}></div>`:
            html`<div style=${{width:6,height:3,borderRadius:3,background:T.border}}></div>`}
        </div>
        ${habPct!=null?html`<div style=${{width:5,height:5,borderRadius:99,background:habPct>=70?T.green:T.border}}></div>`:""}
      </button>`;
    })}
  </div>`;
}

// ── Day Detail Panel ──────────────────────────────────────────
function DayDetailPanel({date,tasks,habits,habitLogs,healthLogs,notes,onToggleTask,onEditTask,onSaveNote}){
  const [noteText,setNoteText]=useState(notes[date]||"");
  const dayTasks=tasks.filter(t=>t.date===date&&t.category!=="work").sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));
  const dayHabits=habits.filter(h=>h.days.includes(new Date(date+"T12:00:00").getDay()));
  const log=healthLogs[date];
  const recovery=log?calcRecovery(log):null;
  return html`<div style=${{...S.card,marginBottom:14,borderColor:"rgba(139,92,246,0.18)"}}>
    <div style=${{fontSize:10,fontWeight:800,color:T.accent,letterSpacing:1.8,marginBottom:12}}>${fmtDayLong(date).toUpperCase()}</div>

    ${dayTasks.length===0?html`<div style=${{fontSize:12,color:T.muted,marginBottom:10}}>No sessions this day.</div>`:""}
    ${dayTasks.map(t=>html`<div key=${t.id} style=${{marginBottom:5}}><${TaskItem} task=${t} onToggle=${onToggleTask} onEdit=${onEditTask}/></div>`)}

    ${dayHabits.length>0?html`
      <div style=${{display:"flex",gap:5,flexWrap:"wrap",marginTop:8,marginBottom:8}}>
        ${dayHabits.map(h=>{
          const done=!!habitLogs[`${h.id}_${date}`];
          return html`<div key=${h.id} style=${{
            display:"flex",alignItems:"center",gap:5,padding:"4px 9px",borderRadius:99,
            background:done?T.greenGlow:"rgba(255,255,255,0.03)",
            border:`1px solid ${done?T.greenBorder:T.border}`,fontSize:11,color:done?T.green:T.muted,
          }}>
            <span>${h.emoji}</span><span style=${{fontWeight:700}}>${h.title}</span>
            ${done?html`<span style=${{fontSize:10}}>✓</span>`:""}
          </div>`;
        })}
      </div>`:""}

    ${log?html`
      <div style=${{display:"flex",gap:10,fontSize:11,color:T.muted,marginBottom:8,flexWrap:"wrap"}}>
        ${recovery!=null?html`<span style=${{color:recovery>=67?T.green:recovery>=34?T.amber:T.red}}>◉ ${recovery}% recovery</span>`:""}
        ${log.sleep?html`<span>Sleep ${Math.round(calcSleepMins(log.sleep.bedtime,log.sleep.wakeTime)/60*10)/10}h</span>`:""}
        ${log.energy?html`<span>Energy ${log.energy}/5</span>`:""}
      </div>`:""}

    <textarea value=${noteText}
      onInput=${e=>setNoteText(e.target.value)}
      onBlur=${()=>onSaveNote(date,noteText)}
      placeholder="Journal — how did this day go?"
      style=${{...S.input,minHeight:60,resize:"vertical",lineHeight:1.5,marginTop:4}}/>
  </div>`;
}

// ── Weekly Review ─────────────────────────────────────────────
function WeeklyReview({tasks,habits,habitLogs,healthLogs,settings}){
  const weekDates=getWeekDates(),todayStr=todayISO();
  const cats=Object.entries(settings.weekTargets||{}).filter(([,t])=>t>0);
  const callouts=getCallouts(tasks,habits,habitLogs,settings,weekDates);
  // Avg recovery this week
  const recoveries=weekDates.map(d=>healthLogs[d]?calcRecovery(healthLogs[d]):null).filter(v=>v!=null);
  const avgRecovery=recoveries.length?Math.round(recoveries.reduce((a,b)=>a+b,0)/recoveries.length):null;
  // Habit consistency
  const allScheduled=habits.flatMap(h=>weekDates.filter(d=>h.days.includes(new Date(d+"T12:00:00").getDay())));
  const allDone=habits.flatMap(h=>weekDates.filter(d=>h.days.includes(new Date(d+"T12:00:00").getDay())&&habitLogs[`${h.id}_${d}`]));
  const habitScore=allScheduled.length?Math.round(allDone.length/allScheduled.length*100):null;

  return html`<div style=${{marginBottom:20}}>
    <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8,marginBottom:12}}>THIS WEEK</div>

    <!-- Category bars -->
    <div style=${{...S.card,marginBottom:10}}>
      ${cats.map(([cat,target])=>{
        const done=tasks.filter(t=>weekDates.includes(t.date)&&t.category===cat&&t.completed).length;
        const pct=Math.min(100,Math.round(done/target*100));
        const color=pct>=80?T.green:pct>=50?T.amber:T.red;
        const catColor=CATS[cat]?.color||T.muted;
        return html`<div key=${cat} style=${{marginBottom:14}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style=${{display:"flex",alignItems:"center",gap:8}}>
              <span style=${{fontSize:13,color:catColor,filter:`drop-shadow(0 0 4px ${catColor}66)`}}>${CATS[cat]?.icon||cat}</span>
              <span style=${{fontSize:12,fontWeight:800,color:T.textSoft,letterSpacing:-0.1}}>${CATS[cat]?.label||cat}</span>
            </div>
            <span style=${{fontSize:12,fontWeight:800,color,fontVariantNumeric:"tabular-nums"}}>${done}<span style=${{color:T.muted,fontWeight:600}}>/${target}</span></span>
          </div>
          <div style=${{height:4,borderRadius:99,background:"rgba(255,255,255,0.05)",overflow:"hidden"}}>
            <div style=${{
              height:"100%",borderRadius:99,width:pct+"%",transition:"width 0.6s cubic-bezier(0.34,1.2,0.64,1)",
              background:pct>=80
                ?`linear-gradient(90deg,${T.green},rgba(52,211,153,0.7))`
                :pct>=50
                ?`linear-gradient(90deg,${T.amber},rgba(251,191,36,0.7))`
                :`linear-gradient(90deg,${T.red},rgba(248,113,113,0.7))`,
              boxShadow:pct>0?`0 0 8px ${color}66`:"none",
            }}></div>
          </div>
        </div>`;
      })}
      <div style=${{display:"flex",gap:16,marginTop:4}}>
        ${habitScore!=null?html`<span style=${{fontSize:11,color:T.muted}}>Habits <span style=${{color:habitScore>=70?T.green:T.amber,fontWeight:700}}>${habitScore}%</span></span>`:""}
        ${avgRecovery!=null?html`<span style=${{fontSize:11,color:T.muted}}>Recovery <span style=${{color:avgRecovery>=67?T.green:avgRecovery>=34?T.amber:T.red,fontWeight:700}}>${avgRecovery}%</span></span>`:""}
      </div>
    </div>

    <!-- Callouts -->
    ${callouts.length>0?html`
      <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8,marginBottom:8}}>NEEDS IMPROVEMENT</div>
      ${callouts.map((c,i)=>html`<div key=${i} style=${{
        display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:12,marginBottom:6,
        background:"rgba(239,68,68,0.05)",border:"1px solid rgba(239,68,68,0.14)",
      }}>
        <span style=${{fontSize:13,color:c.type==="cat"?CATS[c.cat]?.color:T.amber}}>
          ${c.type==="cat"?CATS[c.cat]?.icon:c.habit.emoji}
        </span>
        <div style=${{flex:1}}>
          <div style=${{fontSize:12,fontWeight:700,color:T.text}}>
            ${c.type==="cat"?`${CATS[c.cat]?.label}: ${c.done}/${c.target} sessions`:c.habit.title}
          </div>
          <div style=${{fontSize:10,color:T.muted,marginTop:1}}>
            ${c.pct}% complete — ${c.type==="cat"?`add ${c.target-c.done} more this week`:"habit consistency low"}
          </div>
        </div>
        <span style=${{fontSize:11,fontWeight:800,color:T.red}}>${c.pct}%</span>
      </div>`)}
    `:""}
    ${callouts.length===0?html`
      <div style=${{...S.card,textAlign:"center",padding:"14px",color:T.green,fontSize:12,fontWeight:700}}>
        ◉ On track — all targets at 80%+
      </div>`:""}
  </div>`;
}

// ── Month Calendar ────────────────────────────────────────────
function MonthCalendar({tasks,habits,habitLogs,notes,month,onPrevMonth,onNextMonth}){
  const {year,m}=month;
  const cells=getMonthGrid(year,m);
  const todayStr=todayISO();
  const monthName=new Date(year,m,1).toLocaleDateString("en-GB",{month:"long",year:"numeric"}).toUpperCase();
  const DAY_H=["M","T","W","T","F","S","S"];
  // Monthly category totals
  const monthDates=cells.filter(Boolean);
  const catTotals={};
  tasks.filter(t=>monthDates.includes(t.date)&&t.completed&&t.category!=="work").forEach(t=>{
    catTotals[t.category]=(catTotals[t.category]||0)+1;
  });

  return html`<div style=${{marginBottom:20}}>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
      <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8}}>${monthName}</div>
      <div style=${{display:"flex",gap:6}}>
        <${IconBtn} onClick=${onPrevMonth} style=${{width:30,height:30,fontSize:14}}>‹<//>
        <${IconBtn} onClick=${onNextMonth} style=${{width:30,height:30,fontSize:14}}>›<//>
      </div>
    </div>

    <div style=${{...S.card,padding:"14px 10px"}}>
      <!-- Day headers -->
      <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        ${DAY_H.map((d,i)=>html`<div key=${i} style=${{textAlign:"center",fontSize:9,fontWeight:800,color:T.muted,padding:"2px 0",letterSpacing:0.5}}>${d}</div>`)}
      </div>
      <!-- Day cells -->
      <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        ${cells.map((date,i)=>{
          if(!date) return html`<div key=${i}></div>`;
          const cnt=dayDoneCount(tasks,date);
          const isToday=date===todayStr,isFuture=date>todayStr;
          const hasNote=!!(notes||{})[date];
          const bg=cnt>=3?"rgba(16,185,129,0.35)":cnt===2?"rgba(139,92,246,0.28)":cnt===1?"rgba(139,92,246,0.14)":"rgba(255,255,255,0.03)";
          const borderC=isToday?T.accentBorder:T.border;
          return html`<div key=${date} style=${{
            aspectRatio:"1",borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",
            justifyContent:"center",position:"relative",
            background:isFuture?"transparent":bg,
            border:`1px solid ${borderC}`,
            opacity:isFuture?0.2:1,
          }}>
            <span style=${{fontSize:10,fontWeight:isToday?900:600,color:isToday?T.accent:cnt>0?T.text:T.muted}}>${fmtDateNum(date)}</span>
            ${hasNote?html`<div style=${{width:3,height:3,borderRadius:99,background:T.accent,position:"absolute",bottom:3}}></div>`:""}
          </div>`;
        })}
      </div>
    </div>

    <!-- Monthly totals -->
    ${Object.keys(catTotals).length>0?html`
      <div style=${{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
        ${Object.entries(catTotals).sort(([,a],[,b])=>b-a).map(([cat,n])=>html`
          <div key=${cat} style=${{
            display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:99,
            background:CATS[cat]?`${CATS[cat].color}12`:"rgba(255,255,255,0.04)",
            border:`1px solid ${CATS[cat]?.border||T.border}`,
          }}>
            <span style=${{fontSize:11,color:CATS[cat]?.color||T.muted}}>${CATS[cat]?.icon||cat}</span>
            <span style=${{fontSize:11,fontWeight:700,color:T.text}}>${n}</span>
            <span style=${{fontSize:10,color:T.muted}}>${CATS[cat]?.label||cat}</span>
          </div>`)}
      </div>`:""}

    <!-- Habit adherence -->
    ${habits.length>0?html`
      <div style=${{marginTop:12}}>
        <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8,marginBottom:8}}>HABIT ADHERENCE</div>
        ${habits.map(h=>{
          const pct=habitPctForDates(h,habitLogs,monthDates);
          if(pct===null) return null;
          return html`<div key=${h.id} style=${{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style=${{fontSize:14}}>${h.emoji}</span>
            <span style=${{fontSize:12,fontWeight:700,color:T.text,flex:1}}>${h.title}</span>
            <div style=${{width:60,height:3,borderRadius:99,background:"rgba(255,255,255,0.06)"}}>
              <div style=${{height:"100%",borderRadius:99,background:pct>=70?T.green:T.amber,width:pct+"%"}}></div>
            </div>
            <span style=${{fontSize:11,fontWeight:700,color:pct>=70?T.green:T.amber,minWidth:32,textAlign:"right"}}>${pct}%</span>
          </div>`;
        })}
      </div>`:""}
  </div>`;
}

// ── Review View ───────────────────────────────────────────────
function ReviewView({tasks,habits,habitLogs,healthLogs,notes,settings,onUpsertNote,onToggleTask,onEditTask,onAddForDate,onPlanWeek}){
  const [selectedDay,setSelectedDay]=useState(null);
  const [planOpen,setPlanOpen]=useState(false);
  const now=new Date();
  const [reviewMonth,setReviewMonth]=useState({year:now.getFullYear(),m:now.getMonth()});
  const defaultOverrides=useMemo(()=>{
    const ev=(settings?.schedule||DEF_SCHEDULE).teamEvents||{};
    const ov={};Object.entries(ev).forEach(([d,e])=>{if(e.enabled)ov[parseInt(d)]={...e};});return ov;
  },[settings]);
  const [eventOv,setEventOv]=useState({});
  const openPlan=()=>{setEventOv({...defaultOverrides});setPlanOpen(true);};

  function prevMonth(){
    setReviewMonth(({year,m})=>m===0?{year:year-1,m:11}:{year,m:m-1});
  }
  function nextMonth(){
    setReviewMonth(({year,m})=>m===11?{year:year+1,m:0}:{year,m:m+1});
  }

  const DOW_LABELS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  return html`<div style=${{padding:"14px 14px 110px",maxWidth:820,margin:"0 auto"}}>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8}}>REVIEW</div>
      ${onPlanWeek?html`<button onClick=${openPlan} style=${{
        padding:"7px 14px",borderRadius:12,cursor:"pointer",fontFamily:"inherit",
        fontWeight:800,fontSize:11,letterSpacing:0.3,
        background:"linear-gradient(135deg,rgba(167,139,250,0.14),rgba(167,139,250,0.07))",
        border:"1px solid rgba(167,139,250,0.28)",color:T.accent,
      }}>⚡ Plan Week</button>`:""}
    </div>

    ${planOpen?html`<div style=${{...S.card,marginBottom:16,padding:"16px 18px",border:"1px solid rgba(167,139,250,0.20)"}}>
      <div style=${{fontWeight:900,fontSize:15,color:T.text,marginBottom:4}}>⚡ Plan This Week</div>
      <div style=${{fontSize:11,color:T.muted,marginBottom:14,lineHeight:1.55}}>
        Confirm your events for this week. The schedule will taper the day before and add recovery after matches.
      </div>
      ${Object.entries(eventOv).map(([d,ev])=>{
        const dow=parseInt(d);
        return html`<div key=${dow} style=${{...S.card,marginBottom:10,padding:"12px 14px"}}>
          <div style=${{fontSize:11,fontWeight:900,color:T.text,marginBottom:8}}>${DOW_LABELS[dow]}</div>
          <div style=${{display:"flex",gap:6,flexWrap:"wrap",marginBottom:ev.enabled?8:0}}>
            ${["training","match","none"].map(t=>html`<${Chip} key=${t}
              active=${ev.type===t||(t==="none"&&!ev.enabled)}
              onClick=${()=>setEventOv(p=>({...p,[dow]:{...ev,type:t,enabled:t!=="none"}}))}
            >${t==="match"?"🏟️ Match":t==="training"?"⚽ Training":"😴 Skip"}<//>` )}
          </div>
          ${ev.enabled?html`<div style=${{display:"flex",alignItems:"center",gap:8}}>
            <span style=${{fontSize:11,color:T.muted,fontWeight:700}}>Time</span>
            <input type="time" value=${ev.time||"18:00"} onInput=${e=>setEventOv(p=>({...p,[dow]:{...ev,time:e.target.value}}))}
              style=${{...S.input,width:110,padding:"5px 8px",fontSize:12}}/>
          </div>`:""}
        </div>`;
      })}
      <div style=${{display:"flex",gap:10,marginTop:8}}>
        <button onClick=${()=>setPlanOpen(false)} style=${{flex:1,padding:"10px",borderRadius:12,cursor:"pointer",fontFamily:"inherit",border:"1px solid rgba(255,255,255,0.07)",background:"transparent",color:T.muted,fontSize:12,fontWeight:700}}>Cancel</button>
        <button onClick=${()=>{onPlanWeek(eventOv);setPlanOpen(false);showToast("Week generated ✅");}} style=${{flex:2,padding:"10px",borderRadius:12,cursor:"pointer",fontFamily:"inherit",background:"linear-gradient(135deg,rgba(167,139,250,0.20),rgba(167,139,250,0.10))",border:"1px solid rgba(167,139,250,0.32)",color:T.accent,fontSize:13,fontWeight:800}}>Generate Week 🗓</button>
      </div>
    </div>`:""}

    <!-- Day strip -->
    <${DayStrip} tasks=${tasks} habits=${habits} habitLogs=${habitLogs} selectedDay=${selectedDay} onSelectDay=${setSelectedDay}/>

    <!-- Day detail panel -->
    ${selectedDay?html`<${DayDetailPanel}
      date=${selectedDay} tasks=${tasks} habits=${habits} habitLogs=${habitLogs}
      healthLogs=${healthLogs} notes=${notes||{}}
      onToggleTask=${onToggleTask} onEditTask=${onEditTask}
      onSaveNote=${(date,text)=>onUpsertNote(date,text)}
    />`:""}

    <!-- Weekly review -->
    <${WeeklyReview} tasks=${tasks} habits=${habits} habitLogs=${habitLogs} healthLogs=${healthLogs} settings=${settings}/>

    <!-- Month calendar -->
    <${MonthCalendar} tasks=${tasks} habits=${habits} habitLogs=${habitLogs} notes=${notes||{}} month=${reviewMonth} onPrevMonth=${prevMonth} onNextMonth=${nextMonth}/>
  </div>`;
}

// ── Habits View ───────────────────────────────────────────────
function HabitsView({habits,habitLogs,onToggleHabit,onEditHabit,onAddHabit}){
  const weekDates=getWeekDates(),todayStr=todayISO();
  const DAY_LABELS=["M","T","W","T","F","S","S"];
  return html`<div style=${{padding:"14px 14px 100px",maxWidth:820,margin:"0 auto"}}>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style=${{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.8}}>HABITS</div>
      <${Btn} onClick=${onAddHabit} variant="primary" style=${{fontSize:12,padding:"7px 14px"}}>+ Add<//>
    </div>
    ${habits.length===0?html`
      <div style=${{...S.card,textAlign:"center",padding:32,color:T.muted}}>
        <div style=${{fontSize:18,marginBottom:8,color:T.accent}}>◈</div>
        <div style=${{fontWeight:700,fontSize:14}}>No habits yet</div>
      </div>`
    :habits.map(h=>{
      const weekDone=weekDates.filter(d=>!!habitLogs[`${h.id}_${d}`]).length;
      let streak=0;const ti=weekDates.indexOf(todayStr);
      for(let i=ti>=0?ti:weekDates.length-1;i>=0;i--){if(habitLogs[`${h.id}_${weekDates[i]}`])streak++;else break;}
      return html`<div key=${h.id} className="sk-card" style=${{...S.card,marginBottom:8}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
          <div style=${{display:"flex",alignItems:"center",gap:10}}>
            <div style=${{width:40,height:40,borderRadius:12,background:T.greenGlow,border:`1px solid ${T.greenBorder}`,display:"grid",placeItems:"center",fontSize:19,flexShrink:0}}>${h.emoji}</div>
            <div>
              <div style=${{fontWeight:800,fontSize:14,color:T.text,letterSpacing:-0.2}}>${h.title}</div>
              <div style=${{fontSize:11,color:T.muted,marginTop:2,display:"flex",gap:8}}>
                <span style=${{color:weekDone>0?T.green:T.muted}}>${weekDone}/7 this week</span>
                ${streak>0?html`<span style=${{color:T.amber,fontWeight:700}}>◆ ${streak}d streak</span>`:""}
              </div>
            </div>
          </div>
          <${IconBtn} onClick=${()=>onEditHabit(h)} style=${{fontSize:13,color:T.muted}}>◇<//>
        </div>
        <div style=${{display:"flex",gap:4,marginTop:12}}>
          ${weekDates.map((date,i)=>{
            const done=!!habitLogs[`${h.id}_${date}`],isToday=date===todayStr;
            return html`<button key=${date} onClick=${()=>onToggleHabit(h.id,date)} style=${{
              flex:1,paddingTop:"100%",position:"relative",
              border:`1px solid ${done?T.greenBorder:isToday?T.accentBorder:T.border}`,
              background:done?T.greenGlow:isToday?T.accentGlow:"rgba(255,255,255,0.02)",
              cursor:"pointer",overflow:"hidden",borderRadius:10,
            }}>
              <div style=${{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                <span style=${{fontSize:9,fontWeight:800,color:done?T.green:isToday?T.accent:T.muted,letterSpacing:0.4}}>${DAY_LABELS[i]}</span>
                ${done?html`<span style=${{fontSize:10,color:T.green,lineHeight:1}}>✓</span>`:""}
              </div>
            </button>`;
          })}
        </div>
      </div>`;
    })}
  </div>`;
}

const STRAIN_WEIGHTS={game:3.5,football:3.5,run:2.5,bike:2.0,gym:2.5,swim:2.0,pilates:1.5,sauna:0.7,recovery:0.5,work:0,other:0.5};
// Maps Apple Health / fitness app workout type strings → app category
function mapAppleWorkout(type){
  if(!type)return"other";
  const t=type.toLowerCase().replace(/[\s_-]+/g,"");
  if(["running","run","trackrun","trailrun","treadmill","indoorrun"].some(k=>t.includes(k)))return"run";
  if(["cycling","bike","biking","indoorcycling","spinning","rowing","ergometer","rowingmachine"].some(k=>t.includes(k)))return"bike";
  if(["football","soccer","americanfootball","australianfootball","gaelic"].some(k=>t.includes(k)))return"football";
  if(["pilates"].some(k=>t.includes(k)))return"pilates";
  if(["yoga","stretching","flexibility","mindfulness","cooldown","mobility","barre"].some(k=>t.includes(k)))return"recovery";
  if(["strength","weight","gym","hiit","circuit","crossfit","functional","coretraining","boxing","martialarts","wrestling","kickboxing"].some(k=>t.includes(k)))return"gym";
  if(["swim","swimming","openwater","waterfit","aqua"].some(k=>t.includes(k)))return"swim";
  if(["basketball","tennis","volleyball","handball","rugby","hockey","cricket","badminton","squash","lacrosse"].some(k=>t.includes(k)))return"game";

  if(["hiking","walking","walk","hike","mountainclimbing","stairclimbing"].some(k=>t.includes(k)))return"run";
  return"other";
}

// Returns fuel suggestion cards based on today's workout and body state
function getFuelSuggestions(log,tasks,dateStr){
  const now=new Date();
  const curHHMM=`${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
  const curDecHrs=now.getHours()+now.getMinutes()/60;
  const WORKOUT_CATS=new Set(["game","football","run","bike","gym","swim","pilates","recovery","sauna"]);
  // Next uncompleted workout with a time set
  const upcoming=tasks
    .filter(t=>t.date===dateStr&&!t.completed&&t.time&&WORKOUT_CATS.has(t.category)&&t.time>curHHMM)
    .sort((a,b)=>a.time.localeCompare(b.time))[0];
  // Most recently completed workout (within last 2h)
  const recent=tasks
    .filter(t=>{
      if(!t.completed||t.date!==dateStr||!t.time||!WORKOUT_CATS.has(t.category))return false;
      const[h,m]=t.time.split(":").map(Number);const wHrs=h+m/60;
      return curDecHrs-wHrs>=0&&curDecHrs-wHrs<=2;
    })
    .sort((a,b)=>b.time.localeCompare(a.time))[0];
  const suggestions=[];
  if(upcoming){
    const[uh,um]=upcoming.time.split(":").map(Number);
    const hoursUntil=(uh+um/60)-curDecHrs;
    const plan=FUEL_PLANS[upcoming.category]||FUEL_PLANS.run;
    if(hoursUntil>=2&&plan.meal_3h)
      suggestions.push({...plan.meal_3h,timing:`Now — ${Math.round(hoursUntil)}h before`,color:"#a78bfa"});
    if(hoursUntil>=0.5&&hoursUntil<2.5&&plan.snack_1h)
      suggestions.push({...plan.snack_1h,timing:`${Math.round(hoursUntil*60)}min before`,color:"#f59e0b"});
    if(hoursUntil<0.5&&hoursUntil>=0)
      suggestions.push({label:"Almost Time — Hydrate",foods:["Sip water steadily","Electrolytes if available","No solid food now"],hint:"Save your energy — fuel is already in the tank",timing:"Now",color:"#38bdf8"});
    if((upcoming.category==="game"||upcoming.category==="football")&&hoursUntil<=0.75&&hoursUntil>=0&&plan.intra)
      suggestions.push({...plan.intra,timing:"During",color:"#34d399"});
    if(plan.post) suggestions.push({...plan.post,timing:"Post-workout",color:"#34d399"});
    else if(plan.any) suggestions.push({...plan.any,timing:"Today",color:"#34d399"});
  } else if(recent){
    const plan=FUEL_PLANS[recent.category]||FUEL_PLANS.run;
    if(plan.post) suggestions.push({...plan.post,timing:"Recovery window",color:"#34d399"});
    else if(plan.any) suggestions.push({...plan.any,timing:"Recovery",color:"#34d399"});
  } else {
    // Rest day or no workout logged
    suggestions.push({label:"Rest Day Fuelling",foods:["Salmon or mackerel (omega-3)","Dark leafy greens + berries","Almonds or walnuts","Eggs + avocado","Keep meals balanced — no need to overload"],hint:"Eat for recovery and energy balance — this rest is part of the training",timing:"Today",color:"#34d399"});
  }
  // Body-state extra cards
  if(log?.energy<=2)
    suggestions.push({label:"Low Energy Support",foods:["Porridge with banana (slow carbs)","Eggs (B vitamins + iron)","Spinach + pumpkin seeds (magnesium)"],hint:"Slow-release energy — avoid sugar spikes that crash you later",timing:"Note",color:"#f87171"});
  if(log?.stress>=4)
    suggestions.push({label:"High Stress — Recovery Foods",foods:["Almonds + dark leafy greens (magnesium)","Salmon or mackerel (omega-3 fights cortisol)","Chamomile or green tea","Dark berries (antioxidants)"],hint:"Magnesium and omega-3 regulate cortisol — eat these today",timing:"Note",color:"#fb923c"});
  return suggestions;
}

function getHerbSuggestions(log,tasks,dateStr){
  const now=new Date();
  const curDecHrs=now.getHours()+now.getMinutes()/60;
  const upcoming=tasks.filter(t=>t.date===dateStr&&!t.completed&&WORKOUT_CATS_SET.has(t.category)&&t.time)
    .sort((a,b)=>a.time.localeCompare(b.time))[0];
  const cat=upcoming?.category||null;
  const hoursUntil=upcoming?.time
    ?(()=>{const[h,m]=upcoming.time.split(":").map(Number);return(h+m/60)-curDecHrs;})()
    :null;
  const isGameDay=tasks.some(t=>t.date===dateStr&&["game","football"].includes(t.category));
  const isLowEnergy=(log?.energy||3)<=2;
  const isHighStress=(log?.stress||1)>=4;
  const isEvening=now.getHours()>=19;
  const isSick=log?.sickMode;
  const results=[];
  if(isSick){
    results.push(...HERB_DB.filter(h=>["Ginger","Turmeric + Black Pepper","Echinacea","Reishi","Chlorella"].includes(h.name)||h.tags.includes("immune")));
  } else {
    if(isGameDay&&hoursUntil!==null&&hoursUntil>0&&hoursUntil<3)
      results.push(...HERB_DB.filter(h=>h.bodyState==="preGame"||(h.workoutTypes.includes(cat||"")&&h.bodyState!=="sleep"&&h.bodyState!=="always")));
    if(isLowEnergy) results.push(...HERB_DB.filter(h=>h.bodyState==="lowEnergy"));
    if(isHighStress) results.push(...HERB_DB.filter(h=>h.bodyState==="highStress"));
    if(isEvening) results.push(...HERB_DB.filter(h=>h.bodyState==="sleep"));
    if(cat&&!isEvening) results.push(...HERB_DB.filter(h=>h.workoutTypes.includes(cat)&&h.bodyState==="recovery"));
    if(results.length===0) results.push(...HERB_DB.filter(h=>h.bodyState==="always").slice(0,3));
  }
  return results.filter((h,i,arr)=>arr.findIndex(x=>x.name===h.name)===i).slice(0,4);
}

// Returns missed workouts from yesterday that need reschedule prompt
function getMissedWorkouts(tasks){
  const yest=isoDate(addDays(new Date(),-1));
  return tasks.filter(t=>t.date===yest&&!t.completed&&WORKOUT_CATS_SET.has(t.category)&&!t.fromAppleHealth);
}

// Detects week conflicts when a new high-priority task is added
function detectWeekConflicts(tasks,weekDates){
  const byDay={};
  weekDates.forEach(d=>{byDay[d]=tasks.filter(t=>t.date===d&&WORKOUT_CATS_SET.has(t.category));});
  const conflicts=[];
  weekDates.forEach(d=>{if(byDay[d].length>2)conflicts.push({date:d,tasks:byDay[d]});});
  return conflicts;
}

// Rebalances week tasks to accommodate a last-minute high-priority event
function rebalanceWeek(tasks,newTaskDate,weekDates){
  const today=todayISO();
  const moveable=tasks.filter(t=>
    weekDates.includes(t.date)&&t.date>=today&&!t.completed&&
    WORKOUT_CATS_SET.has(t.category)&&t.date!==newTaskDate&&
    !["game","football"].includes(t.category)
  );
  const occupied=new Set(tasks.filter(t=>weekDates.includes(t.date)&&WORKOUT_CATS_SET.has(t.category)&&t.date!==newTaskDate).map(t=>t.date));
  const free=weekDates.filter(d=>d>=today&&d!==newTaskDate&&!occupied.has(d));
  const moves=[];
  let fi=0;
  // Find overloaded days on newTaskDate and try to spread
  const overloaded=tasks.filter(t=>t.date===newTaskDate&&WORKOUT_CATS_SET.has(t.category)&&!t.completed&&!["game","football"].includes(t.category));
  for(const t of overloaded){
    if(fi<free.length){moves.push({task:t,toDate:free[fi]});fi++;}
  }
  return moves;
}

function calcSleepMins(bedtime,wakeTime){
  if(!bedtime||!wakeTime)return null;
  const[bh,bm]=bedtime.split(":").map(Number);
  const[wh,wm]=wakeTime.split(":").map(Number);
  let m=(wh*60+wm)-(bh*60+bm);
  if(m<0)m+=1440;
  return m;
}
function calcRecovery(log){
  if(!log)return null;
  let pts=0,total=0;
  if(log.sleep?.bedtime&&log.sleep?.wakeTime){
    const mins=calcSleepMins(log.sleep.bedtime,log.sleep.wakeTime);
    if(mins!=null){const hrs=mins/60;pts+=Math.min(40,hrs>=8?40:40*(hrs/8));}
    total+=40;
  }
  if(log.sleep?.quality){pts+=(log.sleep.quality-1)/4*20;total+=20;}
  if(log.hrv){pts+=Math.min(25,Math.max(0,(log.hrv-30)/50*25));total+=25;}
  if(log.restingHR){pts+=Math.min(15,Math.max(0,(80-log.restingHR)/40*15));total+=15;}
  if(total===0)return null;
  return Math.round(pts/total*100);
}
function calcStrain(tasks,date){
  return tasks.filter(t=>t.date===date&&t.completed).reduce((s,t)=>s+(STRAIN_WEIGHTS[t.category]??0.5),0);
}
function recoveryColor(s){if(s==null)return T.muted;if(s>=67)return T.green;if(s>=34)return"#fbbf24";return T.red;}
function strainColor(s){if(s<7)return T.green;if(s<14)return"#fbbf24";return T.red;}

function estimateMacros(text){
  if(!text)return null;
  const t=text.toLowerCase();
  const matches=[];
  for(const f of FOOD_DB){
    const matchedKey=f.keys.find(k=>t.includes(k));
    if(matchedKey) matches.push({...f,_key:matchedKey});
  }
  if(!matches.length)return null;
  // Remove entries whose matched key is a substring of a longer matched key from another entry
  // e.g. "chicken" is shadowed when "chicken breast" also matches
  const filtered=matches.filter(m=>
    !matches.some(other=>other._key!==m._key&&other._key.includes(m._key))
  );
  return filtered.reduce((a,f)=>({cal:a.cal+f.cal,protein:a.protein+f.protein,carbs:a.carbs+f.carbs,fat:a.fat+f.fat}),{cal:0,protein:0,carbs:0,fat:0});
}

  const meals=(foodLogs[date]?.meals)||[];
  const totals=meals.reduce((a,m)=>({
    cal:a.cal+(+m.cal||0),protein:a.protein+(+m.protein||0),
    carbs:a.carbs+(+m.carbs||0),fat:a.fat+(+m.fat||0),
  }),{cal:0,protein:0,carbs:0,fat:0});

  const rec=calcDailyMacros(settings?.profile,tasks||[],date);

  const macroFields=[
    {key:"cal",     label:"Calories", unit:"kcal", color:T.accent},
    {key:"protein", label:"Protein",  unit:"g",    color:T.green},
    {key:"carbs",   label:"Carbs",    unit:"g",    color:T.amber},
    {key:"fat",     label:"Fat",      unit:"g",    color:T.blue},
  ];

    setForm({name:"",cal:"",protein:"",carbs:"",fat:""});
    setFoodText("");setImgData(null);setAnalyzing(false);setAiSource(false);setManualMode(false);
    setShowForm(false);
  };

  const handleImagePick=e=>{
    const file=e.target.files?.[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const dataUrl=ev.target.result;
      const[header,b64]=dataUrl.split(",");
      const mime=(header.match(/:(.*?);/)||[])[1]||"image/jpeg";
      if(file.size>800000){
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement("canvas");
          const scale=Math.min(1,Math.sqrt(800000/file.size));
          canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
          canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
          const resized=canvas.toDataURL(mime,0.85);
          const[,rb64]=resized.split(",");
          setImgData({base64:rb64,mimeType:mime,preview:resized});
        };
        img.src=dataUrl;
      }else{
        setImgData({base64:b64,mimeType:mime,preview:dataUrl});
      }
    };
    reader.readAsDataURL(file);
  };

  const analyseFood=async()=>{
    if(!foodText.trim()&&!imgData)return;
    setAnalyzing(true);
    try{
      const body=imgData?{imageBase64:imgData.base64,mimeType:imgData.mimeType}:{foodText:foodText.trim()};
      const res=await fetch("/api/nutrition",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      if(data.error){
        const est=estimateMacros(foodText);
        if(est){setForm({name:foodText.trim(),cal:String(est.cal),protein:String(est.protein),carbs:String(est.carbs),fat:String(est.fat)});setAiSource(true);showToast("Offline estimate used");}
        else{showToast("AI unavailable — enter macros manually");setManualMode(true);}
        return;
      }
      setForm({name:data.name,cal:String(data.cal),protein:String(data.protein),carbs:String(data.carbs),fat:String(data.fat)});
      setAiSource(true);
    }catch{
      const est=estimateMacros(foodText);
      if(est){setForm({name:foodText.trim(),cal:String(est.cal),protein:String(est.protein),carbs:String(est.carbs),fat:String(est.fat)});setAiSource(true);showToast("Offline estimate used");}

    onUpsertFoodLog(date,newMeals);

// ── Training Plans ──────────────────────────────────────────
const PLAN_PRESETS=[
  {name:"5K Starter",    desc:"Build your base",    startMins:20,sessionsPerWeek:3,totalWeeks:6},
  {name:"5K Builder",    desc:"Push to 5K",          startMins:25,sessionsPerWeek:3,totalWeeks:8},
  {name:"10K Prep",      desc:"Double the distance", startMins:30,sessionsPerWeek:4,totalWeeks:10},
  {name:"Half Marathon", desc:"Long game",            startMins:35,sessionsPerWeek:4,totalWeeks:12},
  {name:"Custom",        desc:"Set your own params", startMins:25,sessionsPerWeek:3,totalWeeks:8},
];

// Session type labels and day offsets per session count
const SESSION_CONFIG={
  2:{days:[0,4],types:[["Easy","Long"],["Tempo","Long"]]},
  3:{days:[0,2,4],types:[["Easy","Easy","Long"],["Easy","Tempo","Long"]]},
  4:{days:[0,1,3,5],types:[["Easy","Tempo","Easy","Long"],["Easy","Tempo","Easy","Long"]]},
  5:{days:[0,1,3,4,6],types:[["Easy","Tempo","Easy","Easy","Long"],["Easy","Tempo","Easy","Tempo","Long"]]},
};

const SESSION_NOTES={
  Easy:"Zone 2 — conversational pace, comfortable effort.",
  Tempo:"Comfortably hard — sustain for the full run.",
  Long:"Slow and steady — 60-90s/km slower than easy pace.",
};

function generatePlanTasks(plan){
  const tasks=[];
  const cfg=SESSION_CONFIG[plan.sessionsPerWeek]||SESSION_CONFIG[3];
  const days=cfg.days;
  const typeMatrix=cfg.types;
  const start=parseDate(plan.startDate);
  // Align start to Monday of that week
  const startDow=(start.getDay()+6)%7;
  const monday=addDays(start,-startDow);

  for(let w=0;w<plan.totalWeeks;w++){
    const weekMins=plan.startMins+(w*plan.incrementMins);
    const types=typeMatrix[w%typeMatrix.length];
    days.forEach((dayOffset,si)=>{
      const date=isoDate(addDays(monday,w*7+dayOffset));
      const type=types[si];
      tasks.push({
        id:uid(),
        date,
        time:"06:00",
        title:`Run ${weekMins}min — ${type}`,
        category:"run",
        notes:SESSION_NOTES[type],
        completed:false,
        planKey:`plan_${plan.id}_w${w}_s${si}`,
        createdAt:Date.now(),
      });
    });
  }
  return tasks;
}

function getPlanCurrentWeek(plan){
  const start=parseDate(plan.startDate);
  const now=new Date();
  const diff=Math.floor((startOfDay(now)-startOfDay(start))/(1000*60*60*24*7));
  return Math.max(0,Math.min(diff,plan.totalWeeks-1));
}

function CoachPanel({isOpen,onClose,tasks,habits,habitLogs,settings,onApplyActions}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hey! I'm Coach ▸\n\nWhat I can do:\n• \"Plan my week\" — generate a smart week from your template\n• \"Auto-adjust\" — rebalance load across the week\n• \"Match cancelled\" — swap for quality training\n• \"Tired today\", \"Rest day\", \"What's next?\", \"Week check\""}]);
  const [input,setInput]=useState(""); const [busy,setBusy]=useState(false);
  const bodyRef=useRef(null); const inputRef=useRef(null);
  useEffect(()=>{ if(isOpen) setTimeout(()=>inputRef.current?.focus(),100); },[isOpen]);
  useEffect(()=>{ if(bodyRef.current) bodyRef.current.scrollTop=bodyRef.current.scrollHeight; },[msgs,busy]);

  const buildCtx=useCallback(()=>{
    const now=new Date(),todayStr=todayISO(),weekDates=getWeekDates();
    const upcoming=tasks.filter(t=>t.date>=todayStr).sort((a,b)=>(`${a.date}${a.time||""}`).localeCompare(`${b.date}${b.time||""}`)).slice(0,60).map(t=>({id:t.id,title:t.title,date:t.date,time:t.time||null,category:t.category,completed:t.completed,planKey:t.planKey||null,notes:t.notes||""}));
    const weekStats={};tasks.filter(t=>weekDates.includes(t.date)).forEach(t=>{if(!weekStats[t.category])weekStats[t.category]={done:0,total:0};weekStats[t.category].total++;if(t.completed)weekStats[t.category].done++;});
    return{today:todayStr,dayOfWeek:now.toLocaleDateString("en-GB",{weekday:"long"}),timeNow:`${pad2(now.getHours())}:${pad2(now.getMinutes())}`,weekStats,weekTargets:settings.weekTargets,constraints:settings.constraints,upcomingTasks:upcoming,todayHabits:habits.filter(h=>h.days.includes(now.getDay())).map(h=>({id:h.id,title:h.title,done:!!habitLogs[`${h.id}_${todayStr}`]})),weekDates,settings};
  },[tasks,habits,habitLogs,settings]);

  const QUICK=[
    {l:"Plan week",p:"Plan my week"},
    {l:"Auto-adjust ⚡",p:"Auto-adjust my schedule"},
    {l:"Match cancelled",p:"Match cancelled"},
    {l:"Tired today 😴",p:"I feel tired and heavy legged today"},
    {l:"What's next?",p:"What should I do next?"},
    {l:"Week check",p:"How is my week going so far?"},
    {l:"Rest day 🌙",p:"Make today a rest day"},
  ];
  const send=async(text)=>{
    const t=text.trim(); if(!t||busy) return;
    setMsgs(p=>[...p,{role:"user",content:t}]); setInput(""); setBusy(true);
    try{
      const r=await callCoach(t,buildCtx());
      setMsgs(p=>[...p,{role:"assistant",content:r.reply}]);
      if(r.actions?.length){ onApplyActions(r.actions); showToast(`✅ ${r.actions.length} update${r.actions.length>1?"s":""} applied`); }
    }catch{setMsgs(p=>[...p,{role:"assistant",content:"⚠️ Can't reach Coach right now."}]);}
    finally{setBusy(false);}
  };

  if(!isOpen) return null;
  return html`<div style=${{position:"fixed",inset:0,zIndex:80,background:"rgba(0,0,0,0.72)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick=${onClose}>
    <div style=${{
      background:"rgba(5,7,15,0.96)",borderRadius:"24px 24px 0 0",
      border:"1px solid rgba(167,139,250,0.18)",
      boxShadow:"0 -24px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(167,139,250,0.06) inset",
      display:"flex",flexDirection:"column",maxHeight:"90vh",
      paddingBottom:"env(safe-area-inset-bottom)",backdropFilter:"blur(32px)",WebkitBackdropFilter:"blur(32px)",
    }} onClick=${e=>e.stopPropagation()}>
      <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px 10px",borderBottom:"1px solid rgba(255,255,255,0.055)",flexShrink:0}}>
        <div style=${{display:"flex",alignItems:"center",gap:10}}>
          <div style=${{width:38,height:38,borderRadius:14,background:"linear-gradient(135deg,rgba(167,139,250,0.22),rgba(52,211,153,0.14))",border:"1px solid rgba(167,139,250,0.32)",display:"grid",placeItems:"center",fontSize:16,boxShadow:"0 0 14px rgba(167,139,250,0.18)"}}>▸</div>
          <div>
            <div style=${{fontWeight:900,fontSize:15,color:T.text,letterSpacing:-0.3}}>Coach</div>
            <div style=${{fontSize:10,fontWeight:700,color:busy?T.amber:T.green,letterSpacing:0.5}}>${busy?"thinking…":"● ready"}</div>
          </div>
        </div>
        <button onClick=${onClose} style=${{width:32,height:32,borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:T.muted,cursor:"pointer",display:"grid",placeItems:"center",fontSize:14}}>×</button>
      </div>
      <div ref=${bodyRef} style=${{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:10,minHeight:180}}>
        ${msgs.map((m,i)=>html`<div key=${i} style=${{
          alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"88%",padding:"11px 14px",
          borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
          background:m.role==="user"?"linear-gradient(135deg,rgba(167,139,250,0.16),rgba(167,139,250,0.08))":"rgba(255,255,255,0.04)",
          border:`1px solid ${m.role==="user"?"rgba(167,139,250,0.30)":"rgba(255,255,255,0.07)"}`,
          color:T.text,fontSize:14,lineHeight:1.55,whiteSpace:"pre-wrap",
          boxShadow:"0 2px 12px rgba(0,0,0,0.3)",
        }}>
          ${m.role==="assistant"?html`<div style=${{fontSize:9,fontWeight:900,color:T.accent,marginBottom:5,letterSpacing:1.5,textTransform:"uppercase"}}>Coach</div>`:""}
          ${m.content}
        </div>`)}
        ${busy?html`<div style=${{alignSelf:"flex-start",padding:"12px 16px",borderRadius:"16px 16px 16px 4px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",color:T.muted,fontSize:18,letterSpacing:4}}>···</div>`:""}

        ${QUICK.map(c=>html`<${Chip} key=${c.l} onClick=${()=>send(c.p)}>${c.l}<//>` )}
      </div>
      <div style=${{display:"flex",gap:8,padding:"10px 18px 14px",flexShrink:0}}>
        <textarea ref=${inputRef} value=${input}
          onInput=${e=>setInput(e.target.value)}
          onKeyDown=${e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);} }}
          placeholder="Ask Coach anything… (Enter to send)" rows=${1}
          style=${{flex:1,padding:"11px 14px",borderRadius:14,border:"1px solid rgba(255,255,255,0.09)",
            background:"rgba(255,255,255,0.05)",color:T.text,fontSize:15,fontFamily:"inherit",

        }}>Send</button>
